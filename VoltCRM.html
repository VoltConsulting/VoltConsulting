        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,paddingBottom:14,borderBottom:"1px solid "+G200}}>
          <span style={{fontWeight:700,fontSize:16,color:NAVY}}>{init&&init.id?"Edit Vacancy":"New Vacancy"}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:G400,fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{gridColumn:"span 2"}}>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Role Title *</div>
            <input value={f.title||""} onChange={function(e){set("title",e.target.value);}} placeholder="e.g. Partner, Life Science Practice" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Client *</div>
            <select value={f.companyId||""} onChange={function(e){set("companyId",e.target.value?parseFloat(e.target.value):null);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}>
              <option value="">Select client</option>
              {companies.map(function(co){return <option key={co.id} value={co.id}>{co.name}</option>;})}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Key Contact</div>
            <select value={f.keyContactId||""} onChange={function(e){set("keyContactId",e.target.value?parseFloat(e.target.value):null);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}>
              <option value="">Select contact</option>
              {linkedPeople.map(function(p){return <option key={p.id} value={p.id}>{p.name} — {p.title}</option>;})}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Type</div>
            <select value={f.type||"Retained"} onChange={function(e){set("type",e.target.value);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}>
              {VAC_TYPES.map(function(t){return <option key={t} value={t}>{t}</option>;})}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Status</div>
            <select value={f.status||"Active"} onChange={function(e){set("status",e.target.value);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}>
              {VAC_STATUSES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Location</div>
            <input value={f.location||""} onChange={function(e){set("location",e.target.value);}} placeholder="e.g. London, Boston, Remote" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,paddingTop:20}}>
            <input type="checkbox" id="excl" checked={f.exclusive||false} onChange={function(e){set("exclusive",e.target.checked);}} style={{width:16,height:16,cursor:"pointer"}}/>
            <label htmlFor="excl" style={{fontSize:13,color:G700,cursor:"pointer",fontWeight:500}}>Exclusive mandate</label>
          </div>

          {/* Fee section */}
          {f.type!=="VoltTEAMbuild"?(
            <>
              <div>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Fee %</div>
                <input type="number" value={f.feePercent||""} onChange={function(e){set("feePercent",e.target.value);}} placeholder="e.g. 22.5" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Salary Range</div>
                <div style={{display:"flex",gap:6}}>
                  <input type="number" value={f.salaryMin||""} onChange={function(e){set("salaryMin",e.target.value);}} placeholder="Min £" style={{flex:1,border:"1px solid "+G300,borderRadius:6,padding:"7px 8px",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
                  <input type="number" value={f.salaryMax||""} onChange={function(e){set("salaryMax",e.target.value);}} placeholder="Max £" style={{flex:1,border:"1px solid "+G300,borderRadius:6,padding:"7px 8px",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
                </div>
              </div>
              <div style={{gridColumn:"span 2"}}>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Agreed Salary (editable — used for fee calculation)</div>
                <input type="number" value={f.agreedSalary||""} onChange={function(e){set("agreedSalary",e.target.value);}} placeholder="Final agreed salary £" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                {f.agreedSalary&&f.feePercent&&<div style={{marginTop:6,fontSize:13,color:OK,fontWeight:700}}>Calculated fee: £{Math.round(parseFloat(f.agreedSalary)*parseFloat(f.feePercent)/100).toLocaleString()}</div>}
              </div>
            </>
          ):(
            <>
              <div>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Job Title / Level</div>
                <input value={f.jobTitle||""} onChange={function(e){set("jobTitle",e.target.value);}} placeholder="e.g. Principal Consultant" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Flat Fee £</div>
                <input type="number" value={f.flatFee||""} onChange={function(e){set("flatFee",e.target.value);}} placeholder="e.g. 25000" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
            </>
          )}

          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Start Date</div>
            <input type="date" value={f.startDate||""} onChange={function(e){set("startDate",e.target.value);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Target Close</div>
            <input type="date" value={f.targetClose||""} onChange={function(e){set("targetClose",e.target.value);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{gridColumn:"span 2"}}>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Job Spec / Brief Notes</div>
            <textarea value={f.notes||""} onChange={function(e){set("notes",e.target.value);}} rows={4} placeholder="Role brief, key requirements, client preferences..." style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit",resize:"vertical"}}/>
          </div>
        </div>

        <div style={{marginBottom:16}}>
          <OwnerPicker owners={f.owners||[]} label="Assign to" onChange={function(next){setF(function(p){var n=Object.assign({},p);n.owners=next;return n;});}}/>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid "+G300,borderRadius:6,padding:"8px 18px",fontSize:13,color:G600,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          <button onClick={function(){if(!f.title.trim()||!f.companyId){alert("Role title and client are required");return;}onSave(f);}} style={{background:TEAL,color:W,border:"none",borderRadius:6,padding:"8px 22px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Save Vacancy</button>
        </div>
      </div>
    </div>
  );
}

function VacanciesView({vacancies,setVacancies,companies,setCompanies,people,setPeople,persist,ownerFilter}){
  var[sel,setSel]=useState(null);
  var[showForm,setShowForm]=useState(false);
  var[editVac,setEditVac]=useState(null);
  var[filterType,setFilterType]=useState("All");
  var[filterStatus,setFilterStatus]=useState("Active");
  var[search,setSearch]=useState("");
  var[kanbanView,setKanbanView]=useState(false);

  function saveVacancy(v){
    var list=vacancies||[];
    var isNew=!v.id||v.id===0;
    var saved=Object.assign({},v,{id:v.id&&v.id!==0?v.id:Date.now(),candidates:v.candidates||[]});
    var updated=isNew?[saved,...list]:list.map(function(x){return x.id===saved.id?saved:x;});
    setVacancies(updated);persist("vacancies",updated);
    // Mark company as client
    if(isNew&&saved.companyId){
      var updCos=companies.map(function(co){return co.id===saved.companyId?Object.assign({},co,{tier:"Key Client"}):co;});
      setCompanies(updCos);persist("companies",updCos);
    }
    setSel(updated.find(function(x){return x.id===saved.id;}));
    setShowForm(false);setEditVac(null);
  }

  function deleteVacancy(id){
    if(!window.confirm("Delete this vacancy?"))return;
    var updated=(vacancies||[]).filter(function(v){return v.id!==id;});
    setVacancies(updated);persist("vacancies",updated);setSel(null);
  }

  function addCandidate(vac,personId){
    var pid=parseFloat(personId);
    var cands=vac.candidates||[];
    if(cands.find(function(c){return c.personId===pid;}))return;
    var stage=vac.type==="Retained"?"Longlist":"Approached";
    var newCand={personId:pid,stage:stage,interviewStage:"",notes:"",addedDate:today};
    var updated=(vacancies||[]).map(function(v){
      if(v.id!==vac.id)return v;
      return Object.assign({},v,{candidates:[...cands,newCand]});
    });
    setVacancies(updated);persist("vacancies",updated);
    setSel(updated.find(function(x){return x.id===vac.id;}));
  }

  function updateCandidate(vac,personId,updates){
    var updated=(vacancies||[]).map(function(v){
      if(v.id!==vac.id)return v;
      var cands=(v.candidates||[]).map(function(c){
        if(c.personId!==personId)return c;
        return Object.assign({},c,updates);
      });
      return Object.assign({},v,{candidates:cands});
    });
    setVacancies(updated);persist("vacancies",updated);
    setSel(updated.find(function(x){return x.id===vac.id;}));
  }

  function removeCandidate(vac,personId){
    if(!window.confirm("Remove this candidate from the vacancy?"))return;
    var updated=(vacancies||[]).map(function(v){
      if(v.id!==vac.id)return v;
      return Object.assign({},v,{candidates:(v.candidates||[]).filter(function(c){return c.personId!==personId;})});
    });
    setVacancies(updated);persist("vacancies",updated);
    setSel(updated.find(function(x){return x.id===vac.id;}));
  }

  var filtered=(vacancies||[]).filter(function(v){
    if(filterType!=="All"&&v.type!==filterType)return false;
    if(filterStatus!=="All"&&v.status!==filterStatus)return false;
    if(ownerFilter&&!(v.owners||[]).includes(ownerFilter))return false;
    if(search){
      var co=companies.find(function(c){return c.id===v.companyId;});
      var coName=co?co.name:"";
      if(!(v.title+coName).toLowerCase().includes(search.toLowerCase()))return false;
    }
    return true;
  });

  var selVac=sel?(vacancies||[]).find(function(v){return v.id===sel.id;})||null:null;
  var selCo=selVac?companies.find(function(c){return c.id===selVac.companyId;}):null;
  var selContact=selVac&&selVac.keyContactId?people.find(function(p){return p.id===selVac.keyContactId;}):null;
  var kanbanStages=selVac&&selVac.type==="Retained"?KANBAN_STAGES_RETAINED:KANBAN_STAGES_OTHER;
  var notInVac=selVac?people.filter(function(p){return!(selVac.candidates||[]).find(function(c){return c.personId===p.id;});}):[];

  // Fee display for retained
  var totalFee=selVac&&selVac.agreedSalary&&selVac.feePercent?Math.round(parseFloat(selVac.agreedSalary)*parseFloat(selVac.feePercent)/100):0;
  var tranches=totalFee?calcTranches(parseFloat(selVac.agreedSalary),parseFloat(selVac.feePercent)):null;

  return(
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      {(showForm||editVac)&&<VacancyForm init={editVac} companies={companies} people={people} onSave={saveVacancy} onClose={function(){setShowForm(false);setEditVac(null);}}/>}

      {/* Left list */}
      <div style={{width:300,borderRight:"1px solid "+G200,background:W,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid "+G200,flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontWeight:700,color:NAVY,fontSize:14}}>Vacancies <span style={{color:G400,fontWeight:400,fontSize:12}}>({(vacancies||[]).length})</span></span>
            <button onClick={function(){setShowForm(true);setEditVac(null);}} style={{background:TEAL,color:W,border:"none",borderRadius:5,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ New</button>
          </div>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search vacancies..." style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"6px 10px",fontSize:12,outline:"none",fontFamily:"inherit",marginBottom:8}}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
            {["All",...VAC_TYPES].map(function(t){
              var col=VAC_TYPE_COLORS[t]||G600;
              return <button key={t} onClick={function(){setFilterType(t);}} style={{background:filterType===t?col+"15":"transparent",color:filterType===t?col:G400,border:"1px solid "+(filterType===t?col+"40":G300),borderRadius:10,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:filterType===t?700:400}}>{t}</button>;
            })}
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {["All",...VAC_STATUSES].map(function(s){
              return <button key={s} onClick={function(){setFilterStatus(s);}} style={{background:filterStatus===s?NAVY+"15":"transparent",color:filterStatus===s?NAVY:G400,border:"1px solid "+(filterStatus===s?NAVY+"30":G300),borderRadius:10,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:filterStatus===s?700:400}}>{s}</button>;
            })}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:G400,fontSize:13}}>No vacancies found</div>}
          {filtered.map(function(v){
            var co=companies.find(function(c){return c.id===v.companyId;});
            var col=VAC_TYPE_COLORS[v.type]||G600;
            var active=selVac&&selVac.id===v.id;
            var candCount=(v.candidates||[]).length;
            var placed=(v.candidates||[]).filter(function(c){return c.stage==="Placed";}).length;
            return(
              <div key={v.id} onClick={function(){setSel(v);setKanbanView(false);}}
                style={{padding:"10px 14px",borderBottom:"1px solid "+G100,cursor:"pointer",background:active?TL:W,borderLeft:"3px solid "+(active?TEAL:"transparent")}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                  <div style={{fontWeight:600,color:NAVY,fontSize:13,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:6}}>{v.title}</div>
                  <span style={{fontSize:9,fontWeight:700,color:col,background:col+"15",borderRadius:3,padding:"1px 5px",flexShrink:0}}>{v.type}</span>
                </div>
                <div style={{fontSize:11,color:G600,marginBottom:3}}>{co?co.name:"—"}{v.location?" · "+v.location:""}</div>
                <div style={{display:"flex",gap:8,fontSize:11}}>
                  <span style={{color:G400}}>{candCount} candidates</span>
                  {placed>0&&<span style={{color:OK,fontWeight:700}}>{placed} placed</span>}
                  <span style={{color:v.status==="Active"?TEAL:G400,fontWeight:600}}>{v.status}</span>
                </div>
                {v.type!=="VoltTEAMbuild"&&v.feePercent&&<div style={{fontSize:11,color:"#7c3aed",fontWeight:600,marginTop:2}}>{fmtFee(v)}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Right detail */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {!selVac?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10,padding:40}}>
            <div style={{fontSize:32}}>◎</div>
            <div style={{fontSize:14,fontWeight:600,color:G600}}>Select a vacancy</div>
            <div style={{fontSize:13,color:G400,textAlign:"center",maxWidth:320,lineHeight:1.6}}>Create vacancies against client companies. Add candidates from the People tab and Kanban them through the interview process.</div>
            <button onClick={function(){setShowForm(true);}} style={{background:TEAL,color:W,border:"none",borderRadius:6,padding:"8px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginTop:8}}>+ New Vacancy</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
            {/* Vacancy header */}
            <div style={{background:W,borderBottom:"1px solid "+G200,padding:"16px 22px",flexShrink:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontWeight:800,fontSize:20,color:NAVY,marginBottom:4}}>{selVac.title}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:13,color:G600,fontWeight:600}}>{selCo?selCo.name:"—"}</span>
                    {selVac.location&&<span style={{fontSize:12,color:G400}}>· {selVac.location}</span>}
                    <span style={{fontSize:11,fontWeight:700,color:VAC_TYPE_COLORS[selVac.type]||G600,background:(VAC_TYPE_COLORS[selVac.type]||G600)+"15",borderRadius:4,padding:"2px 8px"}}>{selVac.type}</span>
                    {selVac.exclusive&&<span style={{fontSize:11,fontWeight:700,color:OK,background:OK+"15",borderRadius:4,padding:"2px 8px"}}>Exclusive</span>}
                    <select value={selVac.status} onChange={function(e){saveVacancy(Object.assign({},selVac,{status:e.target.value}));}} style={{fontSize:11,border:"1px solid "+G300,borderRadius:4,padding:"2px 6px",outline:"none",fontFamily:"inherit"}}>
                      {VAC_STATUSES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
                    </select>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <button onClick={function(){setKanbanView(!kanbanView);}} style={{background:kanbanView?TEAL:TL,color:kanbanView?W:TEAL,border:"1px solid "+TM,borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{kanbanView?"◎ Details":"◈ Kanban"}</button>
                  <button onClick={function(){setEditVac(selVac);}} style={{background:"transparent",border:"1px solid "+G300,borderRadius:6,padding:"6px 14px",fontSize:12,color:G600,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
                  <button onClick={function(){deleteVacancy(selVac.id);}} style={{background:"transparent",border:"1px solid "+DANGER+"44",borderRadius:6,padding:"6px 14px",fontSize:12,color:DANGER,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
                </div>
              </div>

              {/* Fee summary */}
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                {selVac.type==="VoltTEAMbuild"?(
                  <div style={{background:WARN+"10",border:"1px solid "+WARN+"30",borderRadius:6,padding:"6px 14px",fontSize:12}}>
                    <span style={{color:G600}}>Flat fee: </span><span style={{fontWeight:700,color:WARN}}>£{Number(selVac.flatFee||0).toLocaleString()} per placement</span>
                    {selVac.jobTitle&&<span style={{color:G400}}> · {selVac.jobTitle}</span>}
                  </div>
                ):(
                  <>
                    {totalFee>0&&<div style={{background:"#7c3aed10",border:"1px solid #7c3aed30",borderRadius:6,padding:"6px 14px",fontSize:12}}>
                      <span style={{color:G600}}>Total fee: </span><span style={{fontWeight:700,color:"#7c3aed"}}>£{totalFee.toLocaleString()}</span>
                      <span style={{color:G400}}> ({selVac.feePercent}% of £{Number(selVac.agreedSalary).toLocaleString()})</span>
                    </div>}
                    {selVac.salaryMin&&!selVac.agreedSalary&&<div style={{fontSize:12,color:G600,padding:"6px 0"}}>Salary range: £{Number(selVac.salaryMin).toLocaleString()} – £{Number(selVac.salaryMax||0).toLocaleString()}</div>}
                  </>
                )}
                {selContact&&<div style={{fontSize:12,color:G600,padding:"6px 0"}}>Contact: <span style={{fontWeight:600,color:NAVY}}>{selContact.name}</span></div>}
                {selVac.targetClose&&<div style={{fontSize:12,color:G600,padding:"6px 0"}}>Target close: <span style={{fontWeight:600}}>{selVac.targetClose}</span></div>}
                {(selVac.owners||[]).length>0&&<div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}><span style={{fontSize:12,color:G600}}>Assigned:</span>{(selVac.owners||[]).map(function(o){var col=OWNER_COLORS[o]||G400;return <span key={o} style={{fontSize:11,fontWeight:700,color:col,background:col+"15",borderRadius:4,padding:"2px 8px"}}>{o}</span>;})}</div>}
              </div>

              {/* Retained tranches */}
              {selVac.type==="Retained"&&tranches&&(
                <div style={{marginTop:10,background:G50,border:"1px solid "+G200,borderRadius:6,padding:"10px 14px"}}>

// Hash function - simple but effective for this use case
function hashCode(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    const char=str.charCodeAt(i);
    hash=((hash<<5)-hash)+char;
    hash=hash&hash;
  }
  return hash.toString(36);
}
// Password hash - change the password by updating this value
// Current password: Volt1881!
const PASS_HASH=hashCode("Volt1881!");

function PasswordScreen({onUnlock}){
  const[pw,setPw]=useState("");
  const[error,setError]=useState("");
  const[show,setShow]=useState(false);
  const check=()=>{
    if(hashCode(pw)===PASS_HASH){
      sessionStorage.setItem("volt_auth","1");
      onUnlock();

      setError("Incorrect password");
      setPw("");
    }
  };
  return(
    <div style={{background:NAVY,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"Aptos,Calibri,'Segoe UI',sans-serif"}}>

  const[companies,setCompanies]=useState(SEED_COMPANIES);
  const[network,setNetwork]=useState([]);
  const[vacancies,setVacancies]=useState([]);
  const[ready,setReady]=useState(false);
  const[saveState,setSaveState]=useState(null);
  const[syncStatus,setSyncStatus]=useState("loading");

  useEffect(()=>{
    (async()=>{
      setSyncStatus("loading");
      try {
        const data = await loadFromAirtable();
        // Use Airtable data if it has records
        if(data.people && data.people.length>0) {
          setPeople(data.people.map(function(p){return migratePerson(Object.assign({},p,{relationship:migrateRelationship(p.relationship)}));}));
        } else {
          // Try localStorage cache
          const sp=await sGet("voltcrm5-people");
          if(sp && sp.length>0) setPeople(JSON.parse(typeof sp==="string"?sp:JSON.stringify(sp)).map(function(p){return migratePerson(Object.assign({},p,{relationship:migrateRelationship(p.relationship)}));}));
          // else keep SEED_PEOPLE (already set as default state)
        }
        if(data.companies && data.companies.length>0) {
          setCompanies(data.companies.map(function(co){return Object.assign({},co,{relationship:migrateRelationship(co.relationship||"")});}));
        } else {
          const sc=await sGet("voltcrm5-companies");
          if(sc && sc.length>0) setCompanies(JSON.parse(typeof sc==="string"?sc:JSON.stringify(sc)).map(function(co){return Object.assign({},co,{relationship:migrateRelationship(co.relationship||"")});}));
          // else keep SEED_COMPANIES
        }
        const snet=await sGet("voltcrm5-network");
        if(snet && snet.length>0) setNetwork(JSON.parse(typeof snet==="string"?snet:JSON.stringify(snet)));
        const svac=await sGet("voltcrm5-vacancies");
        if(svac && svac.length>0) setVacancies(JSON.parse(typeof svac==="string"?svac:JSON.stringify(svac)));
        setSyncStatus("ok");
        // If Airtable was empty, push seed data up so all users see it
        if((!data.people||data.people.length===0)&&(!data.companies||data.companies.length===0)){
          try {
            await saveToAirtable("PEOPLE", SEED_PEOPLE);
            await saveToAirtable("COMPANIES", SEED_COMPANIES);
          } catch(e3){ console.warn("Seed push failed:", e3.message); }
        }
      } catch(e) {
        console.warn("Airtable load failed, using local cache:", e.message);
        try {
          const sp=await sGet("voltcrm5-people");
          const sc=await sGet("voltcrm5-companies");
          if(sp) setPeople(JSON.parse(typeof sp==="string"?sp:JSON.stringify(sp)));
          if(sc) setCompanies(JSON.parse(typeof sc==="string"?sc:JSON.stringify(sc)));
        } catch(e2) { /* keep seed data */ }
        setSyncStatus("offline");
      }
      setReady(true);
    })();
  },[]);

  const persist=useCallback(async(key,data)=>{
    setSaveState("saving");
    // Always save to localStorage immediately
    await sSet("voltcrm5-"+key, data);
    // Then sync to Airtable
    try {
      if(key==="people") await saveToAirtable("PEOPLE", data);
      else if(key==="companies") await saveToAirtable("COMPANIES", data);
      else if(key==="network") await saveToAirtable("NETWORK", data);
      else if(key==="vacancies") await saveToAirtable("VACANCIES", data);
      setSyncStatus("ok");
    } catch(e) {
      console.warn("Airtable save failed:", e.message);
      setSyncStatus("offline");

            const active=ownerFilter===name;
            return(
              <div key={name} onClick={()=>{var next=active?null:name;setOwnerFilter(next);if(next)sessionStorage.setItem("volt_owner",next);else sessionStorage.removeItem("volt_owner");}}
                style={{display:"flex",alignItems:"center",gap:9,marginBottom:6,cursor:"pointer",padding:"5px 8px",borderRadius:6,background:active?col+"15":"transparent",border:"1px solid "+(active?col+"40":"transparent"),transition:"all 0.12s"}}>
                <Av name={name} size={24} color={col}/>
                <span style={{fontSize:13,color:active?col:G700,fontWeight:active?700:400}}>{name}</span>
                {active&&<span style={{marginLeft:"auto",fontSize:10,color:col,fontWeight:700}}>● my view</span>}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {isLocalFile&&(
          <div style={{background:"#fff8e1",borderBottom:"1px solid "+WARN,padding:"8px 24px",fontSize:12,color:G700,flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontWeight:700,color:WARN}}>⚠ Running from local file:</span>
            LinkedIn AI import may be blocked by your browser. For full features, host on Netlify (drag & drop at netlify.com/drop) or open via a local server.
          </div>
        )}
        <div style={{background:W,borderBottom:"1px solid "+G200,padding:"12px 24px",display:"flex",alignItems:"center",gap:16,flexShrink:0}}>
          <GlobalSearch people={people} companies={companies} onNavigate={handleNavigate}/>
          {ownerFilter&&<div style={{display:"flex",alignItems:"center",gap:8,background:TEAL+"15",border:"1px solid "+TEAL+"40",borderRadius:20,padding:"4px 12px",fontSize:12,color:TEAL,fontWeight:600,whiteSpace:"nowrap"}}>
            {ownerFilter}&apos;s view
            <button onClick={()=>{setOwnerFilter(null);sessionStorage.removeItem("volt_owner");}} style={{background:"none",border:"none",color:TEAL,cursor:"pointer",fontSize:14,lineHeight:1,fontWeight:700,padding:"0 0 0 4px"}}>×</button>
          </div>}
          <div style={{fontSize:12,color:G400,whiteSpace:"nowrap"}}>{people.length+" people · "+companies.length+" companies"}</div>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>
          {view==="bd"&&<BDTracker people={people} companies={companies} setPeople={setPeople} setCompanies={setCompanies} persist={persist} ownerFilter={ownerFilter}/>}
          {view==="pipeline"&&<BDPipelineView people={people} setPeople={setPeople} persist={persist} ownerFilter={ownerFilter}/>}
          {view==="people"&&<PeopleView people={people} setPeople={setPeople} companies={companies} setCompanies={setCompanies} persist={persist} initialSel={navSel} ownerFilter={ownerFilter}/>}
          {view==="companies"&&<CompaniesView companies={companies} setCompanies={setCompanies} people={people} setPeople={setPeople} persist={persist} initialSel={navSel} onNavigatePerson={id=>{handleNavigate("people",id);}} ownerFilter={ownerFilter}/>}
          {view==="vacancies"&&<VacanciesView vacancies={vacancies} setVacancies={setVacancies} companies={companies} setCompanies={setCompanies} people={people} setPeople={setPeople} persist={persist} ownerFilter={ownerFilter}/>}
          {view==="network"&&<VoltNetworkView network={network} setNetwork={setNetwork} persist={persist} ownerFilter={ownerFilter}/>}
          {view==="map"&&<MarketMap people={people} companies={companies} onNavigate={handleNavigate} ownerFilter={ownerFilter}/>}
        </div>
      </div>

      {/* Sync status indicator */}
      <div style={{position:"fixed",bottom:18,right:20,zIndex:500,pointerEvents:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {saveState==="saving"&&<div style={{background:G50,border:"1px solid "+G300,borderRadius:20,padding:"4px 14px",fontSize:11,color:G600,fontWeight:600}}>⟳ Syncing…</div>}
          {saveState==="saved"&&<div style={{background:OK+"15",border:"1px solid "+OK,borderRadius:20,padding:"4px 14px",fontSize:11,color:OK,fontWeight:600}}>✓ Saved</div>}
          {saveState==="error"&&<div style={{background:DANGER+"15",border:"1px solid "+DANGER,borderRadius:20,padding:"4px 14px",fontSize:11,color:DANGER,fontWeight:600}}>✗ Save failed</div>}
          {!saveState&&syncStatus==="ok"&&<div style={{background:OK+"10",border:"1px solid "+OK+"40",borderRadius:20,padding:"4px 14px",fontSize:11,color:OK,fontWeight:600}}>● Airtable connected</div>}
          {!saveState&&syncStatus==="offline"&&<div style={{background:WARN+"15",border:"1px solid "+WARN,borderRadius:20,padding:"4px 14px",fontSize:11,color:WARN,fontWeight:600}}>⚠ Offline — local only</div>}
          {!saveState&&syncStatus==="loading"&&<div style={{background:G50,border:"1px solid "+G300,borderRadius:20,padding:"4px 14px",fontSize:11,color:G600,fontWeight:600}}>⟳ Connecting…</div>}
          {!saveState&&syncStatus==="error"&&<div style={{background:DANGER+"15",border:"1px solid "+DANGER,borderRadius:20,padding:"4px 14px",fontSize:11,color:DANGER,fontWeight:600}}>✗ Airtable error</div>}
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
