// ── Airtable sync (simple JSON blob approach) ─────────────────
// Credentials stored in browser localStorage — never in the file
let AT_TOKEN  = localStorage.getItem("volt_at_token") || "";
let AT_BASE   = localStorage.getItem("volt_at_base")  || "";
let AT_TABLE  = localStorage.getItem("volt_at_table") || "";
const AT_URL    = "https://api.airtable.com/v0/" + AT_BASE + "/" + AT_TABLE;

async function atGet(url) {
  const r = await fetch(url, {headers:{"Authorization":"Bearer "+AT_TOKEN}});
  if(!r.ok) throw new Error("AT " + r.status + " " + await r.text());
  return r.json();
}
async function atPost(url, body) {
  const r = await fetch(url, {method:"POST",headers:{"Authorization":"Bearer "+AT_TOKEN,"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("AT " + r.status + " " + await r.text());
  return r.json();
}
async function atDelete(recId) {
  if(!recId) return;
  const r = await fetch(AT_URL+"/"+recId, {method:"DELETE",headers:{"Authorization":"Bearer "+AT_TOKEN}});
  if(!r.ok) console.warn("AT DELETE failed", r.status);
}
async function atPatch(url, body) {
  const r = await fetch(url, {method:"PATCH",headers:{"Authorization":"Bearer "+AT_TOKEN,"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("AT " + r.status + " " + await r.text());
  return r.json();
}

// ── Per-row Airtable layer (async/await version) ──────────────
// Each record is its own Airtable row. No single blob.

async function atListAll() {
  let records = [], offset = null;
  do {
    const data = await atGet(AT_URL + "?pageSize=100" + (offset ? "&offset=" + offset : ""));
    records = records.concat(data.records || []);
    offset = data.offset || null;
  } while(offset);
  return records;
}

async function loadFromAirtable() {
  const records = await atListAll();
  const people = [], companies = [], network = [], vacancies = [];
  for(const rec of records) {
    const rt = (rec.fields.RecordType || "").toUpperCase();
    const dataStr = rec.fields.Data || "[]";
    try {
      if(rt === "PERSON")    { const p = JSON.parse(dataStr); p._recId = rec.id; people.push(p); }
      else if(rt === "COMPANY")  { const c = JSON.parse(dataStr); c._recId = rec.id; companies.push(c); }
      else if(rt === "NETWORK")  { const n = JSON.parse(dataStr); n._recId = rec.id; network.push(n); }
      else if(rt === "VACANCY")  { const v = JSON.parse(dataStr); v._recId = rec.id; vacancies.push(v); }
    } catch(e) { console.warn("Parse error", rec.id, e); }
  }
  if(people.length)    localStorage.setItem("voltcrm5-people",    JSON.stringify(people));
  if(companies.length) localStorage.setItem("voltcrm5-companies", JSON.stringify(companies));
  if(network.length)   localStorage.setItem("voltcrm5-network",   JSON.stringify(network));
  if(vacancies.length) localStorage.setItem("voltcrm5-vacancies", JSON.stringify(vacancies));
  return { people, companies, network, vacancies };
}

async function saveToAirtable(name, data) {
  const _n = (name||"").toLowerCase();
  const recType = _n === "people" ? "PERSON"
                : _n === "companies" ? "COMPANY"
                : _n === "network" ? "NETWORK"
                : "VACANCY";
  var items = data || [];
  // Split into new (no _recId) and existing (has _recId)
  var toCreate = items.filter(function(x){ return !x._recId; });
  var toUpdate = items.filter(function(x){ return !!x._recId; });

  // Helper: chunk array into groups of n
  function chunk(arr, n) {
    var out = [];
    for(var i=0; i<arr.length; i+=n) out.push(arr.slice(i,i+n));
    return out;
  }
  // Helper: delay
  function delay(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

  // CREATE in batches of 10
  var createBatches = chunk(toCreate, 10);
  for(var ci=0; ci<createBatches.length; ci++) {
    var batch = createBatches[ci];
    var records = batch.map(function(item){
      var nameField = item.name || item.title || ("Record " + (item.id || ""));
      return { fields: { Name: nameField, RecordType: recType, Data: JSON.stringify(item) } };
    });
    var res = await atPost(AT_URL, { records: records });
    res.records.forEach(function(r, idx){ batch[idx]._recId = r.id; });
    if(ci < createBatches.length - 1) await delay(250);
  }

  // UPDATE in batches of 10
  var updateBatches = chunk(toUpdate, 10);
  for(var ui=0; ui<updateBatches.length; ui++) {
    var ubatch = updateBatches[ui];
    var urecords = ubatch.map(function(item){
      var nameField = item.name || item.title || ("Record " + (item.id || ""));
      return { id: item._recId, fields: { Name: nameField, RecordType: recType, Data: JSON.stringify(item) } };
    });
    await atPatch(AT_URL, { records: urecords });
    if(ui < updateBatches.length - 1) await delay(250);
  }
}

  delete: async k => { try { localStorage.removeItem(k); return {key:k,deleted:true}; } catch(e){ return null; } },
  list: async prefix => { try { const keys=Object.keys(localStorage).filter(k=>!prefix||k.startsWith(prefix)); return {keys}; } catch(e){ return {keys:[]}; } }

// Migrate old single owner string to array
function splitName(fullName){
  if(!fullName||!fullName.trim())return{firstName:"",lastName:""};
  var parts=fullName.trim().split(" ");
  if(parts.length===1)return{firstName:parts[0],lastName:""};
  return{firstName:parts[0],lastName:parts.slice(1).join(" ")};
}

function migratePerson(p){
  if(p.firstName||p.lastName)return p;
  var split=splitName(p.name||"");
  return Object.assign({},p,{firstName:split.firstName,lastName:split.lastName});
}

function migrateRelationship(rel){

  if(r==="active")return"Active";

}

function normalize(s){return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function similarity(a,b){
  const na=normalize(a),nb=normalize(b);
  if(!na||!nb)return 0;
  if(na===nb)return 1;
  if(na.includes(nb)||nb.includes(na))return 0.85;
  const bigrams=s=>{const b=new Set();for(let i=0;i<s.length-1;i++)b.add(s.slice(i,i+2));return b;};
  const ba=bigrams(na),bb=bigrams(nb);
  let inter=0;ba.forEach(g=>{if(bb.has(g))inter++;});
  return(2*inter)/(ba.size+bb.size||1);
}
function findDupePeople(name,company,people,excludeId){
  return people.filter(p=>{
    if(p.id===excludeId)return false;
    const ns=similarity(name,p.name);
    if(ns<0.8)return false;
    if(company&&p.company)return similarity(company,p.company)>0.7||ns>0.92;
    return ns>0.92;
  });
}
function findDupeCompanies(name,companies,excludeId){
  return companies.filter(c=>c.id!==excludeId&&similarity(name,c.name)>=0.82);
}
function autoLinkCompany(personCompany,companies){
  if(!personCompany||!personCompany.trim())return{companies,companyId:null};
  const match=companies.find(c=>similarity(personCompany,c.name)>=0.82);
  if(match)return{companies,companyId:match.id};
  const newCo={id:Date.now()+Math.random(),name:personCompany,type:"Consulting",tier:"Prospect",hq:"",keyContact:"",openVacancies:0,lastContacted:"",nextAction:"",nextDue:"",relationship:"Passive",notes:"Auto-created from people record."};
  return{companies:[...companies,newCo],companyId:newCo.id};
}

function QuickLog({item,onUpdate}){
  const[note,setNote]=useState("");
  const[na,setNa]=useState(item.nextAction||"");
  const[nd,setNd]=useState(item.nextDue||"");
  const log=()=>{
    const ts=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    const newNote=note.trim()?"["+ts+"] "+note.trim()+"\n\n"+(item.notes||""):item.notes;
    onUpdate({notes:newNote,lastContacted:today,nextAction:na,nextDue:nd});
    setNote("");
  };
  return(
    <div style={{background:G50,borderRadius:8,padding:"18px 20px",border:"1px solid "+G200}}>
      <div style={{fontSize:11,color:TEAL,marginBottom:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Log Interaction</div>

        <div>
          <div style={{fontSize:11,color:G600,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Next Action</div>
          <Inp value={na} onChange={setNa} placeholder="Follow up / Send JD…"/>
        </div>
        <div>
          <div style={{fontSize:11,color:G600,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Due Date</div>
          <Inp type="date" value={nd} onChange={setNd}/>
        </div>
      </div>
      <div style={{marginTop:10,display:"flex",justifyContent:"flex-end"}}>
        <Btn small onClick={log}>✓ Log & Update</Btn>
      </div>
    </div>
  );
}

  const[text,setText]=useState("");
  const[loading,setLoading]=useState(false);

const CSV_MAP={"name":"name","full name":"name","fullname":"name","first name":"firstName","firstname":"firstName","last name":"lastName","lastname":"lastName","surname":"lastName","phone":"phone","phone number":"phone","mobile":"phone","mobile phone":"phone","work direct phone":"phone","corporate phone":"phone","home phone":"phone","mobile number":"phone","title":"title","job title":"title","position":"title","role":"title","company":"company","company name":"company","company name for emails":"ignore","employer":"company","organization":"company","organisation":"company","location":"location","city":"location","linkedin":"linkedin","linkedin url":"linkedin","person linkedin url":"linkedin","url":"ignore","company linkedin url":"ignore","facebook url":"ignore","twitter url":"ignore","website":"ignore","email":"email","email address":"email","work email":"email","relationship":"relationship","status":"ignore","email status":"ignore","stage":"ignore","sectors":"sectors","sector":"sectors","expertise":"sectors","departments":"sectors","industry":"ignore","notes":"notes","note":"notes","comments":"notes","keywords":"ignore","seniority":"seniority","level":"seniority","last contacted":"lastContacted","last contact":"lastContacted","next action":"nextAction","action":"nextAction","next due":"nextDue","due date":"nextDue","due":"nextDue","type":"type","country":"ignore","state":"ignore"};

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return{headers:[],rows:[]};
  const first=lines[0];
  const delim=first.split("\t").length>first.split(",").length?"\t":",";
  const parseRow=line=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'&&!inQ)inQ=true;
      else if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
      else if(c==='"'&&inQ)inQ=false;
      else if(c===delim&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=c;
    }
    cols.push(cur.trim());return cols;
  };
  const headers=parseRow(lines[0]).map(h=>h.replace(/^"|"$/g,"").trim());
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseRow(l);const obj={};
    headers.forEach((h,i)=>{obj[h]=vals[i]||"";});return obj;
  });
  return{headers,rows};
}

function CSVImporter({people,companies,setPeople,setCompanies,persist,onClose}){
  const[assignOwner,setAssignOwner]=useState("");
  const[step,setStep]=useState("upload");
  const[raw,setRaw]=useState("");
  const[parsed,setParsed]=useState(null);
  const[mappings,setMappings]=useState({});
  const[preview,setPreview]=useState([]);
  const[results,setResults]=useState(null);
  const fileRef=useRef(null);
  const CRM_FIELDS=["ignore","firstName","lastName","name","title","company","location","type","seniority","sectors","linkedin","email","phone","relationship","lastContacted","nextAction","nextDue","notes"];

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>processText(ev.target.result);
    reader.readAsText(file);
  };
  const processText=text=>{
    setRaw(text);const p=parseCSV(text);setParsed(p);
    const auto={};
    p.headers.forEach(h=>{auto[h]=CSV_MAP[h.toLowerCase().trim()]||"ignore";});
    setMappings(auto);setStep("map");
  };
  const mapRow=row=>{
    const p={type:"candidate",name:"",firstName:"",lastName:"",title:"",company:"",location:"",seniority:"Manager / Principal",sectors:[],linkedin:"",email:"",phone:"",lastContacted:today,nextAction:"",nextDue:"",relationship:"",notes:"",type:"contact"};
    Object.entries(mappings).forEach(([csvH,crmF])=>{
      if(!crmF||crmF==="ignore")return;
      const val=(row[csvH]||"").trim();if(!val)return;
      if(crmF==="sectors")p.sectors=val.split(/[,;|]/).map(s=>s.trim()).filter(Boolean);
      else p[crmF]=val;
    });
    if(p.firstName||p.lastName){p.name=(p.firstName+" "+p.lastName).trim();}
    const tl=(p.type||"").toLowerCase();p.type=tl.includes("contact")||tl.includes("client")?"contact":"candidate";
    const rl=(p.relationship||"").toLowerCase();p.relationship=rl.includes("active")?"Active":rl.includes("passive")?"Passive":"";
    return p;
  };
  const[importProgress,setImportProgress]=useState(null);

  const runImport=async function(){
    var allRows=parsed.rows.map(mapRow).filter(function(r){return r.name.trim();});
    var np=people.slice();
    var nc=companies.slice();
    var added=0,skipped=0;
    var BATCH=10;
    var totalBatches=Math.ceil(allRows.length/BATCH);

    // Build all new records first
    var newRecords=[];
    allRows.forEach(function(r){
      if(findDupePeople(r.name,r.company,np).length>0){skipped++;return;}
      var linked=autoLinkCompany(r.company,nc);
      nc=linked.companies;
      var newPerson=Object.assign({},r,{id:Date.now()+Math.random(),companyId:linked.companyId,owners:assignOwner?[assignOwner]:[],type:r.type||"contact"});
      newRecords.push(newPerson);
      np.push(newPerson);
      added++;
    });

    // Save companies first (usually small)
    await sSet("voltcrm5-companies",nc);
    try{await saveToAirtable("COMPANIES",nc);}catch(e){console.warn("Companies save failed:",e.message);}

    // Save people in batches
    setImportProgress({current:0,total:totalBatches,added:added});
    await sSet("voltcrm5-people",np);
    setPeople(np);

    for(var i=0;i<totalBatches;i++){
      setImportProgress({current:i+1,total:totalBatches,added:added});
      try{
        await saveToAirtable("PEOPLE",np);
        // Queue removal on success
        try{
          var q=JSON.parse(localStorage.getItem("volt_sync_queue")||"{}");
          delete q["people"];
          localStorage.setItem("volt_sync_queue",JSON.stringify(q));
        }catch(e){}
        // Success - no need to continue batching, one full write worked
        break;
      }catch(e){
        console.warn("Batch "+(i+1)+" failed:",e.message);
        // Queue for retry
        try{
          var q2=JSON.parse(localStorage.getItem("volt_sync_queue")||"{}");
          q2["people"]={data:np,ts:Date.now()};
          localStorage.setItem("volt_sync_queue",JSON.stringify(q2));
        }catch(e2){}
        if(i<totalBatches-1){
          // Wait 500ms before retry
          await new Promise(function(res){setTimeout(res,500);});
        }
      }
    }

    // Verify - fetch back from Airtable to confirm
    setImportProgress({current:totalBatches,total:totalBatches,added:added,verifying:true});
    try{
      var verified=await loadFromAirtable();
      var confirmedCount=verified.people?verified.people.length:0;
      console.log("Verified Airtable has",confirmedCount,"people after import");
    }catch(e){
      console.warn("Verification fetch failed:",e.message);
    }

    setImportProgress(null);
    setCompanies(nc);
    setResults({added:added,skipped:skipped,total:allRows.length});
    setStep("done");
  };

  if(importProgress)return(
    <div style={{padding:"20px",textAlign:"center"}}>
      <div style={{fontSize:14,fontWeight:600,color:NAVY,marginBottom:16}}>
        {importProgress.verifying?"Verifying sync...":"Importing contacts..."}
      </div>
      <div style={{background:G100,borderRadius:20,height:8,marginBottom:12,overflow:"hidden"}}>
        <div style={{background:TEAL,height:"100%",borderRadius:20,transition:"width 0.3s",width:(importProgress.current/importProgress.total*100)+"%"}}></div>
      </div>
      <div style={{fontSize:13,color:G600}}>
        {importProgress.verifying?
          "Confirming data saved to Airtable...":
          "Batch "+importProgress.current+" of "+importProgress.total+" · "+importProgress.added+" contacts ready"}
      </div>
    </div>
  );

  if(step==="upload")return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:20,lineHeight:1.6}}>Import from any CSV or TSV — LinkedIn exports, spreadsheets, old CRM. Auto-maps columns, detects duplicates, links to companies.</p>
      <div style={{border:"2px dashed "+G300,borderRadius:10,padding:"32px",textAlign:"center",marginBottom:16,background:G50}}>
        <div style={{fontSize:32,marginBottom:10}}>📄</div>
        <div style={{fontWeight:600,color:NAVY,marginBottom:6}}>Drop a CSV or TSV file</div>
        <div style={{color:G600,fontSize:13,marginBottom:16}}>or click to browse</div>
        <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" onChange={handleFile} style={{display:"none"}}/>
        <Btn onClick={()=>fileRef.current&&fileRef.current.click()}>Choose File</Btn>
      </div>
      <div style={{marginBottom:8,color:G600,fontSize:12,textAlign:"center"}}>— or paste CSV data directly —</div>
      <Tarea value={raw} onChange={setRaw} placeholder={"name,title,company,location\nDr. Sarah Chen,VP Strategy,Huron Consulting,London"} rows={4}/>
      {raw.trim()&&<div style={{marginTop:10,display:"flex",justifyContent:"flex-end"}}><Btn onClick={()=>processText(raw)}>Parse →</Btn></div>}
    </div>
  );

  if(step==="map"&&parsed)return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:16}}><strong style={{color:NAVY}}>{parsed.rows.length} rows</strong>, <strong style={{color:NAVY}}>{parsed.headers.length} columns</strong>. Map each column to a CRM field.</p>
      <div style={{border:"1px solid "+G200,borderRadius:8,overflow:"hidden",marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:G100,padding:"10px 16px",fontSize:11,fontWeight:700,color:G600,textTransform:"uppercase"}}>
          <div>CSV Column</div><div>Sample</div><div>Map to</div>
        </div>
        {parsed.headers.map((h,i)=>(
          <div key={h} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"10px 16px",borderTop:"1px solid "+G200,alignItems:"center",background:i%2===0?W:G50}}>
            <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{h}</div>
            <div style={{fontSize:12,color:G600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{((parsed.rows[0]?parsed.rows[0][h]:"")||"—").slice(0,25)}</div>
            <SelEl value={mappings[h]||"ignore"} onChange={v=>setMappings(m=>({...m,[h]:v}))} options={CRM_FIELDS} style={{fontSize:12,padding:"5px 8px"}}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={()=>setStep("upload")}>← Back</Btn>
        <Btn onClick={()=>{setPreview(parsed.rows.slice(0,5).map(mapRow));setStep("preview");}}>Preview →</Btn>
      </div>
    </div>
  );

  if(step==="preview")return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:16}}>First 5 of <strong style={{color:NAVY}}>{parsed.rows.length}</strong> rows. Duplicates skipped automatically.</p>
      <div style={{border:"1px solid "+G200,borderRadius:8,overflow:"hidden",marginBottom:16}}>
        {preview.map((p,i)=>(
          <div key={i} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",borderBottom:"1px solid "+G200,background:i%2===0?W:G50}}>
            <Av name={p.name||"?"} size={32} color={p.type==="contact"?"#6f42c1":TEAL}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{p.name||"(no name)"}</div>
              <div style={{fontSize:12,color:G600}}>{[p.title,p.company,p.location].filter(Boolean).join(" · ")}</div>
            </div>
            <RelDot rel={p.relationship}/>
          </div>
        ))}
      </div>
      <div style={{background:TL,border:"1px solid "+TM,borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:13,color:NAVY}}>
        <strong style={{color:TEAL}}>On import:</strong> each person is duplicate-checked, linked to their company (auto-created if needed), and added instantly.
      </div>
      <div style={{marginBottom:12,padding:"12px 14px",background:TL,border:"1px solid "+TM,borderRadius:8}}>
        <div style={{fontSize:11,color:TEAL,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Assign imported contacts to</div>
        <div style={{display:"flex",gap:8}}>
          {["","David","Lauren","Brinda"].map(function(o){
            var col=o?OWNER_COLORS[o]||G400:G400;
            var active=assignOwner===o;
            return <button key={o||"none"} onClick={function(){setAssignOwner(o);}} style={{background:active?col+"20":"transparent",color:active?col:G600,border:"1px solid "+(active?col+"60":G300),borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:active?700:400,cursor:"pointer",fontFamily:"inherit"}}>{o||"Unassigned"}</button>;
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={()=>setStep("map")}>← Back</Btn>
        <Btn onClick={runImport}>Import {parsed.rows.length} People</Btn>
      </div>
    </div>
  );

  if(step==="done"&&results)return(
    <div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48,marginBottom:16}}>✓</div>
      <h3 style={{fontSize:20,fontWeight:700,color:NAVY,marginBottom:20}}>Import complete</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:360,margin:"0 auto 24px"}}>
        <div style={{background:OK+"10",border:"1px solid "+OK+"30",borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:OK}}>{results.added}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Added</div>
        </div>
        <div style={{background:WARN+"10",border:"1px solid "+WARN+"30",borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:WARN}}>{results.skipped}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Skipped</div>
        </div>
        <div style={{background:G50,border:"1px solid "+G200,borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:NAVY}}>{results.total}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Total</div>
        </div>
      </div>
      <Btn onClick={onClose}>Done</Btn>
    </div>
  );
  return null;
}


// ── Inline-editable overview tab ─────────────────────────────
function CopyBtn({value}){
  var[copied,setCopied]=useState(false);
  function doCopy(){
    if(!value)return;
    navigator.clipboard.writeText(value).then(function(){
      setCopied(true);
      setTimeout(function(){setCopied(false);},1500);
    });
  }
  return(
    <button onClick={doCopy} style={{background:copied?OK+"15":"transparent",color:copied?OK:G400,border:"1px solid "+(copied?OK+"40":G200),borderRadius:5,padding:"3px 8px",fontSize:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0,transition:"all 0.2s"}}>
      {copied?"✓ Copied":"Copy"}
    </button>
  );
}


function InlineField({label,value,onChange,type="text",href,linkLabel}){
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(value||"");
  const[copied,setCopied]=useState(false);
  const inputRef=useRef(null);
  useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus();},[editing]);

  const commit=()=>{onChange(draft);setEditing(false);};
  const cancel=()=>{setDraft(value||"");setEditing(false);};
  const copyVal=function(){
    if(!value)return;
    navigator.clipboard.writeText(value).then(function(){
      setCopied(true);
      setTimeout(function(){setCopied(false);},1500);
    });
  };

  return(
    <div style={{borderBottom:"1px solid "+G100,paddingBottom:10,marginBottom:10}}>
      <div style={{fontSize:10.5,color:G400,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
      {editing?(
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input ref={inputRef} type={type} value={draft} onChange={e=>setDraft(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")cancel();}}
            style={{flex:1,background:W,border:"1.5px solid "+TEAL,borderRadius:6,padding:"6px 10px",color:G900,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={commit} style={{background:TEAL,color:W,border:"none",borderRadius:5,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
          <button onClick={cancel} style={{background:"transparent",color:G400,border:"1px solid "+G300,borderRadius:5,padding:"5px 8px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",gap:8,minHeight:24}}>
          {value?(
            href
              ?<a href={href.startsWith("http")||href.startsWith("mailto")||href.startsWith("tel")?href:"https://"+href} target={href.startsWith("mailto")||href.startsWith("tel")?"_self":"_blank"} rel="noreferrer" style={{color:TEAL,fontSize:13,fontWeight:600,textDecoration:"none",flex:1}}>{linkLabel||value}</a>
              :<span style={{color:NAVY,fontSize:13,fontWeight:600,flex:1}}>{value}</span>
          ):(
            <span style={{color:G300,fontSize:13,fontStyle:"italic",flex:1}}>Click to add…</span>
          )}
          {value&&<button onClick={copyVal} style={{background:copied?OK+"15":"transparent",color:copied?OK:G400,border:"1px solid "+(copied?OK+"40":G200),borderRadius:5,padding:"3px 8px",fontSize:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0,transition:"all 0.2s"}}>{copied?"✓ Copied":"Copy"}</button>}
          <button onClick={()=>{setDraft(value||"");setEditing(true);}}
            style={{background:"transparent",border:"1px solid "+G200,borderRadius:5,padding:"3px 8px",fontSize:11,color:G400,cursor:"pointer",fontFamily:"inherit",flexShrink:0,opacity:0.7}}>
            ✏
          </button>
        </div>
      )}
    </div>
  );
}

function AddToVacancy({selP,vacancies,setVacancies,persist}){
  var allVacs=vacancies||[];
  var personVacs=allVacs.filter(function(v){
    return (v.candidates||[]).some(function(c){return c.personId===selP.id;});
  });
  var activeVacs=allVacs.filter(function(v){
    return v.status==="Active"&&!(v.candidates||[]).some(function(c){return c.personId===selP.id;});
  });

  function addToVac(vacId){
    if(!vacId)return;
    var vid=parseFloat(vacId);
    var vac=allVacs.find(function(v){return v.id===vid;});
    if(!vac)return;
    var stage=vac.type==="Retained"?"Longlist":"Approached";
    var newCand={personId:selP.id,stage:stage,interviewStage:"",notes:"",addedDate:today};
    var newCands=(vac.candidates||[]).slice();
    newCands.push(newCand);
    var updated=allVacs.map(function(v){
      if(v.id!==vid)return v;
      return Object.assign({},v,{candidates:newCands});
    });
    setVacancies(updated);persist("vacancies",updated);
  }

  return(
    <div style={{background:W,borderRadius:8,border:"1px solid "+G200,padding:"14px 18px",marginBottom:14}}>
      <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Vacancies</div>
      {personVacs.length>0&&(
        <div style={{marginBottom:8}}>
          {personVacs.map(function(v){
            var cand=(v.candidates||[]).find(function(c){return c.personId===selP.id;});
            var col=VAC_TYPE_COLORS[v.type]||G400;
            return(
              <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+G100}}>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:NAVY}}>{v.title}</div>
                  <div style={{fontSize:11,color:G600}}>{cand?cand.stage:""}</div>
                </div>
                <span style={{fontSize:10,fontWeight:700,color:col,background:col+"15",borderRadius:3,padding:"1px 6px"}}>{v.type}</span>
              </div>
            );
          })}
        </div>
      )}
      <select onChange={function(e){addToVac(e.target.value);e.target.value="";}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:12,outline:"none",fontFamily:"inherit",color:G600}}>
        <option value="">+ Add to vacancy...</option>
        {activeVacs.map(function(v){return <option key={v.id} value={v.id}>{v.title} ({v.type})</option>;})}
      </select>
    </div>
  );
}

const BLANKCO={name:"",type:"",tier:"",hq:"",keyContact:"",openVacancies:0,lastContacted:today,nextAction:"",nextDue:"",notes:"",owners:[]};
function CompanyForm({init,onSave,onClose,companies,isEdit}){
  const[f,setF]=useState({...BLANKCO,...(init||{})});
  const[dupes,setDupes]=useState([]);
  const[dismissed,setDismissed]=useState(false);
  const s=k=>v=>setF(p=>({...p,[k]:v}));
  const handleSave=()=>{
    if(!f.name.trim())return;
    if(!dismissed&&!isEdit){
      const found=findDupeCompanies(f.name,companies,init&&init.id);
      if(found.length>0){setDupes(found);return;}
    }
    onSave(f);onClose();
  };
  return(
    <>
      {dupes.length>0&&<DupeBanner dupes={dupes} onDismiss={()=>{setDupes([]);setDismissed(true);}}/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>

        <Fld label="Tier"><SelEl value={f.tier||""} onChange={s("tier")} options={[{v:"",l:"— Select tier —"},{v:"Active Client",l:"Active Client"},{v:"Prospect",l:"Prospect"},{v:"Inactive",l:"Inactive"}]}/></Fld>
        <Fld label="HQ"><Inp value={f.hq} onChange={s("hq")} placeholder="Boston, US"/></Fld>
        <Fld label="Key Contact"><Inp value={f.keyContact} onChange={s("keyContact")} placeholder="Maria Lopez"/></Fld>
        <Fld label="Open Vacancies"><Inp value={f.openVacancies} onChange={s("openVacancies")} type="number"/></Fld>
        
        <Fld label="Last Contacted"><Inp type="date" value={f.lastContacted} onChange={s("lastContacted")}/></Fld>

      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        <Btn onClick={handleSave}>{isEdit?"Update":"Save Company"}</Btn>
      </div>
    </>
  );
}

var CO_CSV_MAP={"company name":"name","company":"name","name":"name","organisation":"name","organization":"name","type":"type","sector":"type","industry":"type","tier":"tier","hq":"hq","location":"hq","city":"hq","headquarters":"hq","key contact":"keyContact","contact":"keyContact","website":"website","notes":"notes","note":"notes","comments":"notes"};

function CompanyCSVImporter({companies,setCompanies,persist,onClose}){
  var[raw,setRaw]=useState("");
  var[parsed,setParsed]=useState(null);
  var[mapping,setMapping]=useState({});
  var[results,setResults]=useState(null);

  function handleFile(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){var text=ev.target.result;setRaw(text);var p=parseCSV(text);setParsed(p);var auto={};p.headers.forEach(function(h){auto[h]=CO_CSV_MAP[h.toLowerCase().trim()]||"ignore";});setMapping(auto);};
    reader.readAsText(file);
  }

  function runImport(){
    if(!parsed)return;
    var added=0,dupes=0;
    var newCos=[...companies];
    parsed.rows.forEach(function(row){
      var obj={};
      Object.entries(mapping).forEach(function(entry){
        var h=entry[0],f=entry[1];
        if(!f||f==="ignore")return;
        var val=(row[h]||"").trim();
        if(val)obj[f]=val;
      });
      if(!obj.name)return;
      var exists=newCos.find(function(co){return co.name.toLowerCase()===obj.name.toLowerCase();});
      if(exists){dupes++;return;}
      newCos.push(Object.assign({},BLANKCO,obj,{id:Date.now()+Math.random(),tier:obj.tier||"Prospect",owners:[]}));
      added++;
    });
    setCompanies(newCos);persist("companies",newCos);
    setResults({added,skipped:dupes});
  }

  var CO_FIELDS=["name","type","tier","hq","keyContact","notes","ignore"];

  if(results)return(
    <div style={{padding:"20px",textAlign:"center"}}>
      <div style={{fontSize:24,marginBottom:12}}>✓</div>
      <h3 style={{color:NAVY,marginBottom:16}}>Import complete</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <div style={{background:OK+"10",border:"1px solid "+OK+"30",borderRadius:8,padding:"14px",textAlign:"center"}}><div style={{fontSize:24,fontWeight:800,color:OK}}>{results.added}</div><div style={{fontSize:12,color:G600}}>Added</div></div>
        <div style={{background:WARN+"10",border:"1px solid "+WARN+"30",borderRadius:8,padding:"14px",textAlign:"center"}}><div style={{fontSize:24,fontWeight:800,color:WARN}}>{results.skipped}</div><div style={{fontSize:12,color:G600}}>Skipped (dupes)</div></div>
      </div>
      <button onClick={onClose} style={{background:TEAL,color:W,border:"none",borderRadius:6,padding:"8px 24px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Done</button>
    </div>
  );

  return(
    <div style={{padding:"4px"}}>
      <div style={{marginBottom:12,fontSize:13,color:G600,lineHeight:1.6}}>Import companies from any CSV. Auto-maps common column names.</div>
      <label style={{display:"block",background:G50,border:"2px dashed "+G300,borderRadius:8,padding:"16px",textAlign:"center",cursor:"pointer",marginBottom:12}}>
        <div style={{fontWeight:600,color:NAVY,marginBottom:4}}>Drop a CSV file or click to browse</div>
        <div style={{fontSize:12,color:G400}}>Company name, type, location, tier, notes</div>
        <input type="file" accept=".csv,.tsv,.txt" onChange={handleFile} style={{display:"none"}}/>
      </label>
      <div style={{marginBottom:8,fontSize:12,color:G400,textAlign:"center"}}>— or paste CSV data directly —</div>
      <textarea value={raw} onChange={function(e){setRaw(e.target.value);var p=parseCSV(e.target.value);setParsed(p);var auto={};p.headers.forEach(function(h){auto[h]=CO_CSV_MAP[h.toLowerCase().trim()]||"ignore";});setMapping(auto);}} rows={4} placeholder="Paste CSV here..." style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"8px",fontSize:12,outline:"none",fontFamily:"inherit",resize:"vertical",marginBottom:12}}/>
      {parsed&&parsed.headers.length>0&&(
        <div style={{marginBottom:12}}>
          <div style={{fontWeight:600,color:NAVY,fontSize:13,marginBottom:8}}>Map columns ({parsed.rows.length} rows detected)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"6px 10px",background:G50,borderRadius:"6px 6px 0 0",border:"1px solid "+G200,fontSize:10.5,fontWeight:700,color:G600,textTransform:"uppercase"}}>
            <span>CSV Column</span><span>Sample</span><span>Map to</span>
          </div>
          {parsed.headers.map(function(h){
            var sample=parsed.rows[0]?parsed.rows[0][h]||"—":"—";
            return(
              <div key={h} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"6px 10px",borderBottom:"1px solid "+G100,border:"1px solid "+G200,borderTop:"none",fontSize:12,alignItems:"center"}}>
                <span style={{fontWeight:600,color:NAVY}}>{h}</span>
                <span style={{color:G500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sample}</span>
                <select value={mapping[h]||"ignore"} onChange={function(e){setMapping(function(m){var n=Object.assign({},m);n[h]=e.target.value;return n;});}} style={{fontSize:11,border:"1px solid "+G300,borderRadius:4,padding:"2px 4px",outline:"none",fontFamily:"inherit"}}>
                  {CO_FIELDS.map(function(f){return <option key={f} value={f}>{f==="ignore"?"— ignore —":f}</option>;})}
                </select>
              </div>
            );
          })}
        </div>
      )}
      {parsed&&parsed.rows.length>0&&(
        <button onClick={runImport} style={{width:"100%",background:TEAL,color:W,border:"none",borderRadius:6,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Import {parsed.rows.length} Companies</button>
      )}
    </div>
  );
}

// ── BD TRACKER ────────────────────────────────────────────────</script>
  <script type="text/babel">function BDTracker({people,companies,setPeople,setCompanies,persist,ownerFilter}){
  const now=new Date();
  const[selPerson,setSelPerson]=useState(null);
  const[doneModal,setDoneModal]=useState(null);
  const[doneNote,setDoneNote]=useState("");
  const[doneNextAction,setDoneNextAction]=useState("");
  const[doneNextDue,setDoneNextDue]=useState("");
  const all=useMemo(()=>{
    const ps=people.filter(function(p){
      return (p.nextAction||p.nextDue)&&(!ownerFilter||migrateOwners(p.owners,p.owner).includes(ownerFilter));
    }).map(function(p){return Object.assign({},p,{_k:"person"});});
    const cs=companies.filter(function(c){
      if(!c.nextAction&&!c.nextDue)return false;
      if(!ownerFilter)return true;
      return people.some(function(p){return p.companyId===c.id&&migrateOwners(p.owners,p.owner).includes(ownerFilter);});
    }).map(function(c){return Object.assign({},c,{_k:"company"});});
    var combined=ps.concat(cs);
    combined.sort(function(a,b){
      if(!a.nextDue&&!b.nextDue)return 0;if(!a.nextDue)return 1;if(!b.nextDue)return -1;
      return new Date(a.nextDue)-new Date(b.nextDue);
    });
    return combined;
  },[people,companies,ownerFilter]);
  const ov=all.filter(i=>i.nextDue&&new Date(i.nextDue)<now);
  const soon=all.filter(i=>i.nextDue&&new Date(i.nextDue)>=now&&new Date(i.nextDue)<=new Date(Date.now()+7*86400000));
  const later=all.filter(i=>!i.nextDue||new Date(i.nextDue)>new Date(Date.now()+7*86400000));
  const openDone=function(item){setDoneModal(item);setDoneNote("");setDoneNextAction("");setDoneNextDue("");};
  const confirmDone=function(){
    if(!doneModal)return;
    var item=doneModal;
    var ts=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    var noteEntry=doneNote.trim()?"["+ts+"] Done: "+doneNote.trim():"";
    if(item._k==="person"){
      var u=people.map(function(p){
        if(p.id!==item.id)return p;
        var newNotes=noteEntry?(noteEntry+"\n\n"+(p.notes||"")):p.notes;
        return Object.assign({},p,{nextAction:doneNextAction,nextDue:doneNextDue,lastContacted:today,notes:newNotes});
      });
      setPeople(u);persist("people",u);
    }else{
      var u=companies.map(function(co){
        if(co.id!==item.id)return co;
        var newNotes=noteEntry?(noteEntry+"\n\n"+(co.notes||"")):co.notes;
        return Object.assign({},co,{nextAction:doneNextAction,nextDue:doneNextDue,lastContacted:today,notes:newNotes});
      });
      setCompanies(u);persist("companies",u);
    }
    setDoneModal(null);
  };
  const Sec=({title,items,accent})=>{
    if(!items.length)return null;
    return(
      <div style={{marginBottom:32}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,paddingBottom:10,borderBottom:"2px solid "+accent}}>
          <span style={{fontWeight:700,color:accent,fontSize:13,textTransform:"uppercase",letterSpacing:"0.07em"}}>{title}</span>
          <span style={{background:accent+"15",color:accent,borderRadius:12,padding:"1px 10px",fontSize:12,fontWeight:700}}>{items.length}</span>
        </div>
        {items.map(item=>{
          const ac=item._k==="company"?WARN:item.type==="contact"?"#6f42c1":TEAL;
          return(
            <div key={item._k+"-"+item.id} style={{background:W,border:"1px solid "+G200,borderLeft:"4px solid "+accent,borderRadius:8,padding:"14px 18px",marginBottom:10,display:"flex",gap:14,alignItems:"flex-start",boxShadow:"0 1px 3px #0001"}}>
              <Av name={item.name} size={36} color={ac}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                  <span onClick={function(){if(item._k==="person"){var p=people.find(function(p){return p.id===item.id;});if(p)setSelPerson(p);}}} style={{fontWeight:700,color:NAVY,fontSize:14,cursor:item._k==="person"?"pointer":"default",textDecoration:item._k==="person"?"underline":"none",textDecorationColor:TEAL}}>{item.name}</span>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}><DueTag due={item.nextDue}/><RelDot rel={item.relationship}/></div>
                </div>
                <div style={{fontSize:12,color:G600,marginBottom:8}}>{item._k==="company"?item.type:item.title}{(item.company||item.hq)?" · "+(item.company||item.hq):""}</div>
                {item.nextAction&&<div style={{fontSize:13,color:NAVY,background:G50,borderRadius:6,padding:"8px 12px",marginTop:4,border:"1px solid "+G200}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:item.nextDue?4:0}}><span style={{color:TEAL,fontWeight:700}}>→</span><span style={{fontWeight:600}}>{item.nextAction}</span></div>
                    {item.nextDue&&<div style={{fontSize:11,color:new Date(item.nextDue)<new Date()?DANGER:G600,fontWeight:600}}>Due: {item.nextDue}{new Date(item.nextDue)<new Date()?" — OVERDUE":""}</div>}
                  </div>}
              </div>
              <button onClick={function(){openDone(item);}} style={{background:TL,border:"1px solid "+TM,color:TEAL,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",flexShrink:0}}>✓ Done</button>
            </div>
          );
        })}
      </div>
    );
  };
  return(
    <div style={{overflowY:"auto",padding:"32px 40px",maxWidth:860,height:"100%"}}>
      {selPerson&&(
        <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",justifyContent:"flex-end"}} onClick={function(){setSelPerson(null);}}>
          <div onClick={function(e){e.stopPropagation();}} style={{width:480,maxWidth:"95vw",height:"100%",background:W,boxShadow:"-4px 0 24px #0002",overflowY:"auto",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"16px 20px",borderBottom:"1px solid "+G200,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:W,position:"sticky",top:0,zIndex:1}}>
              <div>
                <div style={{fontWeight:800,fontSize:18,color:NAVY}}>{selPerson.firstName||selPerson.name} {selPerson.lastName||""}</div>
                <div style={{fontSize:13,color:G600}}>{selPerson.title}{selPerson.company?" · "+selPerson.company:""}</div>
              </div>
              <button onClick={function(){setSelPerson(null);}} style={{background:"none",border:"none",color:G400,fontSize:24,cursor:"pointer",lineHeight:1}}>×</button>
            </div>
            <div style={{padding:"20px",flex:1}}>
              {/* Contact details */}
              <div style={{background:G50,borderRadius:8,padding:"14px 16px",marginBottom:14,border:"1px solid "+G200}}>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Contact Details</div>
                <div style={{display:"grid",gap:8}}>
                  {selPerson.email&&<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:11,color:G400,minWidth:60}}>Email</span><a href={"mailto:"+selPerson.email} style={{fontSize:13,color:TEAL,textDecoration:"none",fontWeight:500,flex:1}}>{selPerson.email}</a><CopyBtn value={selPerson.email}/></div>}
                  {selPerson.phone&&<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:11,color:G400,minWidth:60}}>Phone</span><span style={{fontSize:13,color:NAVY,fontWeight:500,flex:1}}>{selPerson.phone}</span><CopyBtn value={selPerson.phone}/></div>}
                  {selPerson.linkedin&&<div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:G400,minWidth:60}}>LinkedIn</span><a href={selPerson.linkedin.startsWith("http")?selPerson.linkedin:"https://"+selPerson.linkedin} target="_blank" style={{fontSize:13,color:TEAL,textDecoration:"none",fontWeight:500}}>View profile ↗</a></div>}
                  {selPerson.location&&<div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:G400,minWidth:60}}>Location</span><span style={{fontSize:13,color:NAVY}}>{selPerson.location}</span></div>}
                </div>
              </div>
              {/* Next action */}
              <div style={{background:TL,borderRadius:8,padding:"14px 16px",marginBottom:14,border:"1px solid "+TM}}>
                <div style={{fontSize:11,color:TEAL,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Current Follow-up</div>
                <div style={{fontWeight:600,color:NAVY,fontSize:14,marginBottom:4}}>→ {selPerson.nextAction||"No action set"}</div>
                {selPerson.nextDue&&<div style={{fontSize:12,color:new Date(selPerson.nextDue)<new Date()?DANGER:G600,fontWeight:600}}>Due: {selPerson.nextDue}</div>}
              </div>
              {/* Notes */}
              {selPerson.notes&&(
                <div style={{background:W,borderRadius:8,padding:"14px 16px",border:"1px solid "+G200}}>
                  <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Notes</div>
                  <div style={{fontSize:13,color:G800,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{selPerson.notes}</div>
                </div>
              )}
            </div>
            <div style={{padding:"16px 20px",borderTop:"1px solid "+G200,flexShrink:0,background:W}}>
              <button onClick={function(){setDoneModal(people.find(function(p){return p.id===selPerson.id;})||selPerson);setSelPerson(null);}} style={{width:"100%",background:TEAL,color:W,border:"none",borderRadius:7,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ Mark Done / Log Next Action</button>
            </div>
          </div>
        </div>
      )}
      {doneModal&&(
        <div style={{position:"fixed",inset:0,background:"#0006",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onClick={function(){setDoneModal(null);}}>
          <div onClick={function(e){e.stopPropagation();}} style={{background:W,borderRadius:12,padding:"24px 28px",width:440,maxWidth:"96vw",boxShadow:"0 20px 60px #0003",border:"1px solid "+G200}}>
            <div style={{fontWeight:700,fontSize:16,color:NAVY,marginBottom:4}}>Mark Done — {doneModal.name}</div>
            <div style={{fontSize:12,color:G600,marginBottom:16}}>Log what happened and set the next follow-up if needed.</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Notes (optional)</div>
              <textarea value={doneNote} onChange={function(e){setDoneNote(e.target.value);}} rows={3} placeholder="What happened? Any key points..." style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"8px 10px",fontSize:13,outline:"none",fontFamily:"inherit",resize:"vertical"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <div>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Next Action</div>
                <input value={doneNextAction} onChange={function(e){setDoneNextAction(e.target.value);}} placeholder="e.g. Follow up call" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Due Date</div>
                <input type="date" value={doneNextDue} onChange={function(e){setDoneNextDue(e.target.value);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <button onClick={function(){setDoneModal(null);}} style={{background:"transparent",border:"1px solid "+G300,borderRadius:6,padding:"8px 18px",fontSize:13,color:G600,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
              <button onClick={confirmDone} style={{background:TEAL,color:W,border:"none",borderRadius:6,padding:"8px 22px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ Done</button>
            </div>
          </div>
        </div>
      )}
      <h1 style={{fontSize:26,fontWeight:700,color:NAVY,margin:"0 0 6px"}}>Follow-ups</h1>
      <p style={{color:G600,fontSize:14,marginBottom:16}}>Everyone with a next action and due date set — your daily action list.</p>
      <div style={{background:TL,border:"1px solid "+TM,borderRadius:8,padding:"10px 16px",marginBottom:20,fontSize:13,color:NAVY}}>Log an activity in <strong>BD Pipeline</strong> to set a follow-up — it will appear here when due.</div>
      {!all.length&&<div style={{textAlign:"center",padding:"60px 0",color:G400}}><div style={{fontSize:40,marginBottom:12}}>✓</div><div style={{fontSize:14}}>All caught up</div></div>}
      <Sec title="Overdue" items={ov} accent={DANGER}/>
      <Sec title="Due this week" items={soon} accent={WARN}/>
      <Sec title="Later" items={later} accent={G400}/>
    </div>
  );
}

// ── MARKET MAP ────────────────────────────────────────────────
function MarketMap({people,companies,onNavigate,ownerFilter}){
  const[sectorF,setSectorF]=useState("All");
  const[seniorityF,setSeniorityF]=useState("All");
  const[relF,setRelF]=useState("All");
  const[typeF,setTypeF]=useState("All");
  const[mapView,setMapView]=useState("people"); // people | companies

  const allSectors=useMemo(()=>{
    const s=new Set();people.forEach(p=>(p.sectors||[]).forEach(x=>s.add(x)));return["All",...Array.from(s).sort()];
  },[people]);

  const filteredPeople=useMemo(()=>people.filter(p=>{
    if(ownerFilter&&!migrateOwners(p.owners,p.owner).includes(ownerFilter))return false;
    if(sectorF!=="All"&&!(p.sectors||[]).includes(sectorF))return false;
    if(seniorityF!=="All"&&p.seniority!==seniorityF)return false;
    if(relF!=="All"&&p.relationship!==relF)return false;
    if(typeF!=="All"&&p.type!==typeF)return false;
    return true;
  }),[people,sectorF,seniorityF,relF,typeF]);

  const filteredCompanies=useMemo(()=>companies.filter(c=>{
    if(relF!=="All"&&c.relationship!==relF)return false;
    return true;
  }),[companies,relF]);

  const sectorGroups=useMemo(()=>{
    const map={};
    filteredPeople.forEach(p=>(p.sectors||[]).forEach(s=>{if(!map[s])map[s]=[];map[s].push(p);}));
    return Object.entries(map).sort((a,b)=>b[1].length-a[1].length);
  },[filteredPeople]);

  const total=people.length+companies.length;
  const hotCount=[...people,...companies].filter(x=>x.relationship==="Hot").length;

  const FilterBtn=({options,value,onChange,colorMap})=>(
    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
      {options.map(o=>{
        const c=colorMap?colorMap[o]||G600:TEAL;
        const active=value===o;
        return <button key={o} onClick={()=>onChange(o)} style={{background:active?c+"15":"transparent",color:active?c:G600,border:"1px solid "+(active?c+"40":G300),borderRadius:20,padding:"3px 11px",fontSize:11,fontWeight:active?700:400,cursor:"pointer",fontFamily:"inherit"}}>{o}</button>;
      })}
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {/* Filter bar */}
      <div style={{background:W,borderBottom:"1px solid "+G200,padding:"14px 28px",flexShrink:0}}>
        <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:10,color:G400,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>View</div>
            <div style={{display:"flex",gap:5}}>
              {["people","companies"].map(v=><button key={v} onClick={()=>setMapView(v)} style={{background:mapView===v?TEAL:"transparent",color:mapView===v?W:G600,border:"1px solid "+(mapView===v?TEAL:G300),borderRadius:20,padding:"3px 14px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>{v}</button>)}
            </div>
          </div>
          <div>
            <div style={{fontSize:10,color:G400,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Relationship</div>
            <FilterBtn options={["All","Hot","Warm","Cold","New"]} value={relF} onChange={setRelF} colorMap={REL}/>
          </div>
          {mapView==="people"&&<div>
            <div style={{fontSize:10,color:G400,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Type</div>
            <FilterBtn options={["All","candidate","contact"]} value={typeF} onChange={setTypeF}/>
          </div>}
          {mapView==="people"&&<div>
            <div style={{fontSize:10,color:G400,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Seniority</div>
            <FilterBtn options={["All","C-Suite / Partner","VP / Director","Manager / Principal","Analyst / Consultant"]} value={seniorityF} onChange={setSeniorityF}/>
          </div>}
          {mapView==="people"&&<div>
            <div style={{fontSize:10,color:G400,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Sector</div>
            <FilterBtn options={allSectors.slice(0,8)} value={sectorF} onChange={setSectorF}/>
          </div>}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>
        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
          {[["Total People",people.length,TEAL],["Companies",companies.length,"#6f42c1"],["Hot relationships",hotCount,DANGER],["Sectors covered",[...new Set(people.flatMap(p=>p.sectors||[]))].length,WARN]].map(([l,v,c])=>(
            <div key={l} style={{background:W,border:"1px solid "+G200,borderRadius:10,padding:"16px 18px",borderTop:"3px solid "+c}}>
              <div style={{fontSize:28,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
              <div style={{fontSize:11,color:G600,marginTop:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</div>
            </div>
          ))}
        </div>

        {mapView==="people"&&(
          <div>
            {/* Sector bubble clusters */}
            {sectorGroups.length>0&&(
              <div style={{marginBottom:28}}>
                <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:14}}>
                  {"Sector clusters — "+filteredPeople.length+" people shown"}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:16,alignItems:"flex-end",marginBottom:20}}>
                  {sectorGroups.map(([sector,ps])=>{
                    const color=SC[sector]||G600,size=Math.max(68,Math.min(140,58+ps.length*22));
                    const active=sectorF===sector;
                    return(
                      <div key={sector} onClick={()=>setSectorF(active?"All":sector)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer"}}>
                        <div style={{width:size,height:size,borderRadius:"50%",background:active?color+"30":color+"12",border:"2px solid "+(active?color:color+"40"),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all 0.15s",boxShadow:active?"0 2px 12px "+color+"40":"none"}}>
                          <div style={{fontSize:size*.28,fontWeight:800,color,lineHeight:1}}>{ps.length}</div>
                          <div style={{fontSize:8.5,color,textAlign:"center",padding:"0 6px",lineHeight:1.3,fontWeight:600,marginTop:2}}>{sector}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* People grid — clickable cards */}
            <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>
              {"All people — "+filteredPeople.length+" results"}
            </div>
            {filteredPeople.length===0&&<div style={{color:G400,fontSize:13,padding:"20px 0"}}>No people match the current filters</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
              {filteredPeople.map(p=>{
                const ac=p.type==="contact"?"#6f42c1":TEAL;
                return(
                  <div key={p.id} onClick={()=>onNavigate&&onNavigate("people",p.id)}
                    style={{background:W,border:"1px solid "+G200,borderRadius:9,padding:"14px 16px",cursor:"pointer",transition:"all 0.12s",boxShadow:"0 1px 3px #0001"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=TEAL;e.currentTarget.style.boxShadow="0 2px 10px "+TEAL+"20";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=G200;e.currentTarget.style.boxShadow="0 1px 3px #0001";}}>
                    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
                      <Av name={p.name} size={34} color={ac}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,color:NAVY,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                        <div style={{fontSize:11,color:G600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.title||""}</div>
                      </div>
                    </div>
                    <div style={{fontSize:11,color:G600,marginBottom:8,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{"🏢 "+(p.company||"—")}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      <RelDot rel={p.relationship}/>
                      <Badge label={p.seniority?p.seniority.split(" / ")[0]:""} color={G600}/>
                    </div>
                    {(p.sectors||[]).length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:7}}>{(p.sectors||[]).slice(0,2).map(s=><Badge key={s} label={s} color={SC[s]||G600}/>)}</div>}
                    {p.nextDue&&<div style={{marginTop:7}}><DueTag due={p.nextDue}/></div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {mapView==="companies"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
              <div style={{background:W,border:"1px solid "+G200,borderRadius:10,padding:"18px"}}>
                <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>By Tier</div>
                {["Key Client","Warm","Prospect"].map(tier=>{
                  const count=companies.filter(c=>c.tier===tier).length,pct=companies.length?Math.round(count/companies.length*100):0,c=TC_MAP[tier]||G600;
                  return(
                    <div key={tier} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12,color:G700}}><span>{tier}</span><span style={{fontWeight:700,color:c}}>{count}</span></div>
                      <div style={{height:6,background:G200,borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:c,borderRadius:3,transition:"width 0.4s"}}/></div>
                    </div>
                  );
                })}
              </div>
              <div style={{background:W,border:"1px solid "+G200,borderRadius:10,padding:"18px"}}>
                <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Relationship Heat</div>
                {["Hot","Warm","Cold","New"].map(rel=>{
                  const count=companies.filter(c=>c.relationship===rel).length,pct=companies.length?Math.round(count/companies.length*100):0;
                  return(
                    <div key={rel} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><RelDot rel={rel}/><span style={{fontSize:12,fontWeight:700,color:G700}}>{count}</span></div>
                      <div style={{height:6,background:G200,borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:REL[rel],borderRadius:3,transition:"width 0.4s"}}/></div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>
              {"All companies — "+filteredCompanies.length+" results"}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
              {filteredCompanies.map(c=>{
                const tc=TC_MAP[c.tier]||G400,pCount=people.filter(p=>p.companyId===c.id).length;
                return(
                  <div key={c.id} onClick={()=>onNavigate&&onNavigate("companies",c.id)}
                    style={{background:W,border:"1px solid "+G200,borderLeft:"3px solid "+tc,borderRadius:9,padding:"14px 16px",cursor:"pointer",transition:"all 0.12s",boxShadow:"0 1px 3px #0001"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=tc;e.currentTarget.style.boxShadow="0 2px 10px "+tc+"30";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=G200;e.currentTarget.style.boxShadow="0 1px 3px #0001";}}>
                    <div style={{fontWeight:700,color:NAVY,fontSize:14,marginBottom:3}}>{c.name}</div>
                    <div style={{fontSize:12,color:G600,marginBottom:8}}>{c.type}{c.hq?" · "+c.hq:""}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      <Badge label={c.tier} color={tc}/>
                      <RelDot rel={c.relationship}/>
                      {pCount>0&&<span style={{fontSize:11,color:TEAL,fontWeight:600}}>{"👥 "+pCount+" people"}</span>}
                      {c.openVacancies>0&&<span style={{fontSize:11,color:OK,fontWeight:600}}>{"📋 "+c.openVacancies+" vacancys"}</span>}
                    </div>
                    {c.nextDue&&<div style={{marginTop:7}}><DueTag due={c.nextDue}/></div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ── BD Pipeline ───────────────────────────────────────────────
const BD_STAGES=["Target","Contacted","Responded","Meeting","Proposal","Active","Nurture"];
const BD_STAGE_COLORS={

  <script type="text/babel">function ActivityLogModal({person,onSave,onClose}){
  const[actType,setActType]=useState("email");
  const[note,setNote]=useState("");
  const[nextAction,setNextAction]=useState(person.nextAction||"");
  const[nextDue,setNextDue]=useState(person.nextDue||"");
  const[stage,setStage]=useState(person.bdStage||"");

  function handleSave(){
    const ts=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const actLabel=ACT_TYPES.find(function(a){return a.id===actType;});
    const entry={id:Date.now(),type:actType,icon:actLabel?actLabel.icon:"📝",label:actLabel?actLabel.label:"Note",note:note.trim(),date:ts,by:""};
    const log=[entry,...(person.activityLog||[])];
    onSave({activityLog:log,nextAction:nextAction,nextDue:nextDue,bdStage:stage,lastContacted:today});
  }

  return(
    <div style={{position:"fixed",inset:0,background:"#0006",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onClick={onClose}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:W,borderRadius:12,padding:"24px 28px",width:480,maxWidth:"96vw",boxShadow:"0 20px 60px #0003",border:"1px solid "+G200}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,paddingBottom:14,borderBottom:"1px solid "+G200}}>
          <span style={{fontWeight:700,fontSize:16,color:NAVY}}>Log Activity — {person.name}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:G400,fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Activity type</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ACT_TYPES.map(function(a){
              const active=actType===a.id;
              return(
                <button key={a.id} onClick={function(){setActType(a.id);}} style={{background:active?TEAL+"15":"transparent",color:active?TEAL:G600,border:"1px solid "+(active?TEAL+"50":G300),borderRadius:6,padding:"6px 12px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:active?700:400}}>
                  {a.icon} {a.label}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Notes</div>
          <textarea value={note} onChange={function(e){setNote(e.target.value);}} placeholder="What happened? Key points from the conversation..." rows={3}
            style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"8px 11px",fontSize:13,outline:"none",fontFamily:"inherit",resize:"vertical"}}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Move to stage</div>
            <select value={stage} onChange={function(e){setStage(e.target.value);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}>
              <option value="">Keep current</option>
              {BD_STAGES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Next follow-up</div>
            <input type="date" value={nextDue} onChange={function(e){setNextDue(e.target.value);}} style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
        </div>

        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:G600,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Next action</div>
          <input value={nextAction} onChange={function(e){setNextAction(e.target.value);}} placeholder="e.g. Follow up call in 2 weeks" style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
        </div>

        <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid "+G300,borderRadius:6,padding:"8px 18px",fontSize:13,color:G600,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          <button onClick={handleSave} style={{background:TEAL,color:W,border:"none",borderRadius:6,padding:"8px 22px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Save Activity</button>

function BDPipelineView({people,setPeople,persist,ownerFilter}){
  const[logModal,setLogModal]=useState(null);
  const[search,setSearch]=useState("");

  function saveActivity(person,updates){
    const updated=people.map(function(p){return p.id===person.id?Object.assign({},p,updates):p;});
    setPeople(updated);persist("people",updated);
    setLogModal(null);
  }

  function setStage(person,stage){
    const updated=people.map(function(p){return p.id===person.id?Object.assign({},p,{bdStage:stage}):p;});
    setPeople(updated);persist("people",updated);
  }

  // Only show contacts (Lauren's BD targets) - type contact or people with a bdStage set
  var filtered=people.filter(function(p){
    if(ownerFilter&&!migrateOwners(p.owners,p.owner).includes(ownerFilter))return false;
    if(search&&!(p.name+p.company).toLowerCase().includes(search.toLowerCase()))return false;
    return p.bdStage&&p.bdStage.trim()!=="";
  });

  var stageMap={};
  BD_STAGES.forEach(function(s){stageMap[s]=[];});
  stageMap["Target"]=stageMap["Target"]||[];

  filtered.forEach(function(p){
    var s=p.bdStage||"Target";
    if(!stageMap[s])stageMap[s]=[];
    stageMap[s].push(p);
  });

  var totalActive=filtered.length;
  var overdueCount=filtered.filter(function(p){return p.nextDue&&new Date(p.nextDue)<new Date();}).length;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {logModal&&<ActivityLogModal person={logModal} onSave={function(updates){saveActivity(logModal,updates);}} onClose={function(){setLogModal(null);}}/>}

      {/* Header */}
      <div style={{background:W,borderBottom:"1px solid "+G200,padding:"14px 24px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:NAVY}}>BD Pipeline</div>
            <div style={{fontSize:12,color:G600,marginTop:2}}>{totalActive} contacts{overdueCount>0?" · ":""}{overdueCount>0&&<span style={{color:DANGER,fontWeight:700}}>{overdueCount} overdue</span>}</div>
          </div>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search contacts..."
            style={{background:G50,border:"1px solid "+G200,borderRadius:8,padding:"7px 14px",fontSize:13,outline:"none",fontFamily:"inherit",width:220,marginLeft:"auto"}}/>
        </div>
        <div style={{marginTop:10,background:TL,border:"1px solid "+TM,borderRadius:6,padding:"8px 14px",fontSize:12,color:NAVY}}>
          <strong style={{color:TEAL}}>How to use:</strong> Contacts and companies with type "Contact" appear here automatically. Click <strong>Log Activity</strong> on any card to record a call, email or meeting and move them to the next stage.
        </div>
      </div>

      {/* Kanban board */}
      <div style={{flex:1,overflowX:"auto",overflowY:"hidden",padding:"16px 20px"}}>
        <div style={{display:"flex",gap:12,height:"100%",minWidth:"fit-content"}}>
          {BD_STAGES.map(function(stage){
            var cards=stageMap[stage]||[];
            var stageColor=BD_STAGE_COLORS[stage]||G400;
            return(
              <div key={stage} style={{width:220,flexShrink:0,display:"flex",flexDirection:"column",height:"100%"}}>
                {/* Column header */}
                <div style={{background:W,border:"1px solid "+G200,borderRadius:"8px 8px 0 0",padding:"10px 14px",borderBottom:"2px solid "+stageColor,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontWeight:700,fontSize:13,color:stageColor}}>{stage}</span>
                    <span style={{background:stageColor+"20",color:stageColor,borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{cards.length}</span>
                  </div>
                </div>

                {/* Cards */}
                <div style={{flex:1,overflowY:"auto",background:G50,border:"1px solid "+G200,borderTop:"none",borderRadius:"0 0 8px 8px",padding:"8px"}}>
                  {cards.length===0&&(
                    <div style={{textAlign:"center",padding:"20px 8px",color:G400,fontSize:12}}>No contacts</div>
                  )}
                  {cards.map(function(p){
                    var overdue=p.nextDue&&new Date(p.nextDue)<new Date();
                    var lastAct=p.activityLog&&p.activityLog.length>0?p.activityLog[0]:null;
                    var ownerCol=OWNER_COLORS[p.owner]||G400;
                    return(
                      <div key={p.id} style={{background:W,border:"1px solid "+(overdue?DANGER+"40":G200),borderRadius:8,padding:"10px 12px",marginBottom:8,boxShadow:"0 1px 3px #0001"}}>
                        {/* Name & company */}
                        <div style={{fontWeight:700,color:NAVY,fontSize:13,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                        <div style={{fontSize:11,color:G600,marginBottom:8,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.company}</div>

                        {/* Last activity */}
                        {lastAct&&(
                          <div style={{fontSize:11,color:G600,background:G50,borderRadius:4,padding:"4px 7px",marginBottom:6,display:"flex",gap:4,alignItems:"center"}}>
                            <span>{lastAct.icon}</span>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lastAct.label} · {lastAct.date.split(",")[0]}</span>
                          </div>
                        )}

                        {/* Next follow-up */}
                        {p.nextDue&&(
                          <div style={{fontSize:11,fontWeight:600,color:overdue?DANGER:TEAL,marginBottom:8}}>
                            {overdue?"⚠ Overdue: ":"→ "}{p.nextDue}
                          </div>
                        )}

                        {/* Owner dot */}
                        {p.owner&&<div style={{width:6,height:6,borderRadius:"50%",background:ownerCol,marginBottom:6}}></div>}

                        {/* Actions */}
                        <div style={{display:"flex",gap:6,marginTop:4}}>
                          <button onClick={function(){setLogModal(p);}} style={{flex:1,background:TL,color:TEAL,border:"1px solid "+TM,borderRadius:5,padding:"4px 0",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                            Log Activity
                          </button>
                        </div>

                        {/* Quick stage move */}
                        <select value={p.bdStage||"Target"} onChange={function(e){setStage(p,e.target.value);}}
                          style={{width:"100%",marginTop:6,border:"1px solid "+G300,borderRadius:5,padding:"3px 6px",fontSize:10.5,outline:"none",fontFamily:"inherit",color:G700,background:W}}>
                          {BD_STAGES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
                        </select>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function GlobalSearch({people,companies,onNavigate}){
  const[q,setQ]=useState("");
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const results=useMemo(()=>{
    if(!q.trim()||q.length<2)return[];
    const ql=q.toLowerCase();
    const pr=people.filter(p=>(p.name+p.company+p.title+(p.sectors||[]).join(" ")).toLowerCase().includes(ql)).slice(0,6).map(p=>({...p,_kind:"person"}));
    const cr=companies.filter(c=>(c.name+c.type+c.hq).toLowerCase().includes(ql)).slice(0,4).map(c=>({...c,_kind:"company"}));
    return[...pr,...cr];
  },[q,people,companies]);
  return(
    <div ref={ref} style={{position:"relative",flex:1,maxWidth:420}}>
      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,color:G400,pointerEvents:"none"}}>🔍</span>
        <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}
          placeholder="Search everything — people, companies, notes…"
          style={{background:G50,border:"1px solid "+G200,borderRadius:8,padding:"8px 32px 8px 34px",color:G900,fontSize:13,outline:"none",width:"100%",fontFamily:"inherit"}}/>
        {q&&<button onClick={()=>{setQ("");setOpen(false);}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:G400,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
      </div>
      {open&&results.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:W,border:"1px solid "+G200,borderRadius:10,boxShadow:"0 8px 32px #0002",zIndex:200,overflow:"hidden"}}>
          {results.map(item=>{
            const ip=item._kind==="person",color=ip?(item.type==="contact"?"#6f42c1":TEAL):(TC_MAP[item.tier]||G600);
            return(
              <div key={item._kind+"-"+item.id} onClick={()=>{onNavigate(ip?"people":"companies",item.id);setQ("");setOpen(false);}}
                style={{display:"flex",gap:12,alignItems:"center",padding:"10px 16px",cursor:"pointer",borderBottom:"1px solid "+G100}}
                onMouseEnter={e=>e.currentTarget.style.background=G50}
                onMouseLeave={e=>e.currentTarget.style.background=W}>
                <Av name={item.name} size={30} color={color}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{item.name}</div>
                  <div style={{fontSize:11,color:G600}}>{ip?((item.title||"")+(item.company?" · "+item.company:"")):(item.type||"")+(item.hq?" · "+item.hq:"")}</div>
                </div>
                <span style={{fontSize:10,color:G400,background:G100,borderRadius:4,padding:"2px 7px",fontWeight:600,textTransform:"uppercase"}}>{ip?item.type:"company"}</span>
              </div>
            );
          })}
        </div>
      )}
      {open&&q.length>=2&&!results.length&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:W,border:"1px solid "+G200,borderRadius:10,boxShadow:"0 8px 32px #0002",zIndex:200,padding:"16px",textAlign:"center",color:G400,fontSize:13}}>No results for "{q}"</div>
      )}
    </div>
  );
}
