window.storage={
  get:function(k){try{var v=localStorage.getItem(k);return Promise.resolve(v?{key:k,value:v}:null);}catch(e){return Promise.resolve(null);}},
  set:function(k,v){try{localStorage.setItem(k,v);return Promise.resolve({key:k,value:v});}catch(e){return Promise.resolve(null);}},
  delete:function(k){try{localStorage.removeItem(k);return Promise.resolve({key:k,deleted:true});}catch(e){return Promise.resolve(null);}},
  list:function(prefix){try{var keys=Object.keys(localStorage).filter(function(k){return !prefix||k.startsWith(prefix);});return Promise.resolve({keys:keys});}catch(e){return Promise.resolve({keys:[]});}}
};

function normalize(s){return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function similarity(a,b){
  const na=normalize(a),nb=normalize(b);
  if(!na||!nb)return 0;
  if(na===nb)return 1;
  if(na.includes(nb)||nb.includes(na))return 0.85;
  const bigrams=s=>{const b=new Set();for(let i=0;i<s.length-1;i++)b.add(s.slice(i,i+2));return b;};
  const ba=bigrams(na),bb=bigrams(nb);
  let inter=0;ba.forEach(g=>{if(bb.has(g))inter++;});
  return(2*inter)/(ba.size+bb.size||1);
}
function findDupePeople(name,company,people,excludeId){
  return people.filter(p=>{
    if(p.id===excludeId)return false;
    const ns=similarity(name,p.name);
    if(ns<0.8)return false;
    if(company&&p.company)return similarity(company,p.company)>0.7||ns>0.92;
    return ns>0.92;
  });
}
function findDupeCompanies(name,companies,excludeId){
  return companies.filter(c=>c.id!==excludeId&&similarity(name,c.name)>=0.82);
}
function autoLinkCompany(personCompany,companies){
  if(!personCompany||!personCompany.trim())return{companies,companyId:null};
  const match=companies.find(c=>similarity(personCompany,c.name)>=0.82);
  if(match)return{companies,companyId:match.id};
  const newCo={id:Date.now()+Math.random(),name:personCompany,type:"Consulting",tier:"Prospect",hq:"",keyContact:"",openMandates:0,lastContacted:"",nextAction:"",nextDue:"",notes:"Auto-created from people record."};
  return{companies:[...companies,newCo],companyId:newCo.id};
}

function CSVImporter({people,companies,setPeople,setCompanies,persist,onClose}){
  var[raw,setRaw]=useState("");
  var[results,setResults]=useState(null);
  var fileRef=useRef(null);
  var CSV_MAP={
    "name":"name","full name":"name","first name":"firstName","firstname":"firstName","first_name":"firstName",
    "last name":"lastName","lastname":"lastName","last_name":"lastName","surname":"lastName",
    "title":"title","job title":"title","jobtitle":"title","position":"title","role":"title",
    "company":"company","companyname":"company","employer":"company","account":"company",
    "location":"location","city":"location","email":"email","work email":"email",
    "phone":"phone","mobile":"phone","linkedin":"linkedin","linkedin url":"linkedin",
    "notes":"notes","sectors":"sectors","seniority":"seniority","type":"type",
    "campaign name":"ignore","email provider":"ignore","verification status":"ignore",
    "lead status":"ignore","pause_until":"ignore","interest status":"ignore",
    "last contacted from":"ignore","email security gateway provider":"ignore"
  };

  var parseAndImport=function(text){
    var lines=text.trim().split(/\r?\n/);
    if(lines.length<2){alert("Need at least a header row and one data row.");return;}
    var delim=lines[0].includes("\t")?"\t":",";
    var parseRow=function(l){var cols=[],cur="",inQ=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'&&!inQ)inQ=true;else if(c==='"'&&inQ)inQ=false;else if(c===delim&&!inQ){cols.push(cur.trim());cur="";}else cur+=c;}cols.push(cur.trim());return cols;};
    var headers=parseRow(lines[0]).map(function(h){return h.replace(/^"|"$/g,"").trim();});
    var rows=lines.slice(1).filter(function(l){return l.trim();}).map(function(l){var v=parseRow(l);var o={};headers.forEach(function(h,i){o[h]=(v[i]||"").trim();});return o;});
    var mappings={};
    headers.forEach(function(h){mappings[h]=CSV_MAP[h.toLowerCase().trim()]||"ignore";});
    var np=[].concat(people),nc=[].concat(companies),added=0,skipped=0;
    rows.forEach(function(row){
      var p=Object.assign({},BLANKP);var fn="",ln="";
      Object.keys(mappings).forEach(function(h){
        var f=mappings[h];if(!f||f==="ignore")return;
        var v=(row[h]||"").trim();if(!v)return;
        if(f==="firstName")fn=v;else if(f==="lastName")ln=v;
        else if(f==="sectors")p.sectors=v.split(/[,;|]/).map(function(s){return s.trim();}).filter(Boolean);
        else p[f]=v;
      });
      if(fn||ln)p.name=[fn,ln].filter(Boolean).join(" ");
      if(!p.name.trim()){skipped++;return;}
      if(findDupePeople(p.name,p.company,np).length>0){skipped++;return;}
      var res=autoLinkCompany(p.company,nc);nc=res.companies;
      np=[Object.assign({},p,{id:Date.now()+Math.random(),companyId:res.companyId})].concat(np);added++;
    });
    setPeople(np);setCompanies(nc);persist("people",np);persist("companies",nc);
    setResults({added:added,skipped:skipped,total:rows.length});
  };

  if(results)return(
    <div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:40,marginBottom:12}}>✓</div>
      <h3 style={{fontSize:18,fontWeight:700,color:NAVY,marginBottom:16}}>Import complete</h3>
      <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:20}}>
        <div style={{background:OK+"10",border:"1px solid "+OK+"30",borderRadius:8,padding:"14px 20px",textAlign:"center"}}><div style={{fontSize:24,fontWeight:800,color:OK}}>{results.added}</div><div style={{fontSize:12,color:G600,marginTop:4}}>Added</div></div>
        <div style={{background:WARN+"10",border:"1px solid "+WARN+"30",borderRadius:8,padding:"14px 20px",textAlign:"center"}}><div style={{fontSize:24,fontWeight:800,color:WARN}}>{results.skipped}</div><div style={{fontSize:12,color:G600,marginTop:4}}>Skipped</div></div>
      </div>
      <button onClick={onClose} style={{background:TEAL,color:"#fff",border:"none",borderRadius:6,padding:"9px 22px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Done</button>
    </div>
  );

  return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:14,lineHeight:1.6}}>
        Paste CSV data or upload a file. <strong>First Name + Last Name</strong> as separate columns auto-detected. Duplicates skipped automatically. Instantly/Apollo exports work out of the box.
      </p>
      <div style={{border:"2px dashed "+G300,borderRadius:8,padding:"16px",textAlign:"center",marginBottom:12,background:G50}}>
        <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" style={{display:"none"}} onChange={function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){setRaw(ev.target.result);};r.readAsText(f);}}/>
        <button onClick={function(){if(fileRef.current)fileRef.current.click();}} style={{background:"transparent",border:"1px solid "+G300,borderRadius:6,padding:"7px 16px",fontSize:12,color:G600,cursor:"pointer",fontFamily:"inherit"}}>📄 Choose File</button>
        <span style={{color:G400,fontSize:13,margin:"0 10px"}}>or paste below</span>
      </div>
      <textarea value={raw} onChange={function(e){setRaw(e.target.value);}} rows={6}
        placeholder={"First Name,Last Name,Email,Company,Job Title\nLauren,Campbell,lauren@voltconsulting.solutions,VoltConsulting,Co-Founder"}
        style={{width:"100%",border:"1px solid "+G300,borderRadius:6,padding:"8px 11px",fontSize:12,outline:"none",fontFamily:"inherit",resize:"vertical"}}/>
      <div style={{display:"flex",gap:10,marginTop:12,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid "+G300,borderRadius:6,padding:"8px 16px",fontSize:13,color:G600,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
        <button onClick={function(){if(raw.trim())parseAndImport(raw);}} style={{background:TEAL,color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Import →</button>
      </div>
    </div>
  );
}

function BDTracker({people,companies,setPeople,setCompanies,persist}){
  const now=new Date();
  const all=useMemo(()=>{
    const ps=people.filter(p=>p.nextAction||p.nextDue).map(p=>({...p,_k:"person"}));
    const cs=companies.filter(c=>c.nextAction||c.nextDue).map(c=>({...c,_k:"company"}));
    return[...ps,...cs].sort((a,b)=>{
      if(!a.nextDue&&!b.nextDue)return 0;if(!a.nextDue)return 1;if(!b.nextDue)return -1;
      return new Date(a.nextDue)-new Date(b.nextDue);
    });
  },[people,companies]);
  const ov=all.filter(i=>i.nextDue&&new Date(i.nextDue)<now);

                        <div style={{fontSize:11,color:G600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.title||""}</div>

                    </div>
                    {(p.sectors||[]).length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:7}}>{(p.sectors||[]).slice(0,2).map(s=><Badge key={s} label={s} color={SC[s]||G600}/>)}</div>}
                    {p.nextDue&&<div style={{marginTop:7}}><DueTag due={p.nextDue}/></div>}
                  </div>
                );
              })}
            </div>
          </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>

                <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>By Tier</div>
                {["Key Client","Warm","Prospect"].map(tier=>{
                  const count=companies.filter(c=>c.tier===tier).length,pct=companies.length?Math.round(count/companies.length*100):0,c=TC_MAP[tier]||G600;

                    <div key={tier} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12,color:G700}}><span>{tier}</span><span style={{fontWeight:700,color:c}}>{count}</span></div>
                      <div style={{height:6,background:G200,borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:c,borderRadius:3,transition:"width 0.4s"}}/></div>
                    </div>
                  );
                })}
              </div>
              <div style={{background:W,border:"1px solid "+G200,borderRadius:10,padding:"18px"}}>
                <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Relationship Heat</div>
                {["Hot","Warm","Cold","New"].map(rel=>{
                  const count=companies.filter(c=>c.relationship===rel).length,pct=companies.length?Math.round(count/companies.length*100):0;

                      <div style={{height:6,background:G200,borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:REL[rel],borderRadius:3,transition:"width 0.4s"}}/></div>

                })}
              </div>
            </div>

            <div style={{fontSize:11,color:G600,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>
              {"All companies — "+filteredCompanies.length+" results"}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
              {filteredCompanies.map(c=>{
                const tc=TC_MAP[c.tier]||G400,pCount=people.filter(p=>p.companyId===c.id).length;
                return(
                  <div key={c.id} onClick={()=>onNavigate&&onNavigate("companies",c.id)}
                    style={{background:W,border:"1px solid "+G200,borderLeft:"3px solid "+tc,borderRadius:9,padding:"14px 16px",cursor:"pointer",transition:"all 0.12s",boxShadow:"0 1px 3px #0001"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=tc;e.currentTarget.style.boxShadow="0 2px 10px "+tc+"30";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=G200;e.currentTarget.style.boxShadow="0 1px 3px #0001";}}>
                    <div style={{fontWeight:700,color:NAVY,fontSize:14,marginBottom:3}}>{c.name}</div>
                    <div style={{fontSize:12,color:G600,marginBottom:8}}>{c.type}{c.hq?" · "+c.hq:""}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      <Badge label={c.tier} color={tc}/>
                      
                      {pCount>0&&<span style={{fontSize:11,color:TEAL,fontWeight:600}}>{"👥 "+pCount+" people"}</span>}
                      {c.openMandates>0&&<span style={{fontSize:11,color:OK,fontWeight:600}}>{"📋 "+c.openMandates+" mandates"}</span>}
                    </div>
                    {c.nextDue&&<div style={{marginTop:7}}><DueTag due={c.nextDue}/></div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function GlobalSearch({people,companies,onNavigate}){
  const[q,setQ]=useState("");
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const results=useMemo(()=>{
    if(!q.trim()||q.length<2)return[];
    const ql=q.toLowerCase();
    const pr=people.filter(p=>(p.name+p.company+p.title+(p.sectors||[]).join(" ")).toLowerCase().includes(ql)).slice(0,6).map(p=>({...p,_kind:"person"}));
    const cr=companies.filter(c=>(c.name+c.type+c.hq).toLowerCase().includes(ql)).slice(0,4).map(c=>({...c,_kind:"company"}));
    return[...pr,...cr];
  },[q,people,companies]);
  return(
    <div ref={ref} style={{position:"relative",flex:1,maxWidth:420}}>
      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,color:G400,pointerEvents:"none"}}>🔍</span>
        <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}
          placeholder="Search everything — people, companies, notes…"
          style={{background:G50,border:"1px solid "+G200,borderRadius:8,padding:"8px 32px 8px 34px",color:G900,fontSize:13,outline:"none",width:"100%",fontFamily:"inherit"}}/>
        {q&&<button onClick={()=>{setQ("");setOpen(false);}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:G400,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
      </div>
      {open&&results.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:W,border:"1px solid "+G200,borderRadius:10,boxShadow:"0 8px 32px #0002",zIndex:200,overflow:"hidden"}}>
          {results.map(item=>{
            const ip=item._kind==="person",color=ip?(item.type==="contact"?"#6f42c1":TEAL):(TC_MAP[item.tier]||G600);
            return(
              <div key={item._kind+"-"+item.id} onClick={()=>{onNavigate(ip?"people":"companies",item.id);setQ("");setOpen(false);}}
                style={{display:"flex",gap:12,alignItems:"center",padding:"10px 16px",cursor:"pointer",borderBottom:"1px solid "+G100}}
                onMouseEnter={e=>e.currentTarget.style.background=G50}
                onMouseLeave={e=>e.currentTarget.style.background=W}>
                <Av name={item.name} size={30} color={color}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{item.name}</div>
                  <div style={{fontSize:11,color:G600}}>{ip?((item.title||"")+(item.company?" · "+item.company:"")):(item.type||"")+(item.hq?" · "+item.hq:"")}</div>
                </div>
                <span style={{fontSize:10,color:G400,background:G100,borderRadius:4,padding:"2px 7px",fontWeight:600,textTransform:"uppercase"}}>{ip?item.type:"company"}</span>
              </div>
            );
          })}
        </div>
      )}
      {open&&q.length>=2&&!results.length&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:W,border:"1px solid "+G200,borderRadius:10,boxShadow:"0 8px 32px #0002",zIndex:200,padding:"16px",textAlign:"center",color:G400,fontSize:13}}>No results for "{q}"</div>
      )}
    </div>
  );
}

let AT_TOKEN=localStorage.getItem("volt_at_token")||"";
let AT_BASE=localStorage.getItem("volt_at_base")||"";
let AT_TABLE=localStorage.getItem("volt_at_table")||"";
async function atFetch(path,opts={}){
  const r=await fetch("https://api.airtable.com/v0/"+AT_BASE+"/"+AT_TABLE+path,{...opts,headers:{"Authorization":"Bearer "+AT_TOKEN,"Content-Type":"application/json",...(opts.headers||{})}});
  if(!r.ok)throw new Error("AT "+r.status);return r.json();
}
async function getOrCreate(name){
  const d=await atFetch("?filterByFormula=Name%3D%22"+encodeURIComponent(name)+"%22");
  if(d.records&&d.records.length>0){localStorage.setItem("atid_"+name,d.records[0].id);return d.records[0];}
  const c=await atFetch("",{method:"POST",body:JSON.stringify({records:[{fields:{Name:name,Notes:"[]"}}]})});
  localStorage.setItem("atid_"+name,c.records[0].id);return c.records[0];
}
async function loadFromAirtable(){
  const[p,c]=await Promise.all([getOrCreate("PEOPLE"),getOrCreate("COMPANIES")]);
  let people=[],companies=[];
  try{people=JSON.parse(p.fields.Notes||"[]");}catch{}
  try{companies=JSON.parse(c.fields.Notes||"[]");}catch{}
  if(people.length)localStorage.setItem("voltcrm5-people",JSON.stringify(people));
  if(companies.length)localStorage.setItem("voltcrm5-companies",JSON.stringify(companies));
  return{people,companies};
}
async function saveToAirtable(name,data){
  const rec=await getOrCreate(name);
  await atFetch("/"+rec.id,{method:"PATCH",body:JSON.stringify({fields:{Notes:JSON.stringify(data)}})});
}
function SetupScreen({onComplete}){
  const[token,setToken]=useState("");
  const[base,setBase]=useState("appD0JD8AUdtR6thY");
  const[testing,setTesting]=useState(false);
  const[error,setError]=useState("");
  const save=async()=>{
    if(!token.trim()){setError("Please enter your token");return;}
    setTesting(true);setError("");
    try{
      const r=await fetch("https://api.airtable.com/v0/"+base+"/tblUL48Km1j2m8sRU?maxRecords=1",{headers:{"Authorization":"Bearer "+token.trim()}});
      if(!r.ok)throw new Error("Failed ("+r.status+") — check your token");
      localStorage.setItem("volt_at_token",token.trim());
      localStorage.setItem("volt_at_base",base.trim());
      localStorage.setItem("volt_at_table","tblUL48Km1j2m8sRU");
      AT_TOKEN=token.trim();AT_BASE=base.trim();AT_TABLE="tblUL48Km1j2m8sRU";
      onComplete();
    }catch(e){setTesting(false);setError(e.message);}
  };
  return(
    <div style={{background:"#f8f9fa",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:14,padding:"40px 48px",width:520,maxWidth:"100%",boxShadow:"0 4px 24px #0002",border:"1px solid #e9ecef"}}>
        <div style={{fontWeight:800,fontSize:18,color:NAVY,marginBottom:4}}>VOLT<span style={{fontWeight:400}}>CONSULTING</span></div>
        <div style={{fontSize:10.5,color:TEAL,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:24,fontWeight:700}}>Internal CRM</div>
        <h2 style={{fontSize:18,fontWeight:700,color:NAVY,marginBottom:8}}>Connect to Airtable</h2>
        <p style={{fontSize:13,color:"#6c757d",marginBottom:24,lineHeight:1.6}}>Enter your credentials once. Stored in this browser only.</p>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"#6c757d",marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Personal Access Token</div>
          <input value={token} onChange={e=>setToken(e.target.value)} placeholder="patXXXXXX…" style={{width:"100%",border:"1px solid #dee2e6",borderRadius:6,padding:"9px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:"#6c757d",marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Base ID</div>
          <input value={base} onChange={e=>setBase(e.target.value)} placeholder="appXXXXXX…" style={{width:"100%",border:"1px solid #dee2e6",borderRadius:6,padding:"9px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
        </div>
        {error&&<div style={{color:"#dc3545",fontSize:13,marginBottom:12}}>{error}</div>}
        <button onClick={save} disabled={testing} style={{background:TEAL,color:"#fff",border:"none",borderRadius:7,padding:"11px 24px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",fontFamily:"inherit",opacity:testing?0.7:1}}>
          {testing?"Testing…":"Connect & Open CRM"}
        </button>
        <div style={{marginTop:12,fontSize:12,color:"#adb5bd",textAlign:"center"}}>Each team member enters this once on first visit.</div>
      </div>
    </div>
  );
}

const NAV=[{id:"bd",label:"BD Tracker",icon:"◎"},{id:"people",label:"People",icon:"◉"},{id:"companies",label:"Companies",icon:"◈"},{id:"campaigns",label:"Campaigns",icon:"◇"},{id:"map",label:"Market Map",icon:"◌"}];

function App(){
  const[view,setView]=useState("bd");
  const[navSel,setNavSel]=useState(null);
  const[people,setPeople]=useState(SEED_PEOPLE);
  const[companies,setCompanies]=useState(SEED_COMPANIES);
  const[ready,setReady]=useState(false);
  const[saveState,setSaveState]=useState(null);

  const[showSetup,setShowSetup]=useState(!localStorage.getItem("volt_at_token"));
  const[syncStatus,setSyncStatus]=useState("loading");

  useEffect(()=>{
    if(showSetup){setReady(true);return;}
    (async()=>{
      try{
        const data=await loadFromAirtable();
        if(data.people&&data.people.length>0)setPeople(data.people);
        else{const sp=await sGet("voltcrm5-people");if(sp)setPeople(sp);}
        if(data.companies&&data.companies.length>0)setCompanies(data.companies);
        else{const sc=await sGet("voltcrm5-companies");if(sc)setCompanies(sc);}
        setSyncStatus("ok");
      }catch(e){
        const sp=await sGet("voltcrm5-people");const sc=await sGet("voltcrm5-companies");
        if(sp)setPeople(sp);if(sc)setCompanies(sc);
        setSyncStatus("offline");
      }
      setReady(true);
    })();
  },[showSetup]);

  const persist=useCallback(async(key,data)=>{
    setSaveState("saving");
    await sSet("voltcrm5-"+key,data);
    try{if(key==="people")await saveToAirtable("PEOPLE",data);else if(key==="companies")await saveToAirtable("COMPANIES",data);}
    catch(e){console.warn("AT:",e.message);}
    setSaveState("saved");
    setTimeout(()=>setSaveState(null),2500);
  },[]);

  const handleNavigate=(targetView,id)=>{setView(targetView);setNavSel(id);setTimeout(()=>setNavSel(null),500);};
  const overdueCount=[...people,...companies].filter(x=>x.nextDue&&new Date(x.nextDue)<new Date()).length;

  if(showSetup)return <SetupScreen onComplete={()=>{setShowSetup(false);window.location.reload();}}/>;
  if(!ready)return(
    <div style={{fontFamily:"Aptos,Calibri,'Segoe UI',sans-serif",background:W,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontWeight:800,fontSize:16,color:TEAL}}>VOLT<span style={{fontWeight:400,color:NAVY}}>CONSULTING</span></div>
      <div style={{fontSize:13,color:G600}}>Connecting to Airtable…</div>
    </div>
  );

  return(
    <div style={{fontFamily:"Aptos,Calibri,'Segoe UI',sans-serif",background:G50,height:"100vh",display:"flex",overflow:"hidden",color:G900}}>
      <style>{"*{box-sizing:border-box;margin:0;padding:0}input,textarea,select,button{font-family:Aptos,Calibri,'Segoe UI',sans-serif}input::placeholder,textarea::placeholder{color:"+G400+"}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:"+G300+";border-radius:3px}"}</style>

      <div style={{width:220,background:W,borderRight:"1px solid "+G200,display:"flex",flexDirection:"column",flexShrink:0,boxShadow:"1px 0 4px #0001"}}>
        <div style={{padding:"20px 20px 18px",borderBottom:"1px solid "+G200}}>
          <img src={LOGO_SRC} alt="VoltConsulting" style={{height:28,maxWidth:"100%",objectFit:"contain",objectPosition:"left"}}/>
          <div style={{fontSize:10.5,color:TEAL,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:8,fontWeight:700}}>Internal CRM</div>
        </div>
        <nav style={{flex:1,padding:"12px 10px"}}>
          {NAV.map(n=>{
            const active=view===n.id;
            return(
              <button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:active?TL:"transparent",border:"1px solid "+(active?TM:"transparent"),borderRadius:7,padding:"10px 12px",marginBottom:3,color:active?TEAL:G600,fontWeight:active?700:400,fontSize:13.5,cursor:"pointer",textAlign:"left",transition:"all 0.12s",fontFamily:"inherit"}}>
                <span style={{fontSize:14}}>{n.icon}</span>
                {n.label}
                {n.id==="bd"&&overdueCount>0&&<span style={{marginLeft:"auto",background:DANGER,color:W,borderRadius:10,padding:"1px 8px",fontSize:10.5,fontWeight:800}}>{overdueCount}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:"14px 20px 20px",borderTop:"1px solid "+G200}}>
          <div style={{fontSize:10.5,color:G400,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>Team</div>
          {[["David",TEAL],["Lauren","#6f42c1"],["Brinda",WARN]].map(([name,c])=>(
            <div key={name} style={{display:"flex",alignItems:"center",gap:9,marginBottom:8}}>
              <Av name={name} size={24} color={c}/>
              <span style={{fontSize:13,color:G700}}>{name}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{background:W,borderBottom:"1px solid "+G200,padding:"12px 24px",display:"flex",alignItems:"center",gap:16,flexShrink:0}}>
          <GlobalSearch people={people} companies={companies} onNavigate={handleNavigate}/>
          <div style={{fontSize:12,color:G400,whiteSpace:"nowrap"}}>{people.length+" people · "+companies.length+" companies"}</div>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>
          {view==="bd"&&<BDTracker people={people} companies={companies} setPeople={setPeople} setCompanies={setCompanies} persist={persist}/>}
          {view==="people"&&<PeopleView people={people} setPeople={setPeople} companies={companies} setCompanies={setCompanies} persist={persist} initialSel={navSel}/>}
          {view==="companies"&&<CompaniesView companies={companies} setCompanies={setCompanies} people={people} setPeople={setPeople} persist={persist} initialSel={navSel} onNavigatePerson={id=>{handleNavigate("people",id);}}/>}
          {view==="campaigns"&&<CampaignsView people={people} setPeople={setPeople} persist={persist}/>}
        {view==="map"&&<MarketMap people={people} companies={companies} onNavigate={handleNavigate}/>}
        </div>
      </div>

      {saveState&&<div style={{position:"fixed",bottom:18,right:20,background:saveState==="saved"?OK+"15":G100,border:"1px solid "+(saveState==="saved"?OK:G300),borderRadius:20,padding:"5px 16px",fontSize:12,color:saveState==="saved"?OK:G600,zIndex:500,pointerEvents:"none",fontWeight:600}}>{saveState==="saved"?"✓ Synced":"Saving…"}</div>}
    </div>
  );
}
var root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
