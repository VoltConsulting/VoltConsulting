    // Global error boundary
    class ErrorBoundary extends React.Component {
      constructor(props){super(props);this.state={error:null};}
      static getDerivedStateFromError(e){return{error:e};}
      render(){
        if(this.state.error)return(
          <div style={{padding:40,fontFamily:"sans-serif",color:"#dc3545",background:"#fff5f5",minHeight:"100vh"}}>
            <h2>CRM Error</h2>
            <pre style={{background:"#fff",padding:20,borderRadius:8,fontSize:12,overflow:"auto",color:"#333"}}>
              {this.state.error.toString()}
              {this.state.error.stack}
            </pre>
            <p>Please screenshot this and send to your developer.</p>
          </div>
        );
        return this.props.children;
      }
    }

// ── Airtable sync (simple JSON blob approach) ─────────────────
// Credentials stored in browser localStorage — never in the file
let AT_TOKEN  = localStorage.getItem("volt_at_token") || "";
let AT_BASE   = localStorage.getItem("volt_at_base")  || "";
let AT_TABLE  = localStorage.getItem("volt_at_table") || "";
const AT_URL    = "https://api.airtable.com/v0/" + AT_BASE + "/" + AT_TABLE;

async function atGet(url) {
  const r = await fetch(url, {headers:{"Authorization":"Bearer "+AT_TOKEN}});
  if(!r.ok) throw new Error("AT " + r.status + " " + await r.text());
  return r.json();
}
async function atPost(url, body) {
  const r = await fetch(url, {method:"POST",headers:{"Authorization":"Bearer "+AT_TOKEN,"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("AT " + r.status + " " + await r.text());
  return r.json();
}
async function atPatch(url, body) {
  const r = await fetch(url, {method:"PATCH",headers:{"Authorization":"Bearer "+AT_TOKEN,"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("AT " + r.status + " " + await r.text());
  return r.json();
}

// We store two "data" records in Table 1:
// Row named "PEOPLE"   — Notes field contains JSON array of all people
// Row named "COMPANIES" — Notes field contains JSON array of all companies
// We track their record IDs in localStorage so we don't re-create them

async function getOrCreateRecord(name) {
  // Check localStorage for cached record ID
  const cachedId = localStorage.getItem("at_id_" + name);
  
  // Try to find existing record
  const data = await atGet(AT_URL + "?filterByFormula=Name%3D%22" + encodeURIComponent(name) + "%22");
  if(data.records && data.records.length > 0) {
    const id = data.records[0].id;
    localStorage.setItem("at_id_" + name, id);
    return data.records[0];
  }
  
  // Create it
  const created = await atPost(AT_URL, {records:[{fields:{Name:name,Notes:"[]"}}]});
  const id = created.records[0].id;
  localStorage.setItem("at_id_" + name, id);
  return created.records[0];
}

async function loadFromAirtable() {
  const [pr, cr] = await Promise.all([
    getOrCreateRecord("PEOPLE"),
    getOrCreateRecord("COMPANIES"),
  ]);
  
  let people = [], companies = [];
  try { people = JSON.parse(pr.fields.Notes || "[]"); } catch {}
  try { companies = JSON.parse(cr.fields.Notes || "[]"); } catch {}
  
  // Cache locally
  if(people.length)    localStorage.setItem("voltcrm5-people",    JSON.stringify(people));
  if(companies.length) localStorage.setItem("voltcrm5-companies", JSON.stringify(companies));
  
  return { people, companies };
}

async function saveToAirtable(name, data) {
  // Get or create record ID
  const rec = await getOrCreateRecord(name);
  const recId = rec.id || localStorage.getItem("at_id_" + name);
  await atPatch(AT_URL + "/" + recId, {fields:{Notes: JSON.stringify(data)}});
}

// Simple localStorage shim for CRM internal cache
window.storage = {
  get: async k => { try { const v=localStorage.getItem(k); return v?{key:k,value:v}:null; } catch { return null; } },
  set: async (k,v) => { try { localStorage.setItem(k,v); return {key:k,value:v}; } catch { return null; } },
  delete: async k => { try { localStorage.removeItem(k); return {key:k,deleted:true}; } catch { return null; } },
  list: async prefix => { try { const keys=Object.keys(localStorage).filter(k=>!prefix||k.startsWith(prefix)); return {keys}; } catch { return {keys:[]}; } }
};

function normalize(s){return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function similarity(a,b){
  const na=normalize(a),nb=normalize(b);
  if(!na||!nb)return 0;
  if(na===nb)return 1;
  if(na.includes(nb)||nb.includes(na))return 0.85;
  const bigrams=s=>{const b=new Set();for(let i=0;i<s.length-1;i++)b.add(s.slice(i,i+2));return b;};
  const ba=bigrams(na),bb=bigrams(nb);
  let inter=0;ba.forEach(g=>{if(bb.has(g))inter++;});
  return(2*inter)/(ba.size+bb.size||1);
}
function findDupePeople(name,company,people,excludeId){
  return people.filter(p=>{
    if(p.id===excludeId)return false;
    const ns=similarity(name,p.name);
    if(ns<0.8)return false;
    if(company&&p.company)return similarity(company,p.company)>0.7||ns>0.92;
    return ns>0.92;
  });
}
function findDupeCompanies(name,companies,excludeId){
  return companies.filter(c=>c.id!==excludeId&&similarity(name,c.name)>=0.82);
}
function autoLinkCompany(personCompany,companies){
  if(!personCompany?.trim())return{companies,companyId:null};
  const match=companies.find(c=>similarity(personCompany,c.name)>=0.82);
  if(match)return{companies,companyId:match.id};
  const newCo={id:Date.now()+Math.random(),name:personCompany,type:"Consulting",tier:"Prospect",hq:"",keyContact:"",openMandates:0,lastContacted:"",nextAction:"",nextDue:"",relationship:"Cold",notes:"Auto-created from people record."};
  return{companies:[...companies,newCo],companyId:newCo.id};
}

// ── Local LinkedIn profile parser (no API needed) ─────────────
function parseLinkedInProfile(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);

  // Extract name: first non-empty line that looks like a name
  // (2+ words, no special chars, not a URL, not a button label)
  let name = "";
  const skipWords = ["message","connect","follow","more","highlights","about","experience","education","activity","featured","contact","info","mutual","connections","followers","posts","comments","videos","images","premium"];
  for(const line of lines){
    const clean = line.replace(/,\s*Assoc.*$/i,"").replace(/,\s*(PhD|MD|MBA|MSc|BSc|BA|MA|Dr\.?).*$/i,"").trim();
    const words = clean.split(/\s+/);
    if(words.length >= 2 && words.length <= 5 &&
       !clean.includes("http") && !clean.includes("|") &&
       !clean.includes("#") && !clean.includes("@") &&
       !skipWords.includes(clean.toLowerCase()) &&
       /^[A-Za-zÀ-ÿ\s\.\-\']+$/.test(clean)){
      name = line.replace(/,\s*Assoc.*$/i,"").replace(/,\s*(PhD|MD|MBA|MSc|BSc|BA|MA).*$/i,"").trim();
      break;
    }
  }

  // Extract headline (line with | separators after name)
  let title = "", company = "";
  for(const line of lines){
    if(line.includes("|") && !line.includes("http")){
      const parts = line.split("|").map(p=>p.trim()).filter(Boolean);
      if(parts.length >= 2){
        // title is first part, company is second
        title = parts[0].replace(/Co-Founder of /i,"Co-Founder").trim();
        company = parts[1].replace(/\s*\|.*$/,"").trim();
        // Clean up company - remove "Full-time" etc
        company = company.replace(/·.*$/,"").trim();
        break;
      }
    }
  }

  // If no pipe-separated headline, look for job title patterns
  if(!title){
    for(const line of lines){
      if(/(founder|director|manager|partner|consultant|analyst|associate|head of|vp |vice president|president|officer|lead|specialist|executive)/i.test(line) && line.length < 100){
        title = line.trim();
        break;
      }
    }
  }

  // Extract location (usually "City, Country" or "City Metropolitan Area")
  let location = "";
  for(const line of lines){
    if(/(metropolitan area|united kingdom|united states|ireland|germany|france|switzerland|netherlands|belgium|spain|italy|sweden|denmark|norway)/i.test(line) && line.length < 60){
      location = line.replace(/Contact info.*/i,"").trim();
      break;
    }
    // "City, Country" pattern
    if(/^[A-Z][a-zA-Z\s]+,\s*[A-Z][a-zA-Z\s]+$/.test(line) && line.length < 50){
      location = line.trim();
      break;
    }
  }

  // Extract email
  let email = "";
  const emailMatch = text.match(/[\w\.\-]+@[\w\.\-]+\.[a-z]{2,}/i);
  if(emailMatch) email = emailMatch[0];

  // Extract phone
  let phone = "";
  const phoneMatch = text.match(/(\+?[\d\s\-\(\)]{10,18})/);
  if(phoneMatch){
    const p = phoneMatch[1].replace(/\s+/g," ").trim();
    if(p.replace(/\D/g,"").length >= 10) phone = p;
  }

  // Extract LinkedIn URL
  let linkedin = "";
  const liMatch = text.match(/linkedin\.com\/in\/[\w\-]+/i);
  if(liMatch) linkedin = "https://www." + liMatch[0];

  // Infer seniority from title
  let seniority = "Manager / Principal";
  const tl = (title||"").toLowerCase();
  if(/(founder|ceo|coo|cfo|cto|chief|partner|president|managing director|md )/i.test(tl)) seniority = "C-Suite / Partner";
  else if(/(vp |vice president|director)/i.test(tl)) seniority = "VP / Director";
  else if(/(analyst|graduate|associate consultant|junior)/i.test(tl)) seniority = "Analyst / Consultant";

  // Infer sectors from full text
  const fullText = text.toLowerCase();
  const sectorKeywords = {
    "Life Sciences": ["life science","biopharma","pharma","pharmaceutical","biotech"],
    "Strategy": ["strategy","strategic","consulting","management consulting"],
    "Commercial": ["commercial","sales","marketing"],
    "Oncology": ["oncology","cancer","tumor","haematology"],
    "RWE": ["real world evidence","rwe","real-world","real world data"],
    "Market Access": ["market access","hta","reimbursement","access"],
    "Operations": ["operations","supply chain","manufacturing"],
    "MedTech": ["medtech","medical device","device","diagnostics"],
    "Digital Health": ["digital health","digital","ai in health","healthtech"],
    "Biotech": ["biotech","biotechnology","biologics","cell therapy","gene therapy"],
    "Regulatory": ["regulatory","regulation","compliance","fda","ema"],
    "Pricing": ["pricing","price","health economics","heor","pharmacoeconomic"],
  };
  const sectors = [];
  for(const [sector, keywords] of Object.entries(sectorKeywords)){
    if(keywords.some(k=>fullText.includes(k))) sectors.push(sector);
  }

  return { name, title, company, location, seniority, sectors, linkedin, email, phone };
}

// ── LinkedIn paste ────────────────────────────────────────────
function LinkedInPaste({onParsed}){
  const[open,setOpen]=useState(false);
  const[text,setText]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const parse=async()=>{
    if(!text.trim())return;
    setLoading(true);setError("");
    try{
      const result = parseLinkedInProfile(text);
      if(!result.name) throw new Error("Could not find a name. Make sure you copied the full profile page.");
      onParsed(result);setOpen(false);setText("");
    }catch(err){
      console.error("LinkedIn parse error:",err);
      setError("Could not import: "+err.message);
    }
    setLoading(false);
  };
  return(
    <>
      <Btn variant="teal" onClick={()=>setOpen(true)} style={{fontSize:13,padding:"7px 14px"}}>⚡ Paste from LinkedIn</Btn>
      {open&&(
        <ModalEl title="Import from LinkedIn" onClose={()=>{setOpen(false);setText("");setError("");}}>
          <p style={{color:G600,fontSize:13,marginBottom:14,lineHeight:1.6}}>
            Open the LinkedIn profile → select all text (Cmd/Ctrl+A) → copy → paste below.<br/>
            <strong style={{color:NAVY}}>Tip:</strong> Or just select the top section of the profile (name, headline, current role) for cleaner results. AI will extract only that person's details.
          </p>
          <Tarea value={text} onChange={setText} placeholder="Paste LinkedIn profile text here…" rows={10}/>
          {error&&<div style={{color:DANGER,fontSize:12,marginTop:8}}>{error}</div>}
          <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>{setOpen(false);setText("");}}>Cancel</Btn>
            <Btn onClick={parse} style={{opacity:loading?0.6:1}}>{loading?"Parsing…":"Import Profile"}</Btn>
          </div>
        </ModalEl>
      )}
    </>
  );
}

function CompanyLinkedInPaste({onParsed}){

      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-request-allowlist":"*"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,

const CSV_MAP={"name":"name","full name":"name","fullname":"name","title":"title","job title":"title","position":"title","role":"title","company":"company","employer":"company","organization":"company","location":"location","city":"location","linkedin":"linkedin","linkedin url":"linkedin","url":"linkedin","email":"email","email address":"email","relationship":"relationship","status":"relationship","sectors":"sectors","sector":"sectors","expertise":"sectors","notes":"notes","note":"notes","comments":"notes","seniority":"seniority","level":"seniority","last contacted":"lastContacted","last contact":"lastContacted","next action":"nextAction","action":"nextAction","next due":"nextDue","due date":"nextDue","due":"nextDue","type":"type"};

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return{headers:[],rows:[]};
  const first=lines[0];
  const delim=first.split("\t").length>first.split(",").length?"\t":",";
  const parseRow=line=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'&&!inQ)inQ=true;
      else if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
      else if(c==='"'&&inQ)inQ=false;
      else if(c===delim&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=c;
    }
    cols.push(cur.trim());return cols;
  };
  const headers=parseRow(lines[0]).map(h=>h.replace(/^"|"$/g,"").trim());
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseRow(l);const obj={};
    headers.forEach((h,i)=>{obj[h]=vals[i]||"";});return obj;
  });
  return{headers,rows};
}

function CSVImporter({people,companies,setPeople,setCompanies,persist,onClose}){
  const[step,setStep]=useState("upload");
  const[raw,setRaw]=useState("");
  const[parsed,setParsed]=useState(null);
  const[mappings,setMappings]=useState({});
  const[preview,setPreview]=useState([]);
  const[results,setResults]=useState(null);
  const fileRef=useRef(null);
  const CRM_FIELDS=["ignore","name","title","company","location","type","seniority","sectors","linkedin","email","relationship","lastContacted","nextAction","nextDue","notes"];

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>processText(ev.target.result);
    reader.readAsText(file);
  };
  const processText=text=>{
    setRaw(text);const p=parseCSV(text);setParsed(p);
    const auto={};
    p.headers.forEach(h=>{auto[h]=CSV_MAP[h.toLowerCase().trim()]||"ignore";});
    setMappings(auto);setStep("map");
  };
  const mapRow=row=>{
    const p={type:"candidate",name:"",title:"",company:"",location:"",seniority:"Manager / Principal",sectors:[],linkedin:"",email:"",lastContacted:today,nextAction:"",nextDue:"",relationship:"Warm",notes:""};
    Object.entries(mappings).forEach(([csvH,crmF])=>{
      if(!crmF||crmF==="ignore")return;
      const val=(row[csvH]||"").trim();if(!val)return;
      if(crmF==="sectors")p.sectors=val.split(/[,;|]/).map(s=>s.trim()).filter(Boolean);
      else p[crmF]=val;
    });
    const tl=(p.type||"").toLowerCase();p.type=tl.includes("contact")||tl.includes("client")?"contact":"candidate";
    const rl=(p.relationship||"").toLowerCase();p.relationship=rl.includes("hot")?"Hot":rl.includes("cold")?"Cold":rl.includes("new")?"New":"Warm";
    return p;
  };
  const runImport=()=>{
    const allRows=parsed.rows.map(mapRow).filter(r=>r.name.trim());
    let np=[...people],nc=[...companies],added=0,skipped=0;
    allRows.forEach(r=>{
      if(findDupePeople(r.name,r.company,np).length>0){skipped++;return;}
      const{companies:updCos,companyId}=autoLinkCompany(r.company,nc);
      nc=updCos;np=[{...r,id:Date.now()+Math.random(),companyId},...np];added++;
    });
    setPeople(np);persist("people",np);setCompanies(nc);persist("companies",nc);
    setResults({added,skipped,total:allRows.length});setStep("done");
  };

  if(step==="upload")return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:20,lineHeight:1.6}}>Import from any CSV or TSV — LinkedIn exports, spreadsheets, old CRM. Auto-maps columns, detects duplicates, links to companies.</p>
      <div style={{border:"2px dashed "+G300,borderRadius:10,padding:"32px",textAlign:"center",marginBottom:16,background:G50}}>
        <div style={{fontSize:32,marginBottom:10}}>📄</div>
        <div style={{fontWeight:600,color:NAVY,marginBottom:6}}>Drop a CSV or TSV file</div>
        <div style={{color:G600,fontSize:13,marginBottom:16}}>or click to browse</div>
        <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" onChange={handleFile} style={{display:"none"}}/>
        <Btn onClick={()=>fileRef.current&&fileRef.current.click()}>Choose File</Btn>
      </div>
      <div style={{marginBottom:8,color:G600,fontSize:12,textAlign:"center"}}>— or paste CSV data directly —</div>
      <Tarea value={raw} onChange={setRaw} placeholder={"name,title,company,location\nDr. Sarah Chen,VP Strategy,Huron Consulting,London"} rows={4}/>
      {raw.trim()&&<div style={{marginTop:10,display:"flex",justifyContent:"flex-end"}}><Btn onClick={()=>processText(raw)}>Parse →</Btn></div>}
    </div>
  );

  if(step==="map"&&parsed)return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:16}}><strong style={{color:NAVY}}>{parsed.rows.length} rows</strong>, <strong style={{color:NAVY}}>{parsed.headers.length} columns</strong>. Map each column to a CRM field.</p>
      <div style={{border:"1px solid "+G200,borderRadius:8,overflow:"hidden",marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:G100,padding:"10px 16px",fontSize:11,fontWeight:700,color:G600,textTransform:"uppercase"}}>
          <div>CSV Column</div><div>Sample</div><div>Map to</div>
        </div>
        {parsed.headers.map((h,i)=>(
          <div key={h} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"10px 16px",borderTop:"1px solid "+G200,alignItems:"center",background:i%2===0?W:G50}}>
            <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{h}</div>
            <div style={{fontSize:12,color:G600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(parsed.rows[0]?.[h]||"—").slice(0,25)}</div>
            <SelEl value={mappings[h]||"ignore"} onChange={v=>setMappings(m=>({...m,[h]:v}))} options={CRM_FIELDS} style={{fontSize:12,padding:"5px 8px"}}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={()=>setStep("upload")}>← Back</Btn>
        <Btn onClick={()=>{setPreview(parsed.rows.slice(0,5).map(mapRow));setStep("preview");}}>Preview →</Btn>
      </div>
    </div>
  );

  if(step==="preview")return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:16}}>First 5 of <strong style={{color:NAVY}}>{parsed.rows.length}</strong> rows. Duplicates skipped automatically.</p>
      <div style={{border:"1px solid "+G200,borderRadius:8,overflow:"hidden",marginBottom:16}}>
        {preview.map((p,i)=>(
          <div key={i} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",borderBottom:"1px solid "+G200,background:i%2===0?W:G50}}>
            <Av name={p.name||"?"} size={32} color={p.type==="contact"?"#6f42c1":TEAL}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{p.name||"(no name)"}</div>
              <div style={{fontSize:12,color:G600}}>{[p.title,p.company,p.location].filter(Boolean).join(" · ")}</div>
            </div>
            <RelDot rel={p.relationship}/>
          </div>
        ))}
      </div>
      <div style={{background:TL,border:"1px solid "+TM,borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:13,color:NAVY}}>
        <strong style={{color:TEAL}}>On import:</strong> each person is duplicate-checked, linked to their company (auto-created if needed), and added instantly.
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={()=>setStep("map")}>← Back</Btn>
        <Btn onClick={runImport}>Import {parsed.rows.length} People</Btn>
      </div>
    </div>
  );

  if(step==="done"&&results)return(
    <div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48,marginBottom:16}}>✓</div>
      <h3 style={{fontSize:20,fontWeight:700,color:NAVY,marginBottom:20}}>Import complete</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:360,margin:"0 auto 24px"}}>
        <div style={{background:OK+"10",border:"1px solid "+OK+"30",borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:OK}}>{results.added}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Added</div>
        </div>
        <div style={{background:WARN+"10",border:"1px solid "+WARN+"30",borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:WARN}}>{results.skipped}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Skipped</div>
        </div>
        <div style={{background:G50,border:"1px solid "+G200,borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:NAVY}}>{results.total}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Total</div>
        </div>
      </div>
      <Btn onClick={onClose}>Done</Btn>
    </div>
  );
  return null;
}


// ── Inline-editable overview tab ─────────────────────────────
function InlineField({label,value,onChange,type="text",href,linkLabel}){
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(value||"");
  const inputRef=useRef(null);
  useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus();},[editing]);

  const commit=()=>{onChange(draft);setEditing(false);};
  const cancel=()=>{setDraft(value||"");setEditing(false);};

  return(
    <div style={{borderBottom:"1px solid "+G100,paddingBottom:10,marginBottom:10}}>
      <div style={{fontSize:10.5,color:G400,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
      {editing?(
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input ref={inputRef} type={type} value={draft} onChange={e=>setDraft(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")cancel();}}
            style={{flex:1,background:W,border:"1.5px solid "+TEAL,borderRadius:6,padding:"6px 10px",color:G900,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={commit} style={{background:TEAL,color:W,border:"none",borderRadius:5,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
          <button onClick={cancel} style={{background:"transparent",color:G400,border:"1px solid "+G300,borderRadius:5,padding:"5px 8px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",gap:8,minHeight:24}}>
          {value?(
            href
              ?<a href={href} target="_blank" rel="noreferrer" style={{color:TEAL,fontSize:13,fontWeight:600,textDecoration:"none",flex:1}}>{linkLabel||value}</a>
              :<span style={{color:NAVY,fontSize:13,fontWeight:600,flex:1}}>{value}</span>
          ):(
            <span style={{color:G300,fontSize:13,fontStyle:"italic",flex:1}}>Click to add…</span>
          )}
          <button onClick={()=>{setDraft(value||"");setEditing(true);}}
            style={{background:"transparent",border:"1px solid "+G200,borderRadius:5,padding:"3px 8px",fontSize:11,color:G400,cursor:"pointer",fontFamily:"inherit",flexShrink:0,opacity:0.7}}>
            ✏
          </button>
        </div>
      )}
    </div>
  );
}

function PeopleView({people,setPeople,companies,setCompanies,persist,initialSel}){
  const[search,setSearch]=useState("");
  const[typeF,setTypeF]=useState("all");
  const[relF,setRelF]=useState("all");
  const[sel,setSel]=useState(initialSel||null);
  const[modal,setModal]=useState(null);
  const[prefill,setPrefill]=useState(null);
  useEffect(()=>{if(initialSel)setSel(initialSel);},[initialSel]);

  const list=useMemo(()=>people.filter(p=>
    (typeF==="all"||p.type===typeF)&&(relF==="all"||p.relationship===relF)&&
    (p.name+p.company+p.title+(p.sectors||[]).join(" ")).toLowerCase().includes(search.toLowerCase())
  ),[people,search,typeF,relF]);

  const selP=people.find(p=>p.id===sel);

  const commitBoth=(np,nc)=>{setPeople(np);persist("people",np);setCompanies(nc);persist("companies",nc);};
  const addPerson=f=>{const{companies:nc,companyId}=autoLinkCompany(f.company,companies);commitBoth([{...f,id:Date.now(),companyId},...people],nc);};
  const updPerson=f=>{const{companies:nc,companyId}=autoLinkCompany(f.company,companies);commitBoth(people.map(p=>p.id===sel?{...p,...f,companyId}:p),nc);};
  const delPerson=()=>{const u=people.filter(p=>p.id!==sel);setPeople(u);persist("people",u);setSel(null);};

  const filterBtn=(v,l,c,cur,set)=>(
    <button key={v} onClick={()=>set(v)} style={{background:cur===v?c+"15":"transparent",color:cur===v?c:G600,border:"1px solid "+(cur===v?c+"40":G300),borderRadius:20,padding:"4px 13px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
  );

  return(
    <div style={{display:"flex",height:"100%",minHeight:0}}>

          <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>

          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {["all","Hot","Warm","Cold","New"].map(r=>filterBtn(r,r==="all"?"All":r,REL[r]||TEAL,relF,setRelF))}
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"8px 8px"}}>
          {list.map(p=>{
            const isSel=sel===p.id,ac=p.type==="contact"?"#6f42c1":TEAL;
            return(
              <div key={p.id} onClick={()=>setSel(p.id)} style={{padding:"11px 12px",borderRadius:8,marginBottom:4,cursor:"pointer",background:isSel?TL:"transparent",border:"1px solid "+(isSel?TM:"transparent"),transition:"all 0.1s"}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <Av name={p.name} size={34} color={ac}/>

                      <RelDot rel={p.relationship}/>

// ── BD TRACKER ────────────────────────────────────────────────
function BDTracker({people,companies,setPeople,setCompanies,persist}){
  const now=new Date();
  const all=useMemo(()=>{
    const ps=people.filter(p=>p.nextAction||p.nextDue).map(p=>({...p,_k:"person"}));
    const cs=companies.filter(c=>c.nextAction||c.nextDue).map(c=>({...c,_k:"company"}));
    return[...ps,...cs].sort((a,b)=>{
      if(!a.nextDue&&!b.nextDue)return 0;if(!a.nextDue)return 1;if(!b.nextDue)return -1;
      return new Date(a.nextDue)-new Date(b.nextDue);
    });
  },[people,companies]);
  const ov=all.filter(i=>i.nextDue&&new Date(i.nextDue)<now);
  const soon=all.filter(i=>i.nextDue&&new Date(i.nextDue)>=now&&new Date(i.nextDue)<=new Date(Date.now()+7*86400000));
  const later=all.filter(i=>!i.nextDue||new Date(i.nextDue)>new Date(Date.now()+7*86400000));
  const markDone=item=>{
    if(item._k==="person"){const u=people.map(p=>p.id===item.id?{...p,nextAction:"",nextDue:"",lastContacted:today}:p);setPeople(u);persist("people",u);}
    else{const u=companies.map(c=>c.id===item.id?{...c,nextAction:"",nextDue:"",lastContacted:today}:c);setCompanies(u);persist("companies",u);}
  };
  const Sec=({title,items,accent})=>{
    if(!items.length)return null;
    return(
      <div style={{marginBottom:32}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,paddingBottom:10,borderBottom:"2px solid "+accent}}>
          <span style={{fontWeight:700,color:accent,fontSize:13,textTransform:"uppercase",letterSpacing:"0.07em"}}>{title}</span>
          <span style={{background:accent+"15",color:accent,borderRadius:12,padding:"1px 10px",fontSize:12,fontWeight:700}}>{items.length}</span>
        </div>
        {items.map(item=>{
          const ac=item._k==="company"?WARN:item.type==="contact"?"#6f42c1":TEAL;
          return(
            <div key={item._k+"-"+item.id} style={{background:W,border:"1px solid "+G200,borderLeft:"4px solid "+accent,borderRadius:8,padding:"14px 18px",marginBottom:10,display:"flex",gap:14,alignItems:"flex-start",boxShadow:"0 1px 3px #0001"}}>
              <Av name={item.name} size={36} color={ac}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                  <span style={{fontWeight:700,color:NAVY,fontSize:14}}>{item.name}</span>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}><DueTag due={item.nextDue}/><RelDot rel={item.relationship}/></div>
                </div>
                <div style={{fontSize:12,color:G600,marginBottom:8}}>{item._k==="company"?item.type:item.title}{(item.company||item.hq)?" · "+(item.company||item.hq):""}</div>
                {item.nextAction&&<div style={{fontSize:13,color:NAVY,background:G50,borderRadius:6,padding:"6px 12px",display:"inline-flex",alignItems:"center",gap:6,border:"1px solid "+G200}}><span style={{color:TEAL,fontWeight:700}}>→</span>{item.nextAction}</div>}
              </div>
              <button onClick={()=>markDone(item)} style={{background:TL,border:"1px solid "+TM,color:TEAL,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",flexShrink:0}}>✓ Done</button>
            </div>
          );
        })}
      </div>
    );
  };
  return(
    <div style={{overflowY:"auto",padding:"32px 40px",maxWidth:860,height:"100%"}}>
      <h1 style={{fontSize:26,fontWeight:700,color:NAVY,margin:"0 0 6px"}}>BD Tracker</h1>
      <p style={{color:G600,fontSize:14,marginBottom:32}}>Your prioritised follow-up list across all people and companies</p>
      {!all.length&&<div style={{textAlign:"center",padding:"60px 0",color:G400}}><div style={{fontSize:40,marginBottom:12}}>✓</div><div style={{fontSize:14}}>All caught up</div></div>}
      <Sec title="Overdue" items={ov} accent={DANGER}/>
      <Sec title="Due this week" items={soon} accent={WARN}/>
      <Sec title="Later" items={later} accent={G400}/>
    </div>
  );
}

  },[people]);

  const filteredPeople=useMemo(()=>people.filter(p=>{
    if(sectorF!=="All"&&!(p.sectors||[]).includes(sectorF))return false;
    if(seniorityF!=="All"&&p.seniority!==seniorityF)return false;
    if(relF!=="All"&&p.relationship!==relF)return false;

// ── Global search ─────────────────────────────────────────────
function GlobalSearch({people,companies,onNavigate}){
  const[q,setQ]=useState("");
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const results=useMemo(()=>{
    if(!q.trim()||q.length<2)return[];
    const ql=q.toLowerCase();
    const pr=people.filter(p=>(p.name+p.company+p.title+(p.sectors||[]).join(" ")).toLowerCase().includes(ql)).slice(0,6).map(p=>({...p,_kind:"person"}));
    const cr=companies.filter(c=>(c.name+c.type+c.hq).toLowerCase().includes(ql)).slice(0,4).map(c=>({...c,_kind:"company"}));
    return[...pr,...cr];
  },[q,people,companies]);
  return(
    <div ref={ref} style={{position:"relative",flex:1,maxWidth:420}}>
      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:14,color:G400,pointerEvents:"none"}}>🔍</span>
        <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}
          placeholder="Search everything — people, companies, notes…"
          style={{background:G50,border:"1px solid "+G200,borderRadius:8,padding:"8px 32px 8px 34px",color:G900,fontSize:13,outline:"none",width:"100%",fontFamily:"inherit"}}/>
        {q&&<button onClick={()=>{setQ("");setOpen(false);}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:G400,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
      </div>
      {open&&results.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:W,border:"1px solid "+G200,borderRadius:10,boxShadow:"0 8px 32px #0002",zIndex:200,overflow:"hidden"}}>
          {results.map(item=>{
            const ip=item._kind==="person",color=ip?(item.type==="contact"?"#6f42c1":TEAL):(TC_MAP[item.tier]||G600);
            return(
              <div key={item._kind+"-"+item.id} onClick={()=>{onNavigate(ip?"people":"companies",item.id);setQ("");setOpen(false);}}
                style={{display:"flex",gap:12,alignItems:"center",padding:"10px 16px",cursor:"pointer",borderBottom:"1px solid "+G100}}
                onMouseEnter={e=>e.currentTarget.style.background=G50}
                onMouseLeave={e=>e.currentTarget.style.background=W}>
                <Av name={item.name} size={30} color={color}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{item.name}</div>
                  <div style={{fontSize:11,color:G600}}>{ip?((item.title||"")+(item.company?" · "+item.company:"")):(item.type||"")+(item.hq?" · "+item.hq:"")}</div>
                </div>
                <span style={{fontSize:10,color:G400,background:G100,borderRadius:4,padding:"2px 7px",fontWeight:600,textTransform:"uppercase"}}>{ip?item.type:"company"}</span>
              </div>
            );
          })}
        </div>
      )}
      {open&&q.length>=2&&!results.length&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:W,border:"1px solid "+G200,borderRadius:10,boxShadow:"0 8px 32px #0002",zIndex:200,padding:"16px",textAlign:"center",color:G400,fontSize:13}}>No results for "{q}"</div>
      )}
    </div>
  );
}

function App(){
  const[showSetup,setShowSetup]=useState(!localStorage.getItem("volt_at_token"));
  const[view,setView]=useState("bd");
  const[navSel,setNavSel]=useState(null);
  const[people,setPeople]=useState(SEED_PEOPLE);
  const[companies,setCompanies]=useState(SEED_COMPANIES);
  const[ready,setReady]=useState(false);
  const[saveState,setSaveState]=useState(null);
  const[syncStatus,setSyncStatus]=useState("loading");

  useEffect(()=>{
    (async()=>{
      setSyncStatus("loading");
      try {
        const data = await loadFromAirtable();
        // Use Airtable data if it has records
        if(data.people && data.people.length>0) {
          setPeople(data.people);
        } else {
          // Try localStorage cache
          const sp=await sGet("voltcrm5-people");
          if(sp && sp.length>0) setPeople(JSON.parse(typeof sp==="string"?sp:JSON.stringify(sp)));
          // else keep SEED_PEOPLE (already set as default state)
        }
        if(data.companies && data.companies.length>0) {
          setCompanies(data.companies);
        } else {
          const sc=await sGet("voltcrm5-companies");
          if(sc && sc.length>0) setCompanies(JSON.parse(typeof sc==="string"?sc:JSON.stringify(sc)));
          // else keep SEED_COMPANIES
        }
        setSyncStatus("ok");
        // If Airtable was empty, push seed data up so all users see it
        if((!data.people||data.people.length===0)&&(!data.companies||data.companies.length===0)){
          try {
            await saveToAirtable("PEOPLE", SEED_PEOPLE);
            await saveToAirtable("COMPANIES", SEED_COMPANIES);
          } catch(e3){ console.warn("Seed push failed:", e3.message); }
        }
      } catch(e) {
        console.warn("Airtable load failed, using local cache:", e.message);
        try {
          const sp=await sGet("voltcrm5-people");
          const sc=await sGet("voltcrm5-companies");
          if(sp) setPeople(JSON.parse(typeof sp==="string"?sp:JSON.stringify(sp)));
          if(sc) setCompanies(JSON.parse(typeof sc==="string"?sc:JSON.stringify(sc)));
        } catch(e2) { /* keep seed data */ }
        setSyncStatus("offline");
      }
      setReady(true);
    })();
  },[]);

  const persist=useCallback(async(key,data)=>{
    setSaveState("saving");
    // Always save to localStorage immediately
    await sSet("voltcrm5-"+key, data);
    // Then sync to Airtable
    try {
      if(key==="people") await saveToAirtable("PEOPLE", data);
      else if(key==="companies") await saveToAirtable("COMPANIES", data);
      setSyncStatus("ok");
    } catch(e) {
      console.warn("Airtable save failed:", e.message);
      setSyncStatus("offline");
    }
    setSaveState("saved");
    setTimeout(()=>setSaveState(null),2500);
  },[]);

  const handleNavigate=(targetView,id)=>{setView(targetView);setNavSel(id);setTimeout(()=>setNavSel(null),500);};
  const overdueCount=[...people,...companies].filter(x=>x.nextDue&&new Date(x.nextDue)<new Date()).length;

  if(showSetup)return <SetupScreen onComplete={()=>{setShowSetup(false);window.location.reload();}}/>;

  if(!ready)return(
    <div style={{fontFamily:"Aptos,Calibri,'Segoe UI',sans-serif",background:W,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <img src={LOGO_SRC} alt="VoltConsulting" style={{height:36,opacity:0.5}}/>
      <div style={{fontSize:13,color:G600}}>Connecting to Airtable…</div>
    </div>
  );

  return(
    <div style={{fontFamily:"Aptos,Calibri,'Segoe UI',sans-serif",background:G50,height:"100vh",display:"flex",overflow:"hidden",color:G900}}>
      <style>{"*{box-sizing:border-box;margin:0;padding:0}input,textarea,select,button{font-family:Aptos,Calibri,'Segoe UI',sans-serif}input::placeholder,textarea::placeholder{color:"+G400+"}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:"+G300+";border-radius:3px}"}</style>

      <div style={{width:220,background:W,borderRight:"1px solid "+G200,display:"flex",flexDirection:"column",flexShrink:0,boxShadow:"1px 0 4px #0001"}}>
        <div style={{padding:"20px 20px 18px",borderBottom:"1px solid "+G200}}>
          <img src={LOGO_SRC} alt="VoltConsulting" style={{height:28,maxWidth:"100%",objectFit:"contain",objectPosition:"left"}}/>
          <div style={{fontSize:10.5,color:TEAL,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:8,fontWeight:700}}>Internal CRM</div>
        </div>
        <nav style={{flex:1,padding:"12px 10px"}}>
          {NAV.map(n=>{
            const active=view===n.id;
            return(
              <button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:active?TL:"transparent",border:"1px solid "+(active?TM:"transparent"),borderRadius:7,padding:"10px 12px",marginBottom:3,color:active?TEAL:G600,fontWeight:active?700:400,fontSize:13.5,cursor:"pointer",textAlign:"left",transition:"all 0.12s",fontFamily:"inherit"}}>
                <span style={{fontSize:14}}>{n.icon}</span>
                {n.label}
                {n.id==="bd"&&overdueCount>0&&<span style={{marginLeft:"auto",background:DANGER,color:W,borderRadius:10,padding:"1px 8px",fontSize:10.5,fontWeight:800}}>{overdueCount}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:"14px 20px 20px",borderTop:"1px solid "+G200}}>
          <div style={{fontSize:10.5,color:G400,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>Team</div>
          {[["David",TEAL],["Lauren","#6f42c1"],["Brinda",WARN]].map(([name,c])=>(
            <div key={name} style={{display:"flex",alignItems:"center",gap:9,marginBottom:8}}>
              <Av name={name} size={24} color={c}/>
              <span style={{fontSize:13,color:G700}}>{name}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
  
        <div style={{background:W,borderBottom:"1px solid "+G200,padding:"12px 24px",display:"flex",alignItems:"center",gap:16,flexShrink:0}}>
          <GlobalSearch people={people} companies={companies} onNavigate={handleNavigate}/>
          <div style={{fontSize:12,color:G400,whiteSpace:"nowrap"}}>{people.length+" people · "+companies.length+" companies"}</div>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>
          {view==="bd"&&<BDTracker people={people} companies={companies} setPeople={setPeople} setCompanies={setCompanies} persist={persist}/>}
          {view==="people"&&<PeopleView people={people} setPeople={setPeople} companies={companies} setCompanies={setCompanies} persist={persist} initialSel={navSel}/>}
          {view==="companies"&&<CompaniesView companies={companies} setCompanies={setCompanies} people={people} setPeople={setPeople} persist={persist} initialSel={navSel} onNavigatePerson={id=>{handleNavigate("people",id);}}/>}
          {view==="map"&&<MarketMap people={people} companies={companies} onNavigate={handleNavigate}/>}
        </div>
      </div>

      {/* Sync status indicator */}
      <div style={{position:"fixed",bottom:18,right:20,zIndex:500,pointerEvents:"none"}}>
        {saveState==="saving"&&<div style={{background:G50,border:"1px solid "+G300,borderRadius:20,padding:"5px 16px",fontSize:12,color:G600,fontWeight:600}}>⟳ Syncing to Airtable…</div>}
        {saveState==="saved"&&<div style={{background:OK+"15",border:"1px solid "+OK,borderRadius:20,padding:"5px 16px",fontSize:12,color:OK,fontWeight:600}}>✓ Synced to Airtable</div>}
        {!saveState&&syncStatus==="offline"&&<div style={{background:"#fff8e1",border:"1px solid "+WARN,borderRadius:20,padding:"5px 16px",fontSize:12,color:WARN,fontWeight:600}}>⚠ Offline — saved locally</div>}
        {!saveState&&syncStatus==="loading"&&<div style={{background:G50,border:"1px solid "+G300,borderRadius:20,padding:"5px 16px",fontSize:12,color:G600,fontWeight:600}}>⟳ Loading from Airtable…</div>}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);

    // Also catch any top-level JS errors
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML =
        '<div style="padding:40px;font-family:sans-serif;color:#dc3545;background:#fff5f5;min-height:100vh">' +
        '<h2>CRM Load Error</h2>' +
        '<pre style="background:#fff;padding:20px;border-radius:8px;font-size:12px;overflow:auto;color:#333">' +
        msg + '\nLine: ' + line + '\nSource: ' + src +
        '</pre><p>Please screenshot this and send to your developer.</p></div>';
    };
  </script>
</body>
</html>
