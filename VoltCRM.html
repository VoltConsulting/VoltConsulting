function normalize(s){return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function similarity(a,b){
  const na=normalize(a),nb=normalize(b);
  if(!na||!nb)return 0;
  if(na===nb)return 1;
  if(na.includes(nb)||nb.includes(na))return 0.85;
  const bigrams=s=>{const b=new Set();for(let i=0;i<s.length-1;i++)b.add(s.slice(i,i+2));return b;};
  const ba=bigrams(na),bb=bigrams(nb);
  let inter=0;ba.forEach(g=>{if(bb.has(g))inter++;});
  return(2*inter)/(ba.size+bb.size||1);
}
function findDupePeople(name,company,people,excludeId){
  return people.filter(p=>{
    if(p.id===excludeId)return false;
    const ns=similarity(name,p.name);
    if(ns<0.8)return false;
    if(company&&p.company)return similarity(company,p.company)>0.7||ns>0.92;
    return ns>0.92;
  });
}
function findDupeCompanies(name,companies,excludeId){
  return companies.filter(c=>c.id!==excludeId&&similarity(name,c.name)>=0.82);
}
function autoLinkCompany(personCompany,companies){
  if(!personCompany?.trim())return{companies,companyId:null};
  const match=companies.find(c=>similarity(personCompany,c.name)>=0.82);
  if(match)return{companies,companyId:match.id};
  const newCo={id:Date.now()+Math.random(),name:personCompany,type:"Consulting",tier:"Prospect",hq:"",keyContact:"",openMandates:0,lastContacted:"",nextAction:"",nextDue:"",relationship:"Cold",notes:"Auto-created from people record."};
  return{companies:[...companies,newCo],companyId:newCo.id};
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return{headers:[],rows:[]};
  const first=lines[0];
  const delim=first.split("\t").length>first.split(",").length?"\t":",";
  const parseRow=line=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'&&!inQ)inQ=true;
      else if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
      else if(c==='"'&&inQ)inQ=false;
      else if(c===delim&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=c;
    }
    cols.push(cur.trim());return cols;
  };
  const headers=parseRow(lines[0]).map(h=>h.replace(/^"|"$/g,"").trim());
  const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseRow(l);const obj={};
    headers.forEach((h,i)=>{obj[h]=vals[i]||"";});return obj;
  });
  return{headers,rows};
}

function CSVImporter({people,companies,setPeople,setCompanies,persist,onClose}){
  const[step,setStep]=useState("upload");
  const[raw,setRaw]=useState("");
  const[parsed,setParsed]=useState(null);
  const[mappings,setMappings]=useState({});
  const[preview,setPreview]=useState([]);
  const[results,setResults]=useState(null);
  const fileRef=useRef(null);
  const CRM_FIELDS=["ignore","firstName","lastName","name","title","company","location","email","phone","linkedin","type","seniority","sectors","relationship","lastContacted","nextAction","nextDue","notes"];

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>processText(ev.target.result);
    reader.readAsText(file);
  };
  const processText=text=>{
    setRaw(text);const p=parseCSV(text);setParsed(p);
    const auto={};
    p.headers.forEach(h=>{auto[h]=CSV_MAP[h.toLowerCase().trim()]||"ignore";});
    setMappings(auto);setStep("map");
  };
  const mapRow=row=>{
    const p={type:"candidate",name:"",title:"",company:"",location:"",seniority:"Manager / Principal",sectors:[],linkedin:"",email:"",phone:"",lastContacted:today,nextAction:"",nextDue:"",relationship:"Warm",notes:""};
    let firstName="",lastName="";
    Object.entries(mappings).forEach(([csvH,crmF])=>{
      if(!crmF||crmF==="ignore")return;
      const val=(row[csvH]||"").trim();if(!val)return;
      if(crmF==="firstName")firstName=val;
      else if(crmF==="lastName")lastName=val;
      else if(crmF==="sectors")p.sectors=val.split(/[,;|]/).map(s=>s.trim()).filter(Boolean);
      else p[crmF]=val;
    });
    // Combine first + last name if separate columns
    if(firstName||lastName)p.name=[firstName,lastName].filter(Boolean).join(" ");
    // Normalise type
    const tl=(p.type||"").toLowerCase();
    p.type=tl.includes("contact")||tl.includes("client")?"contact":"candidate";
    // Normalise relationship
    const rl=(p.relationship||"").toLowerCase();
    p.relationship=rl.includes("hot")?"Hot":rl.includes("cold")?"Cold":rl.includes("new")?"New":"Warm";
    // Normalise seniority
    if(p.seniority){
      const sl=p.seniority.toLowerCase();
      if(/(c-suite|partner|chief|president|founder|managing director)/i.test(sl))p.seniority="C-Suite / Partner";
      else if(/(director|vice president|vp)/i.test(sl))p.seniority="VP / Director";
      else if(/(manager|principal|associate director|senior)/i.test(sl))p.seniority="Manager / Principal";
      else if(/(analyst|consultant|associate|junior|graduate)/i.test(sl))p.seniority="Analyst / Consultant";
    }
    return p;
  };
  const runImport=()=>{
    const allRows=parsed.rows.map(mapRow).filter(r=>r.name.trim());
    let np=[...people],nc=[...companies],added=0,skipped=0;
    allRows.forEach(r=>{
      if(findDupePeople(r.name,r.company,np).length>0){skipped++;return;}
      const{companies:updCos,companyId}=autoLinkCompany(r.company,nc);
      nc=updCos;np=[{...r,id:Date.now()+Math.random(),companyId},...np];added++;
    });
    setPeople(np);persist("people",np);setCompanies(nc);persist("companies",nc);
    setResults({added,skipped,total:allRows.length});setStep("done");
  };

  if(step==="upload")return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:20,lineHeight:1.6}}>Import from any CSV or TSV — LinkedIn exports, spreadsheets, old CRM. Auto-maps columns, detects duplicates, links to companies.</p>
      <div style={{border:"2px dashed "+G300,borderRadius:10,padding:"32px",textAlign:"center",marginBottom:16,background:G50}}>
        <div style={{fontSize:32,marginBottom:10}}>📄</div>
        <div style={{fontWeight:600,color:NAVY,marginBottom:6}}>Drop a CSV or TSV file</div>
        <div style={{color:G600,fontSize:13,marginBottom:16}}>or click to browse</div>
        <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" onChange={handleFile} style={{display:"none"}}/>
        <Btn onClick={()=>fileRef.current&&fileRef.current.click()}>Choose File</Btn>
      </div>
      <div style={{marginBottom:8,color:G600,fontSize:12,textAlign:"center"}}>— or paste CSV data directly —</div>
      <Tarea value={raw} onChange={setRaw} placeholder={"name,title,company,location\nDr. Sarah Chen,VP Strategy,Huron Consulting,London"} rows={4}/>
      {raw.trim()&&<div style={{marginTop:10,display:"flex",justifyContent:"flex-end"}}><Btn onClick={()=>processText(raw)}>Parse →</Btn></div>}
    </div>
  );

  if(step==="map"&&parsed)return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:16}}><strong style={{color:NAVY}}>{parsed.rows.length} rows</strong>, <strong style={{color:NAVY}}>{parsed.headers.length} columns</strong>. Map each column to a CRM field.</p>
      <div style={{border:"1px solid "+G200,borderRadius:8,overflow:"hidden",marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:G100,padding:"10px 16px",fontSize:11,fontWeight:700,color:G600,textTransform:"uppercase"}}>
          <div>CSV Column</div><div>Sample</div><div>Map to</div>
        </div>
        {parsed.headers.map((h,i)=>(
          <div key={h} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"10px 16px",borderTop:"1px solid "+G200,alignItems:"center",background:i%2===0?W:G50}}>
            <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{h}</div>
            <div style={{fontSize:12,color:G600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(parsed.rows[0]?.[h]||"—").slice(0,25)}</div>
            <SelEl value={mappings[h]||"ignore"} onChange={v=>setMappings(m=>({...m,[h]:v}))} options={CRM_FIELDS} style={{fontSize:12,padding:"5px 8px"}}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={()=>setStep("upload")}>← Back</Btn>
        <Btn onClick={()=>{setPreview(parsed.rows.slice(0,5).map(mapRow));setStep("preview");}}>Preview →</Btn>
      </div>
    </div>
  );

  if(step==="preview")return(
    <div>
      <p style={{color:G600,fontSize:13,marginBottom:16}}>First 5 of <strong style={{color:NAVY}}>{parsed.rows.length}</strong> rows. Duplicates skipped automatically.</p>
      <div style={{border:"1px solid "+G200,borderRadius:8,overflow:"hidden",marginBottom:16}}>
        {preview.map((p,i)=>(
          <div key={i} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",borderBottom:"1px solid "+G200,background:i%2===0?W:G50}}>
            <Av name={p.name||"?"} size={32} color={p.type==="contact"?"#6f42c1":TEAL}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{p.name||"(no name)"}</div>
              <div style={{fontSize:12,color:G600}}>{[p.title,p.company,p.location].filter(Boolean).join(" · ")}</div>
            </div>
            <RelDot rel={p.relationship}/>
          </div>
        ))}
      </div>
      <div style={{background:TL,border:"1px solid "+TM,borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:13,color:NAVY}}>
        <strong style={{color:TEAL}}>On import:</strong> each person is duplicate-checked, linked to their company (auto-created if needed), and added instantly.
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={()=>setStep("map")}>← Back</Btn>
        <Btn onClick={runImport}>Import {parsed.rows.length} People</Btn>
      </div>
    </div>
  );

  if(step==="done"&&results)return(
    <div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48,marginBottom:16}}>✓</div>
      <h3 style={{fontSize:20,fontWeight:700,color:NAVY,marginBottom:20}}>Import complete</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:360,margin:"0 auto 24px"}}>
        <div style={{background:OK+"10",border:"1px solid "+OK+"30",borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:OK}}>{results.added}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Added</div>
        </div>
        <div style={{background:WARN+"10",border:"1px solid "+WARN+"30",borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:WARN}}>{results.skipped}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Skipped</div>
        </div>
        <div style={{background:G50,border:"1px solid "+G200,borderRadius:8,padding:"16px"}}>
          <div style={{fontSize:28,fontWeight:800,color:NAVY}}>{results.total}</div>
          <div style={{fontSize:12,color:G600,marginTop:4}}>Total</div>
        </div>
      </div>
      <Btn onClick={onClose}>Done</Btn>
    </div>
  );
  return null;
}


// ── Inline-editable overview tab ─────────────────────────────
function InlineField({label,value,onChange,type="text",href,linkLabel}){
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(value||"");
  const inputRef=useRef(null);
  useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus();},[editing]);

  const commit=()=>{onChange(draft);setEditing(false);};
  const cancel=()=>{setDraft(value||"");setEditing(false);};

  return(
    <div style={{borderBottom:"1px solid "+G100,paddingBottom:10,marginBottom:10}}>
      <div style={{fontSize:10.5,color:G400,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
      {editing?(
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input ref={inputRef} type={type} value={draft} onChange={e=>setDraft(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")cancel();}}
            style={{flex:1,background:W,border:"1.5px solid "+TEAL,borderRadius:6,padding:"6px 10px",color:G900,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={commit} style={{background:TEAL,color:W,border:"none",borderRadius:5,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
          <button onClick={cancel} style={{background:"transparent",color:G400,border:"1px solid "+G300,borderRadius:5,padding:"5px 8px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",gap:8,minHeight:24}}>
          {value?(
            href
              ?<a href={href} target="_blank" rel="noreferrer" style={{color:TEAL,fontSize:13,fontWeight:600,textDecoration:"none",flex:1}}>{linkLabel||value}</a>
              :<span style={{color:NAVY,fontSize:13,fontWeight:600,flex:1}}>{value}</span>
          ):(
            <span style={{color:G300,fontSize:13,fontStyle:"italic",flex:1}}>Click to add…</span>
          )}
          <button onClick={()=>{setDraft(value||"");setEditing(true);}}
            style={{background:"transparent",border:"1px solid "+G200,borderRadius:5,padding:"3px 8px",fontSize:11,color:G400,cursor:"pointer",fontFamily:"inherit",flexShrink:0,opacity:0.7}}>
            ✏
          </button>
        </div>
      )}
    </div>
  );
}

function PersonForm({init,onSave,onClose,people,isEdit,prefill}){
  const[f,setF]=useState({...BLANKP,...(init||{}),...(prefill||{})});
  const[dupes,setDupes]=useState([]);
  const[dismissed,setDismissed]=useState(false);
  const set=k=>v=>setF(p=>({...p,[k]:v}));

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
      {dupes.length>0&&<div style={{gridColumn:"span 2"}}><DupeBanner dupes={dupes} onDismiss={()=>{setDupes([]);setDismissed(true);}}/></div>}

      <Fld label="Company"><Inp value={f.company} onChange={set("company")} placeholder="Charles River Associates"/></Fld>
      <Fld label="Location"><Inp value={f.location} onChange={set("location")} placeholder="London, UK"/></Fld>
      <Fld label="Seniority" span2><SelEl value={f.seniority} onChange={set("seniority")} options={["Analyst / Consultant","Manager / Principal","VP / Director","C-Suite / Partner"]}/></Fld>
      <Fld label="Sectors" span2><SectorPicker selected={f.sectors} onChange={set("sectors")}/></Fld>

      <Fld label="Phone"><Inp value={f.phone} onChange={set("phone")} placeholder="+44 7700 900000"/></Fld>
      <Fld label="Last Contacted"><Inp type="date" value={f.lastContacted} onChange={set("lastContacted")}/></Fld>
      <Fld label="Next Due"><Inp type="date" value={f.nextDue} onChange={set("nextDue")}/></Fld>
      <Fld label="Next Action" span2><Inp value={f.nextAction} onChange={set("nextAction")} placeholder="Send JD / Schedule call…"/></Fld>
      <Fld label="Notes" span2><Tarea value={f.notes} onChange={set("notes")} rows={3}/></Fld>
      <div style={{gridColumn:"span 2",display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>

      </div>
    </div>
  );
}

function PeopleView({people,setPeople,companies,setCompanies,persist,initialSel}){
  const[search,setSearch]=useState("");
  const[typeF,setTypeF]=useState("all");
  const[relF,setRelF]=useState("all");
  const[sel,setSel]=useState(initialSel||null);
  const[modal,setModal]=useState(null);
  const[prefill,setPrefill]=useState(null);
  useEffect(()=>{if(initialSel)setSel(initialSel);},[initialSel]);

  const list=useMemo(()=>people.filter(p=>
    (typeF==="all"||p.type===typeF)&&(relF==="all"||p.relationship===relF)&&
    (p.name+p.company+p.title+(p.sectors||[]).join(" ")).toLowerCase().includes(search.toLowerCase())
  ),[people,search,typeF,relF]);

  const selP=people.find(p=>p.id===sel);

  const commitBoth=(np,nc)=>{setPeople(np);persist("people",np);setCompanies(nc);persist("companies",nc);};
  const addPerson=f=>{const{companies:nc,companyId}=autoLinkCompany(f.company,companies);commitBoth([{...f,id:Date.now(),companyId},...people],nc);};
  const updPerson=f=>{const{companies:nc,companyId}=autoLinkCompany(f.company,companies);commitBoth(people.map(p=>p.id===sel?{...p,...f,companyId}:p),nc);};
  const delPerson=()=>{const u=people.filter(p=>p.id!==sel);setPeople(u);persist("people",u);setSel(null);};

  const filterBtn=(v,l,c,cur,set)=>(
    <button key={v} onClick={()=>set(v)} style={{background:cur===v?c+"15":"transparent",color:cur===v?c:G600,border:"1px solid "+(cur===v?c+"40":G300),borderRadius:20,padding:"4px 13px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
  );

  return(
    <div style={{display:"flex",height:"100%",minHeight:0}}>
      {/* List */}
      <div style={{width:320,flexShrink:0,borderRight:"1px solid "+G200,display:"flex",flexDirection:"column",background:W}}>
        <div style={{padding:"16px 16px 12px",borderBottom:"1px solid "+G200}}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <Inp value={search} onChange={setSearch} placeholder="Filter people…" style={{fontSize:12}}/>
            <Btn small onClick={()=>{setPrefill(null);setModal("add");}}>+ Add</Btn>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>

const BLANKCO={name:"",type:"Consulting",tier:"Prospect",hq:"",keyContact:"",openMandates:"0",lastContacted:today,nextAction:"",nextDue:"",relationship:"Cold",notes:""};
function CompanyForm({init,onSave,onClose,companies,isEdit}){
  const[f,setF]=useState({...BLANKCO,...(init||{})});
  const[dupes,setDupes]=useState([]);
  const[dismissed,setDismissed]=useState(false);
  const s=k=>v=>setF(p=>({...p,[k]:v}));
  const handleSave=()=>{
    if(!f.name.trim())return;
    if(!dismissed&&!isEdit){
      const found=findDupeCompanies(f.name,companies,init&&init.id);
      if(found.length>0){setDupes(found);return;}
    }
    onSave(f);onClose();
  };
  return(
    <>
      {dupes.length>0&&<DupeBanner dupes={dupes} onDismiss={()=>{setDupes([]);setDismissed(true);}}/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
        <Fld label="Company Name" span2><Inp value={f.name} onChange={s("name")} placeholder="Charles River Associates"/></Fld>
        <Fld label="Type"><SelEl value={f.type} onChange={s("type")} options={["Consulting","Pharma","Biotech","MedTech","Other"]}/></Fld>
        <Fld label="Tier"><SelEl value={f.tier} onChange={s("tier")} options={["Key Client","Warm","Prospect"]}/></Fld>
        <Fld label="HQ"><Inp value={f.hq} onChange={s("hq")} placeholder="Boston, US"/></Fld>
        <Fld label="Key Contact"><Inp value={f.keyContact} onChange={s("keyContact")} placeholder="Maria Lopez"/></Fld>
        <Fld label="Open Mandates"><Inp value={f.openMandates} onChange={s("openMandates")} type="number"/></Fld>
        <Fld label="Relationship"><SelEl value={f.relationship} onChange={s("relationship")} options={["Hot","Warm","Cold","New"]}/></Fld>
        <Fld label="Last Contacted"><Inp type="date" value={f.lastContacted} onChange={s("lastContacted")}/></Fld>
        <Fld label="Next Due"><Inp type="date" value={f.nextDue} onChange={s("nextDue")}/></Fld>
        <Fld label="Next Action" span2><Inp value={f.nextAction} onChange={s("nextAction")} placeholder="Schedule intro call…"/></Fld>

        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>

      </div>
    </>
  );
}

// ── BD TRACKER ────────────────────────────────────────────────
function BDTracker({people,companies,setPeople,setCompanies,persist}){
  const now=new Date();
  const all=useMemo(()=>{
    const ps=people.filter(p=>p.nextAction||p.nextDue).map(p=>({...p,_k:"person"}));
    const cs=companies.filter(c=>c.nextAction||c.nextDue).map(c=>({...c,_k:"company"}));
    return[...ps,...cs].sort((a,b)=>{
      if(!a.nextDue&&!b.nextDue)return 0;if(!a.nextDue)return 1;if(!b.nextDue)return -1;
      return new Date(a.nextDue)-new Date(b.nextDue);
    });
  },[people,companies]);
  const ov=all.filter(i=>i.nextDue&&new Date(i.nextDue)<now);
  const soon=all.filter(i=>i.nextDue&&new Date(i.nextDue)>=now&&new Date(i.nextDue)<=new Date(Date.now()+7*86400000));
  const later=all.filter(i=>!i.nextDue||new Date(i.nextDue)>new Date(Date.now()+7*86400000));
  const markDone=item=>{
    if(item._k==="person"){const u=people.map(p=>p.id===item.id?{...p,nextAction:"",nextDue:"",lastContacted:today}:p);setPeople(u);persist("people",u);}
    else{const u=companies.map(c=>c.id===item.id?{...c,nextAction:"",nextDue:"",lastContacted:today}:c);setCompanies(u);persist("companies",u);}
  };
  const Sec=({title,items,accent})=>{
    if(!items.length)return null;
    return(
      <div style={{marginBottom:32}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,paddingBottom:10,borderBottom:"2px solid "+accent}}>
          <span style={{fontWeight:700,color:accent,fontSize:13,textTransform:"uppercase",letterSpacing:"0.07em"}}>{title}</span>
          <span style={{background:accent+"15",color:accent,borderRadius:12,padding:"1px 10px",fontSize:12,fontWeight:700}}>{items.length}</span>
        </div>
        {items.map(item=>{
          const ac=item._k==="company"?WARN:item.type==="contact"?"#6f42c1":TEAL;
          return(
            <div key={item._k+"-"+item.id} style={{background:W,border:"1px solid "+G200,borderLeft:"4px solid "+accent,borderRadius:8,padding:"14px 18px",marginBottom:10,display:"flex",gap:14,alignItems:"flex-start",boxShadow:"0 1px 3px #0001"}}>
              <Av name={item.name} size={36} color={ac}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                  <span style={{fontWeight:700,color:NAVY,fontSize:14}}>{item.name}</span>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}><DueTag due={item.nextDue}/><RelDot rel={item.relationship}/></div>
                </div>
                <div style={{fontSize:12,color:G600,marginBottom:8}}>{item._k==="company"?item.type:item.title}{(item.company||item.hq)?" · "+(item.company||item.hq):""}</div>
                {item.nextAction&&<div style={{fontSize:13,color:NAVY,background:G50,borderRadius:6,padding:"6px 12px",display:"inline-flex",alignItems:"center",gap:6,border:"1px solid "+G200}}><span style={{color:TEAL,fontWeight:700}}>→</span>{item.nextAction}</div>}
              </div>
              <button onClick={()=>markDone(item)} style={{background:TL,border:"1px solid "+TM,color:TEAL,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",flexShrink:0}}>✓ Done</button>
            </div>
          );
        })}
      </div>
    );
  };
  return(
    <div style={{overflowY:"auto",padding:"32px 40px",maxWidth:860,height:"100%"}}>
      <h1 style={{fontSize:26,fontWeight:700,color:NAVY,margin:"0 0 6px"}}>BD Tracker</h1>
      <p style={{color:G600,fontSize:14,marginBottom:32}}>Your prioritised follow-up list across all people and companies</p>
      {!all.length&&<div style={{textAlign:"center",padding:"60px 0",color:G400}}><div style={{fontSize:40,marginBottom:12}}>✓</div><div style={{fontSize:14}}>All caught up</div></div>}
      <Sec title="Overdue" items={ov} accent={DANGER}/>
      <Sec title="Due this week" items={soon} accent={WARN}/>
      <Sec title="Later" items={later} accent={G400}/>
    </div>
  );
}

// ── MARKET MAP ────────────────────────────────────────────────
function MarketMap({people,companies,onNavigate}){

    const s=new Set();people.forEach(p=>(p.sectors||[]).forEach(x=>s.add(x)));return["All",...Array.from(s).sort()];
  },[people]);

  const filteredPeople=useMemo(()=>people.filter(p=>{
    if(sectorF!=="All"&&!(p.sectors||[]).includes(sectorF))return false;
    if(seniorityF!=="All"&&p.seniority!==seniorityF)return false;
    if(relF!=="All"&&p.relationship!==relF)return false;

    return true;
  }),[companies,relF]);

    const map={};
    filteredPeople.forEach(p=>(p.sectors||[]).forEach(s=>{if(!map[s])map[s]=[];map[s].push(p);}));
    return Object.entries(map).sort((a,b)=>b[1].length-a[1].length);

            </div>
          </div>
          <div>
            <div style={{fontSize:10,color:G400,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Relationship</div>

// ── LinkedIn parsers ─────────────────────────────────────────
function parseLinkedInProfile(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const skipExact=["message","connect","follow","more","highlights","about","experience","education","activity","featured","contact","connections","followers","posts","comments","premium","following"];
  const skipStart=["open to","add profile","visit my","500+","1st","2nd","3rd","see all","you and","mutual","robert","christian"];
  let name="";
  for(const line of lines){
    const ll=line.toLowerCase();
    const w=line.split(/\s+/);
    if(w.length>=2&&w.length<=5
      &&!line.includes("|")&&!line.includes("@")&&!line.includes("http")&&!line.includes("•")
      &&!skipExact.includes(ll)
      &&!skipStart.some(s=>ll.startsWith(s))
      &&/^[A-Za-zÀ-ÿ\s.\-\']+$/.test(line)){
      name=line.replace(/,\s*(Assoc|PhD|MD|MBA|MSc|BSc|BA|MA|Dr\.?|CPD).*/i,"").trim();
      break;
    }
  }
  let title="",company="";
  for(const line of lines){
    if(line.includes("|")&&!line.includes("http")){
      const parts=line.split("|").map(p=>p.trim()).filter(Boolean);
      if(parts.length>=2){title=parts[0].trim();company=parts[1].replace(/\·.*/,"").trim();break;}
    }
  }
  if(!title){for(const line of lines){if(/(founder|director|manager|partner|consultant|analyst|head of|vp |vice president|officer)/i.test(line)&&line.length<100){title=line;break;}}}
  let location="";
  for(const line of lines){
    if(/(metropolitan area|united kingdom|ireland|germany|france|switzerland|netherlands|united states)/i.test(line)&&line.length<60){location=line.replace(/Contact info.*/i,"").trim();break;}
    if(/^[A-Z][a-z]+,\s*[A-Z]/.test(line)&&line.length<50){location=line;break;}
  }
  const emailM=text.match(/[\w.\-]+@[\w.\-]+\.[a-z]{2,}/i);
  const email=emailM?emailM[0]:"";
  const phoneM=text.match(/(\+?[\d\s\-()]{10,18})/);
  let phone="";
  if(phoneM){const p=phoneM[1].trim();if(p.replace(/\D/g,"").length>=10)phone=p;}
  const liM=text.match(/linkedin\.com\/in\/[\w\-]+/i);
  const linkedin=liM?"https://www."+liM[0]:"";
  let seniority="Manager / Principal";
  const tl=(title||"").toLowerCase();
  if(/(founder|ceo|coo|cfo|chief|partner|president|managing director)/i.test(tl))seniority="C-Suite / Partner";
  else if(/(vp |vice president|director)/i.test(tl))seniority="VP / Director";
  else if(/(analyst|graduate|junior)/i.test(tl))seniority="Analyst / Consultant";
  const ft=text.toLowerCase();
  const sectors=[];
  const km={"Life Sciences":["life science","pharma","biopharma"],"Strategy":["strategy","management consulting","consulting"],"Commercial":["commercial","sales"],"Oncology":["oncology","cancer"],"RWE":["real world evidence","rwe"],"Market Access":["market access","hta"],"Operations":["operations"],"MedTech":["medtech","medical device"],"Digital Health":["digital health"],"Biotech":["biotech","biotechnology"],"Regulatory":["regulatory"],"Pricing":["pricing","heor","health economics"]};
  for(const[s,kws]of Object.entries(km)){if(kws.some(k=>ft.includes(k)))sectors.push(s);}
  return{name,title,company,location,seniority,sectors,linkedin,email,phone};
}
function parseLinkedInCompany(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const skip=["home","about","posts","jobs","people","videos","linkedin","follow","message","website","industry","company size","headquarters","founded","followers"];
  let name="";
  for(const line of lines){if(line.length>2&&line.length<80&&!line.includes("http")&&!line.includes("#")&&!skip.some(w=>line.toLowerCase().startsWith(w))){name=line;break;}}
  let hq="";
  for(const line of lines){
    if(/(headquarters|hq):/i.test(line)){hq=line.replace(/(headquarters|hq):\s*/i,"").trim();break;}
    if(/(metropolitan area|united kingdom|ireland|germany|france|london|boston|new york)/i.test(line)&&line.length<60){hq=line;break;}
  }
  let type="Consulting";
  const ft=text.toLowerCase();
  if(/(pharma|pharmaceutical)/i.test(ft))type="Pharma";
  else if(/biotech/i.test(ft))type="Biotech";
  else if(/medtech|medical device/i.test(ft))type="MedTech";
  let notes="";
  const ai=text.search(/\bAbout\b/i);
  if(ai>-1)notes=text.slice(ai+5).trim().slice(0,200).replace(/\n+/g," ");
  return{name,hq,type,tier:"Prospect",relationship:"Cold",notes};
}

let AT_TOKEN=localStorage.getItem("volt_at_token")||"";
let AT_BASE=localStorage.getItem("volt_at_base")||"";
let AT_TABLE=localStorage.getItem("volt_at_table")||"";
async function atFetch(path,opts={}){
  const r=await fetch("https://api.airtable.com/v0/"+AT_BASE+"/"+AT_TABLE+path,{...opts,headers:{"Authorization":"Bearer "+AT_TOKEN,"Content-Type":"application/json",...(opts.headers||{})}});
  if(!r.ok)throw new Error("AT "+r.status);return r.json();
}
async function getOrCreate(name){
  const d=await atFetch("?filterByFormula=Name%3D%22"+encodeURIComponent(name)+"%22");
  if(d.records&&d.records.length>0){localStorage.setItem("atid_"+name,d.records[0].id);return d.records[0];}
  const c=await atFetch("",{method:"POST",body:JSON.stringify({records:[{fields:{Name:name,Notes:"[]"}}]})});
  localStorage.setItem("atid_"+name,c.records[0].id);return c.records[0];
}
async function loadFromAirtable(){
  const[p,c]=await Promise.all([getOrCreate("PEOPLE"),getOrCreate("COMPANIES")]);
  let people=[],companies=[];
  try{people=JSON.parse(p.fields.Notes||"[]");}catch{}
  try{companies=JSON.parse(c.fields.Notes||"[]");}catch{}
  if(people.length)localStorage.setItem("voltcrm5-people",JSON.stringify(people));
  if(companies.length)localStorage.setItem("voltcrm5-companies",JSON.stringify(companies));
  return{people,companies};
}
async function saveToAirtable(name,data){
  const rec=await getOrCreate(name);
  await atFetch("/"+rec.id,{method:"PATCH",body:JSON.stringify({fields:{Notes:JSON.stringify(data)}})});
}

function CompanyLinkedInPaste({onParsed}){
  const[open,setOpen]=useState(false);
  const[text,setText]=useState("");
  const[error,setError]=useState("");
  const parse=()=>{
    if(!text.trim())return;
    try{
      const result=parseLinkedInCompany(text);
      if(!result.name){setError("Could not find company name — paste more of the page.");return;}
      onParsed(result);setOpen(false);setText("");
    }catch(e){setError("Error: "+e.message);}
  };
  return(
    <>
      <Btn variant="teal" onClick={()=>setOpen(true)} style={{fontSize:13,padding:"7px 14px"}}>⚡ Paste from LinkedIn</Btn>
      {open&&(
        <ModalEl title="Import Company from LinkedIn" onClose={()=>{setOpen(false);setText("");setError("");}}>
          <p style={{color:G600,fontSize:13,marginBottom:14,lineHeight:1.6}}>Open the LinkedIn company page → Ctrl+A → Ctrl+C → paste below.</p>

  );
}


// ── Campaigns view ────────────────────────────────────────────
function exportToInstantly(people, campaignName) {
  const members = people.filter(p => (p.campaigns||[]).includes(campaignName) && p.email);
  const all = people.filter(p => (p.campaigns||[]).includes(campaignName));
  if(!all.length){alert("No people in this campaign yet.");return;}
  if(!members.length){alert("No one in this campaign has an email address yet. Add emails in the People view first.");return;}

  const rows = [["First Name","Last Name","Email","Company","Job Title"]];
  members.forEach(p => {
    const parts=(p.name||"").trim().split(" ");
    rows.push([parts[0]||"", parts.slice(1).join(" ")||"", p.email||"", p.company||"", p.title||""]);
  });
  const csv=rows.map(r=>r.map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=campaignName.replace(/[^a-z0-9]/gi,"_")+"_instantly.csv";
  a.click();URL.revokeObjectURL(url);
}

function CampaignsView({people,setPeople,persist}){
  // Store campaign names in localStorage so they persist
  const loadCampaigns=()=>{
    try{return JSON.parse(localStorage.getItem("volt-campaigns")||"[]");}catch{return[];}
  };
  const saveCampaignsList=list=>{
    localStorage.setItem("volt-campaigns",JSON.stringify(list));
  };

  const[campaignNames,setCampaignNames]=useState(loadCampaigns);
  const[selCampaign,setSelCampaign]=useState(null);
  const[newName,setNewName]=useState("");

  // Merge campaign names from people too (in case imported)
  const allNames=useMemo(()=>{
    const fromPeople=new Set();
    people.forEach(p=>(p.campaigns||[]).forEach(c=>fromPeople.add(c)));
    const merged=[...new Set([...campaignNames,...fromPeople])];
    return merged;
  },[people,campaignNames]);

  const addCampaign=()=>{
    const name=newName.trim();
    if(!name)return;
    if(!allNames.includes(name)){
      const updated=[...campaignNames,name];
      setCampaignNames(updated);
      saveCampaignsList(updated);
    }
    setSelCampaign(name);
    setNewName("");
  };

  const deleteCampaign=()=>{
    if(!selCampaign)return;
    if(!confirm(`Delete campaign "${selCampaign}"? People won't be deleted.`))return;
    const updatedNames=campaignNames.filter(c=>c!==selCampaign);
    setCampaignNames(updatedNames);
    saveCampaignsList(updatedNames);
    const updatedPeople=people.map(p=>({...p,campaigns:(p.campaigns||[]).filter(c=>c!==selCampaign)}));
    setPeople(updatedPeople);persist("people",updatedPeople);
    setSelCampaign(null);
  };

  const addPerson=personId=>{
    const updated=people.map(p=>p.id===personId?{...p,campaigns:[...new Set([...(p.campaigns||[]),selCampaign])]}:p);
    setPeople(updated);persist("people",updated);
  };
  const removePerson=personId=>{
    const updated=people.map(p=>p.id===personId?{...p,campaigns:(p.campaigns||[]).filter(c=>c!==selCampaign)}:p);
    setPeople(updated);persist("people",updated);
  };

  const members=selCampaign?people.filter(p=>(p.campaigns||[]).includes(selCampaign)):[];
  const nonMembers=selCampaign?people.filter(p=>!(p.campaigns||[]).includes(selCampaign)):[];
  const withEmail=members.filter(p=>p.email);
  const noEmail=members.filter(p=>!p.email);

  return(
    <div style={{display:"flex",height:"100%",minHeight:0}}>
      {/* Sidebar */}
      <div style={{width:280,flexShrink:0,borderRight:`1px solid ${G200}`,display:"flex",flexDirection:"column",background:W}}>
        <div style={{padding:"16px 16px 14px",borderBottom:`1px solid ${G200}`}}>
          <div style={{fontWeight:700,color:NAVY,fontSize:15,marginBottom:12}}>Campaigns</div>
          <div style={{display:"flex",gap:8}}>
            <input
              value={newName}
              onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")addCampaign();}}
              placeholder="Campaign name…"
              style={{flex:1,border:"1px solid "+G300,borderRadius:6,padding:"7px 11px",fontSize:12,outline:"none",fontFamily:"inherit"}}
            />
            <button
              onClick={e=>{e.preventDefault();e.stopPropagation();addCampaign();}}
              style={{background:TEAL,color:W,border:"none",borderRadius:6,padding:"7px 14px",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
              + Add
            </button>
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"8px 8px"}}>
          {allNames.length===0&&(
            <div style={{color:G400,textAlign:"center",marginTop:40,fontSize:13,padding:"0 16px",lineHeight:1.7}}>
              No campaigns yet.<br/>Type a name above and click + Add.
            </div>
          )}
          {allNames.map(name=>{
            const mems=people.filter(p=>(p.campaigns||[]).includes(name));
            const hasEmail=mems.filter(p=>p.email).length;
            const isSel=selCampaign===name;
            return(
              <div key={name} onClick={()=>setSelCampaign(name)}
                style={{padding:"12px 14px",borderRadius:8,marginBottom:4,cursor:"pointer",background:isSel?TL:"transparent",border:`1px solid ${isSel?TM:"transparent"}`}}>
                <div style={{fontWeight:700,color:NAVY,fontSize:13.5}}>{name}</div>
                <div style={{fontSize:12,color:G600,marginTop:3}}>{mems.length} people · {hasEmail} with email</div>
                {mems.length>0&&hasEmail<mems.length&&<div style={{fontSize:11,color:WARN,marginTop:2}}>⚠ {mems.length-hasEmail} missing email</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Detail */}
      {selCampaign?(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Header */}
          <div style={{background:W,borderBottom:`1px solid ${G200}`,padding:"18px 28px",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:noEmail.length>0?12:0}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:700,color:NAVY,margin:0}}>{selCampaign}</h2>
                <div style={{fontSize:13,color:G600,marginTop:4}}>{members.length} contacts · {withEmail.length} ready to export</div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <Btn variant="ghost" small onClick={deleteCampaign}>Delete</Btn>
                <Btn onClick={()=>exportToInstantly(people,selCampaign)} style={{background:OK,fontSize:13}}>⬇ Export to Instantly</Btn>
              </div>
            </div>
            {noEmail.length>0&&(
              <div style={{background:"#fff8e1",border:`1px solid ${WARN}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:G800}}>
                <strong style={{color:WARN}}>⚠ {noEmail.length} people missing email</strong> — add their emails in People view before exporting.
              </div>
            )}
          </div>

          <div style={{flex:1,overflowY:"auto",padding:"20px 28px",background:G50}}>
            {/* Members */}
            <div style={{background:W,borderRadius:8,border:`1px solid ${G200}`,marginBottom:20}}>
              <div style={{padding:"12px 18px",borderBottom:`1px solid ${G200}`,fontWeight:700,color:NAVY,fontSize:13}}>
                In this campaign ({members.length})
              </div>
              {members.length===0?(
                <div style={{padding:"20px 18px",color:G400,fontSize:13}}>No one added yet. Add people from the list below.</div>
              ):members.map(p=>(
                <div key={p.id} style={{display:"flex",gap:12,alignItems:"center",padding:"11px 18px",borderBottom:`1px solid ${G100}`}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:TEAL+"15",border:`1.5px solid ${TEAL}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:TEAL,flexShrink:0}}>
                    {(p.name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{p.name}</div>
                    <div style={{fontSize:11,color:G600}}>{[p.title,p.company].filter(Boolean).join(" · ")}</div>
                    {p.email?<div style={{fontSize:11,color:TEAL,marginTop:1}}>{p.email}</div>:<div style={{fontSize:11,color:DANGER,marginTop:1}}>⚠ No email — won't export</div>}
                  </div>
                  <button onClick={()=>removePerson(p.id)} style={{background:"transparent",border:`1px solid ${G300}`,borderRadius:6,padding:"4px 10px",fontSize:11,color:G600,cursor:"pointer",fontFamily:"inherit"}}>Remove</button>
                </div>
              ))}
            </div>

            {/* Add people */}
            <div style={{background:W,borderRadius:8,border:`1px solid ${G200}`}}>
              <div style={{padding:"12px 18px",borderBottom:`1px solid ${G200}`,fontWeight:700,color:NAVY,fontSize:13}}>
                Add to campaign ({nonMembers.length} people)
              </div>
              {nonMembers.length===0?(
                <div style={{padding:"20px 18px",color:G400,fontSize:13}}>Everyone is already in this campaign.</div>
              ):nonMembers.map(p=>(
                <div key={p.id} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 18px",borderBottom:`1px solid ${G100}`}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:G200,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:G600,flexShrink:0}}>
                    {(p.name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:NAVY,fontSize:13}}>{p.name}</div>
                    <div style={{fontSize:11,color:G600}}>{[p.title,p.company].filter(Boolean).join(" · ")}</div>
                    {!p.email&&<div style={{fontSize:11,color:WARN,marginTop:1}}>No email yet</div>}
                  </div>
                  <button onClick={()=>addPerson(p.id)} style={{background:TEAL,color:W,border:"none",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ Add</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      ):(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10,color:G400,background:G50}}>
          <div style={{fontSize:32}}>📧</div>
          <div style={{fontSize:13}}>Select a campaign or create a new one</div>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
const NAV=[{id:"bd",label:"BD Tracker",icon:"◎"},{id:"people",label:"People",icon:"◉"},{id:"companies",label:"Companies",icon:"◈"},{id:"campaigns",label:"Campaigns",icon:"◇"},{id:"map",label:"Market Map",icon:"◌"}];

function App(){
  const[view,setView]=useState("bd");
  const[navSel,setNavSel]=useState(null);
  const[people,setPeople]=useState(SEED_PEOPLE);
  const[companies,setCompanies]=useState(SEED_COMPANIES);
  const[ready,setReady]=useState(false);
  const[saveState,setSaveState]=useState(null);

  const[showSetup,setShowSetup]=useState(!localStorage.getItem("volt_at_token"));
  const[syncStatus,setSyncStatus]=useState("loading");

  useEffect(()=>{
    if(showSetup){setReady(true);return;}
    (async()=>{
      try{
        const data=await loadFromAirtable();
        if(data.people&&data.people.length>0)setPeople(data.people);
        else{const sp=await sGet("voltcrm5-people");if(sp)setPeople(sp);}
        if(data.companies&&data.companies.length>0)setCompanies(data.companies);
        else{const sc=await sGet("voltcrm5-companies");if(sc)setCompanies(sc);}
        setSyncStatus("ok");
      }catch(e){
        const sp=await sGet("voltcrm5-people");const sc=await sGet("voltcrm5-companies");
        if(sp)setPeople(sp);if(sc)setCompanies(sc);
        setSyncStatus("offline");
      }
      setReady(true);
    })();
  },[showSetup]);

  const persist=useCallback(async(key,data)=>{
    setSaveState("saving");
    await sSet("voltcrm5-"+key,data);
    try{
      if(key==="people")await saveToAirtable("PEOPLE",data);
      else if(key==="companies")await saveToAirtable("COMPANIES",data);
    }catch(e){console.warn("AT save:",e.message);}
    setSaveState("saved");
    setTimeout(()=>setSaveState(null),2500);
  },[]);

  const handleNavigate=(targetView,id)=>{setView(targetView);setNavSel(id);setTimeout(()=>setNavSel(null),500);};
  const overdueCount=[...people,...companies].filter(x=>x.nextDue&&new Date(x.nextDue)<new Date()).length;

  if(!ready)return(
    <div style={{fontFamily:"Aptos,Calibri,'Segoe UI',sans-serif",background:W,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <img src={LOGO_SRC} alt="VoltConsulting" style={{height:36,opacity:0.5}}/>
    </div>
  );

  return(
    <div style={{fontFamily:"Aptos,Calibri,'Segoe UI',sans-serif",background:G50,height:"100vh",display:"flex",overflow:"hidden",color:G900}}>
      <style>{"*{box-sizing:border-box;margin:0;padding:0}input,textarea,select,button{font-family:Aptos,Calibri,'Segoe UI',sans-serif}input::placeholder,textarea::placeholder{color:"+G400+"}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:"+G300+";border-radius:3px}"}</style>

      <div style={{width:220,background:W,borderRight:"1px solid "+G200,display:"flex",flexDirection:"column",flexShrink:0,boxShadow:"1px 0 4px #0001"}}>
        <div style={{padding:"20px 20px 18px",borderBottom:"1px solid "+G200}}>
          <img src={LOGO_SRC} alt="VoltConsulting" style={{height:28,maxWidth:"100%",objectFit:"contain",objectPosition:"left"}}/>
          <div style={{fontSize:10.5,color:TEAL,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:8,fontWeight:700}}>Internal CRM</div>
        </div>
        <nav style={{flex:1,padding:"12px 10px"}}>
          {NAV.map(n=>{
            const active=view===n.id;
            return(
              <button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:active?TL:"transparent",border:"1px solid "+(active?TM:"transparent"),borderRadius:7,padding:"10px 12px",marginBottom:3,color:active?TEAL:G600,fontWeight:active?700:400,fontSize:13.5,cursor:"pointer",textAlign:"left",transition:"all 0.12s",fontFamily:"inherit"}}>
                <span style={{fontSize:14}}>{n.icon}</span>
                {n.label}
                {n.id==="bd"&&overdueCount>0&&<span style={{marginLeft:"auto",background:DANGER,color:W,borderRadius:10,padding:"1px 8px",fontSize:10.5,fontWeight:800}}>{overdueCount}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:"14px 20px 20px",borderTop:"1px solid "+G200}}>
          <div style={{fontSize:10.5,color:G400,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>Team</div>
          {[["David",TEAL],["Lauren","#6f42c1"],["Brinda",WARN]].map(([name,c])=>(
            <div key={name} style={{display:"flex",alignItems:"center",gap:9,marginBottom:8}}>
              <Av name={name} size={24} color={c}/>
              <span style={{fontSize:13,color:G700}}>{name}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{background:W,borderBottom:"1px solid "+G200,padding:"12px 24px",display:"flex",alignItems:"center",gap:16,flexShrink:0}}>
          <GlobalSearch people={people} companies={companies} onNavigate={handleNavigate}/>
          <div style={{fontSize:12,color:G400,whiteSpace:"nowrap"}}>{people.length+" people · "+companies.length+" companies"}</div>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>
          {view==="bd"&&<BDTracker people={people} companies={companies} setPeople={setPeople} setCompanies={setCompanies} persist={persist}/>}
          {view==="people"&&<PeopleView people={people} setPeople={setPeople} companies={companies} setCompanies={setCompanies} persist={persist} initialSel={navSel}/>}
          {view==="companies"&&<CompaniesView companies={companies} setCompanies={setCompanies} people={people} setPeople={setPeople} persist={persist} initialSel={navSel} onNavigatePerson={id=>{handleNavigate("people",id);}}/>}
          {view==="campaigns"&&<CampaignsView people={people} setPeople={setPeople} persist={persist}/>}
        {view==="map"&&<MarketMap people={people} companies={companies} onNavigate={handleNavigate}/>}
        </div>
      </div>

      {saveState&&(
        <div style={{position:"fixed",bottom:18,right:20,background:saveState==="saved"?OK+"15":G100,border:"1px solid "+(saveState==="saved"?OK:G300),borderRadius:20,padding:"5px 16px",fontSize:12,color:saveState==="saved"?OK:G600,zIndex:500,pointerEvents:"none",fontWeight:600}}>
          {saveState==="saved"?"✓ Saved":"Saving…"}
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
