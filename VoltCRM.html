// ── Airtable ──────────────────────────────────────────────────
let AT_TOKEN=localStorage.getItem("volt_at_token")||"";
let AT_BASE=localStorage.getItem("volt_at_base")||"";
let AT_TABLE=localStorage.getItem("volt_at_table")||"";

async function atFetch(path,opts={}){
  const r=await fetch("https://api.airtable.com/v0/"+AT_BASE+"/"+AT_TABLE+path,{...opts,headers:{"Authorization":"Bearer "+AT_TOKEN,"Content-Type":"application/json",...(opts.headers||{})}});
  if(!r.ok)throw new Error("AT "+r.status);
  return r.json();
}
async function getOrCreate(name){
  const d=await atFetch("?filterByFormula=Name%3D%22"+encodeURIComponent(name)+"%22");
  if(d.records&&d.records.length>0){localStorage.setItem("atid_"+name,d.records[0].id);return d.records[0];}
  const c=await atFetch("",{method:"POST",body:JSON.stringify({records:[{fields:{Name:name,Notes:"[]"}}]})});
  localStorage.setItem("atid_"+name,c.records[0].id);return c.records[0];
}
async function loadAT(){
  const[p,c]=await Promise.all([getOrCreate("PEOPLE"),getOrCreate("COMPANIES")]);
  let people=[],companies=[];
  try{people=JSON.parse(p.fields.Notes||"[]");}catch{}
  try{companies=JSON.parse(c.fields.Notes||"[]");}catch{}
  if(people.length)localStorage.setItem("vcrm-people",JSON.stringify(people));
  if(companies.length)localStorage.setItem("vcrm-companies",JSON.stringify(companies));
  return{people,companies};
}
async function saveAT(name,data){
  const rec=await getOrCreate(name);
  const id=rec.id||localStorage.getItem("atid_"+name);
  await atFetch("/"+id,{method:"PATCH",body:JSON.stringify({fields:{Notes:JSON.stringify(data)}})});
}

// ── LinkedIn parser ───────────────────────────────────────────
function parseLinkedIn(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const skip=["message","connect","follow","more","highlights","about","experience","education","activity","featured","contact","mutual","connections","followers","posts","comments","premium","following"];
  let name="";
  for(const line of lines){
    const w=line.split(/\s+/);
    if(w.length>=2&&w.length<=5&&!line.includes("|")&&!line.includes("@")&&!line.includes("http")&&!skip.includes(line.toLowerCase())&&/^[A-Za-zÀ-ÿ\s.\-']+$/.test(line)){
      name=line.replace(/,\s*(Assoc|PhD|MD|MBA|MSc|BSc|BA|MA|Dr\.?).*/i,"").trim();
      break;
    }
  }
  let title="",company="";
  for(const line of lines){
    if(line.includes("|")&&!line.includes("http")){
      const parts=line.split("|").map(p=>p.trim()).filter(Boolean);
      if(parts.length>=2){title=parts[0].trim();company=parts[1].replace(/·.*/,"").trim();break;}
    }
  }
  if(!title){
    for(const line of lines){
      if(/(founder|director|manager|partner|consultant|analyst|head of|vp |vice president|officer)/i.test(line)&&line.length<100){title=line;break;}
    }
  }
  let location="";
  for(const line of lines){
    if(/(metropolitan area|united kingdom|ireland|germany|france|switzerland|netherlands|belgium|spain|italy|sweden|united states)/i.test(line)&&line.length<60){location=line.replace(/Contact info.*/i,"").trim();break;}
    if(/^[A-Z][a-z]+,\s*[A-Z]/.test(line)&&line.length<50){location=line;break;}
  }
  const emailM=text.match(/[\w.\-]+@[\w.\-]+\.[a-z]{2,}/i);
  const email=emailM?emailM[0]:"";
  const phoneM=text.match(/(\+?[\d\s\-()]{10,18})/);
  let phone="";
  if(phoneM){const p=phoneM[1].trim();if(p.replace(/\D/g,"").length>=10)phone=p;}
  const liM=text.match(/linkedin\.com\/in\/[\w\-]+/i);
  const linkedin=liM?"https://www."+liM[0]:"";
  let seniority="Manager / Principal";
  const tl=(title||"").toLowerCase();
  if(/(founder|ceo|coo|cfo|chief|partner|president|managing director)/i.test(tl))seniority="C-Suite / Partner";
  else if(/(vp |vice president|director)/i.test(tl))seniority="VP / Director";
  else if(/(analyst|graduate|junior)/i.test(tl))seniority="Analyst / Consultant";
  const ft=text.toLowerCase();
  const sectors=[];
  const km={"Life Sciences":["life science","pharma","biopharma"],"Strategy":["strategy","consulting"],"Commercial":["commercial","sales"],"Oncology":["oncology","cancer"],"RWE":["real world evidence","rwe"],"Market Access":["market access","hta"],"Operations":["operations"],"MedTech":["medtech","medical device"],"Digital Health":["digital health"],"Biotech":["biotech","biotechnology"],"Regulatory":["regulatory"],"Pricing":["pricing","heor","health economics"]};
  for(const[s,kws]of Object.entries(km)){if(kws.some(k=>ft.includes(k)))sectors.push(s);}
  return{name,title,company,location,seniority,sectors,linkedin,email,phone};
}

function parseLinkedInCompany(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const skip=["home","about","posts","jobs","people","videos","linkedin","follow","message","website","industry","company size","headquarters","founded","followers"];
  let name="";
  for(const line of lines){
    if(line.length>2&&line.length<80&&!line.includes("http")&&!line.includes("#")&&!skip.some(w=>line.toLowerCase().startsWith(w))){name=line;break;}
  }
  let hq="";
  for(const line of lines){
    if(/(headquarters|hq):/i.test(line)){hq=line.replace(/(headquarters|hq):\s*/i,"").trim();break;}
    if(/(metropolitan area|united kingdom|ireland|germany|france|london|boston|new york)/i.test(line)&&line.length<60){hq=line;break;}
  }
  let type="Consulting";
  const ft=text.toLowerCase();
  if(/(pharma|pharmaceutical)/i.test(ft))type="Pharma";
  else if(/biotech/i.test(ft))type="Biotech";
  else if(/medtech|medical device/i.test(ft))type="MedTech";
  let notes="";
  const ai=text.search(/\bAbout\b/i);
  if(ai>-1)notes=text.slice(ai+5).trim().slice(0,200).replace(/\n+/g," ");
  return{name,hq,type,tier:"Prospect",relationship:"Cold",notes};
}

// ── Fuzzy match ───────────────────────────────────────────────
function norm(s){return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function sim(a,b){const na=norm(a),nb=norm(b);if(!na||!nb)return 0;if(na===nb)return 1;if(na.includes(nb)||nb.includes(na))return 0.85;const bg=s=>{const b=new Set();for(let i=0;i<s.length-1;i++)b.add(s.slice(i,i+2));return b;};const ba=bg(na),bb=bg(nb);let inter=0;ba.forEach(g=>{if(bb.has(g))inter++;});return(2*inter)/(ba.size+bb.size||1);}
function findDupePeople(name,company,people,excludeId){return people.filter(p=>{if(p.id===excludeId)return false;const ns=sim(name,p.name);if(ns<0.8)return false;if(company&&p.company)return sim(company,p.company)>0.7||ns>0.92;return ns>0.92;});}
function findDupeCompanies(name,companies,excludeId){return companies.filter(c=>c.id!==excludeId&&sim(name,c.name)>=0.82);}
function autoLinkCompany(personCompany,companies){
  if(!personCompany?.trim())return{companies,companyId:null};
  const m=companies.find(c=>sim(personCompany,c.name)>=0.82);
  if(m)return{companies,companyId:m.id};
  const nc={id:Date.now()+Math.random(),name:personCompany,type:"Consulting",tier:"Prospect",hq:"",keyContact:"",openMandates:0,lastContacted:"",nextAction:"",nextDue:"",relationship:"Cold",notes:"Auto-created."};
  return{companies:[...companies,nc],companyId:nc.id};
}

function setState(patch){Object.assign(state,typeof patch==="function"?patch(state):patch);render();}

// ── Persistence ───────────────────────────────────────────────
async function persist(key,data){
  setState({saveState:"saving"});
  localStorage.setItem("vcrm-"+key,JSON.stringify(data));
  try{await saveAT(key==="people"?"PEOPLE":"COMPANIES",data);setState({syncStatus:"ok"});}
  catch(e){console.warn("AT save fail:",e);setState({syncStatus:"offline"});}
  setState({saveState:"saved"});
  setTimeout(()=>setState({saveState:null}),2500);
}

// ── Init ──────────────────────────────────────────────────────
async function init(){
  if(!AT_TOKEN){setState({ready:true});return;}
  setState({syncStatus:"loading"});
  try{
    const data=await loadAT();
    const p=data.people.length>0?data.people:JSON.parse(localStorage.getItem("vcrm-people")||"[]");
    const c=data.companies.length>0?data.companies:JSON.parse(localStorage.getItem("vcrm-companies")||"[]");
    setState({people:p.length?p:SEED_PEOPLE,companies:c.length?c:SEED_COMPANIES,syncStatus:"ok"});
    if(!data.people.length&&!data.companies.length){
      await saveAT("PEOPLE",state.people);
      await saveAT("COMPANIES",state.companies);
    }
  }catch(e){
    console.warn("AT load fail:",e.message);
    const p=JSON.parse(localStorage.getItem("vcrm-people")||"[]");
    const c=JSON.parse(localStorage.getItem("vcrm-companies")||"[]");
    setState({people:p.length?p:SEED_PEOPLE,companies:c.length?c:SEED_COMPANIES,syncStatus:"offline"});
  }
  setState({ready:true});
}

// ── Due label ─────────────────────────────────────────────────
function dueLabel(due){
  if(!due)return null;
  const d=Math.ceil((new Date(due)-new Date())/86400000);
  if(d>3)return{text:due,color:G600};
  if(d>=0)return{text:d===0?"Due today":"Due in "+d+"d",color:WARN};
  return{text:"Overdue "+Math.abs(d)+"d",color:DANGER};
}

// ── HTML builders ─────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){el.className=v;}
    else if(k==="htmlFor"){el.htmlFor=v;}
    else{el[k]=v;}
  }
  for(const c of children.flat()){
    if(c==null||c===false||c===undefined)continue;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return el;
}

function btn(text,onClick,style={}){
  return h("button",{onClick,style:{background:TEAL,color:W,border:"none",borderRadius:6,padding:"7px 16px",fontWeight:600,fontSize:13,cursor:"pointer",...style}},text);
}
function ghostBtn(text,onClick,style={}){
  return btn(text,onClick,{background:"transparent",color:G600,border:"1px solid "+G300,...style});
}
function dangerBtn(text,onClick){
  return btn(text,onClick,{background:"transparent",color:DANGER,border:"1px solid "+DANGER+"44"});
}
function tealBtn(text,onClick,style={}){
  return btn(text,onClick,{background:TL,color:TEAL,border:"1px solid "+TM,...style});
}

function inp(value,onInput,placeholder,type="text",style={}){
  const el=h("input",{type,placeholder,value:value||"",style:{background:W,border:"1px solid "+G300,borderRadius:6,padding:"8px 11px",fontSize:13,outline:"none",width:"100%",...style}});
  el.addEventListener("input",e=>onInput(e.target.value));
  return el;
}
function tarea(value,onInput,placeholder,rows=3){
  const el=h("textarea",{placeholder,rows,style:{background:W,border:"1px solid "+G300,borderRadius:6,padding:"8px 11px",fontSize:13,outline:"none",width:"100%",resize:"vertical"}});
  el.value=value||"";
  el.addEventListener("input",e=>onInput(e.target.value));
  return el;
}
function sel(value,onChange,options,style={}){
  const el=h("select",{style:{background:W,border:"1px solid "+G300,borderRadius:6,padding:"8px 11px",fontSize:13,outline:"none",width:"100%",cursor:"pointer",...style}});
  el.addEventListener("change",e=>onChange(e.target.value));
  for(const o of options){
    const opt=h("option",{value:typeof o==="string"?o:o.v},typeof o==="string"?o:o.l);
    if((typeof o==="string"?o:o.v)===value)opt.selected=true;
    el.appendChild(opt);
  }
  return el;
}
function fld(label,child,span2=false){
  return h("div",{style:{marginBottom:14,gridColumn:span2?"span 2":"span 1"}},[
    h("div",{style:{fontSize:11,color:G600,marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}},label),
    child
  ]);
}
function av(name,size=36,color=TEAL){
  const i=(name||"?").trim().split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

function badge(label,color=TEAL){

function relDot(rel){

function dueTag(due){
  const d=dueLabel(due);
  if(!d)return h("span",{},"");
  return h("span",{style:{fontSize:11,fontWeight:600,color:d.color}},d.text);
}
function infoCard(label,content){

    h("div",{style:{fontSize:10.5,color:G600,marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}},label),

// ── Modal ─────────────────────────────────────────────────────
function modal(title,content,wide=false){
  const overlay=h("div",{style:{position:"fixed",inset:0,background:"#0006",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}});
  const box=h("div",{style:{background:W,borderRadius:12,padding:"28px 32px",width:wide?700:560,maxWidth:"96vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px #0003",border:"1px solid "+G200}});
  const header=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,paddingBottom:16,borderBottom:"1px solid "+G200}},[
    h("span",{style:{fontWeight:700,fontSize:18,color:NAVY}},title),
    btn("×",()=>setState({modal:null,modalData:null,li_error:"",co_li_error:"",dupes:[],dupeDismissed:false}),{background:"transparent",color:G400,border:"none",fontSize:22,padding:"0 4px"})
  ]);
  box.appendChild(header);
  box.appendChild(content);
  overlay.appendChild(box);
  overlay.addEventListener("click",e=>{if(e.target===overlay)setState({modal:null,modalData:null,li_error:"",co_li_error:"",dupes:[],dupeDismissed:false});});
  return overlay;
}

// ── Setup screen ──────────────────────────────────────────────
function renderSetup(){
  const wrap=h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}});
  const box=h("div",{style:{background:W,borderRadius:14,padding:"40px 48px",width:520,maxWidth:"100%",boxShadow:"0 4px 24px #0002",border:"1px solid "+G200}});
  const title=h("div",{style:{fontWeight:800,fontSize:22,color:NAVY,marginBottom:8}});
  title.textContent="VoltConsulting CRM";
  const sub=h("div",{style:{fontSize:13,color:G600,marginBottom:24,lineHeight:1.6}});
  sub.textContent="Enter your Airtable credentials to connect. Stored in your browser only.";

  const tokenInput=inp(state.setupToken,v=>setState({setupToken:v}),"patXXXXXX…");
  const baseInput=inp(state.setupBase,v=>setState({setupBase:v}),"appXXXXXX…");
  const errDiv=h("div",{style:{color:DANGER,fontSize:13,marginBottom:12,display:state.setupError?"block":"none"}},state.setupError);

  const connectBtn=btn(state.setupTesting?"Testing…":"Connect & Open CRM",async()=>{
    if(!state.setupToken.trim()){setState({setupError:"Please enter your Airtable token"});return;}
    setState({setupTesting:true,setupError:""});
    try{
      const r=await fetch("https://api.airtable.com/v0/"+state.setupBase+"/"+state.setupTable+"?maxRecords=1",{headers:{"Authorization":"Bearer "+state.setupToken.trim()}});
      if(!r.ok)throw new Error("Connection failed ("+r.status+") — check your token");
      localStorage.setItem("volt_at_token",state.setupToken.trim());
      localStorage.setItem("volt_at_base",state.setupBase.trim());
      localStorage.setItem("volt_at_table",state.setupTable.trim());
      AT_TOKEN=state.setupToken.trim();AT_BASE=state.setupBase.trim();AT_TABLE=state.setupTable.trim();
      await init();
    }catch(e){setState({setupTesting:false,setupError:e.message});}
  },{width:"100%",padding:"11px 24px",fontSize:14,opacity:state.setupTesting?0.7:1});

  box.append(title,sub,
    fld("Personal Access Token",tokenInput),
    fld("Base ID",baseInput),
    errDiv,connectBtn,
    h("div",{style:{marginTop:12,fontSize:12,color:G400,textAlign:"center"}},"Credentials saved in this browser only. Each team member enters once.")
  );
  wrap.appendChild(box);
  return wrap;

// ── Inline editable field ─────────────────────────────────────
function inlineField(label,value,onSave,type="text",href){
  const wrap=h("div",{style:{borderBottom:"1px solid "+G100,paddingBottom:10,marginBottom:10}});
  const lbl=h("div",{style:{fontSize:10.5,color:G400,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}},label);
  let editing=false;
  const display=h("div",{style:{display:"flex",alignItems:"center",gap:8,minHeight:24}});
  const valEl=href?h("a",{href,target:"_blank",style:{color:TEAL,fontSize:13,fontWeight:600,textDecoration:"none",flex:1}},value||(label+" ↗")):h("span",{style:{color:value?NAVY:G300,fontSize:13,fontWeight:value?600:400,fontStyle:value?"normal":"italic",flex:1}},value||"Click to add…");
  const editBtn=h("button",{style:{background:"transparent",border:"1px solid "+G200,borderRadius:5,padding:"3px 8px",fontSize:11,color:G400,cursor:"pointer",flexShrink:0}},h("span",{},"✏"));
  display.append(valEl,editBtn);

  const editWrap=h("div",{style:{display:"none",gap:6,alignItems:"center"}});
  const editInp=inp(value,()=>{},"",type,{flex:1});
  editInp.value=value||"";
  const saveBtn=h("button",{style:{background:TEAL,color:W,border:"none",borderRadius:5,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}},"✓");
  const cancelBtn=h("button",{style:{background:"transparent",color:G400,border:"1px solid "+G300,borderRadius:5,padding:"5px 8px",fontSize:12,cursor:"pointer"}},"✕");
  editWrap.style.display="flex";
  editWrap.style.display="none";
  editWrap.append(editInp,saveBtn,cancelBtn);

  editBtn.onclick=()=>{editInp.value=value||"";display.style.display="none";editWrap.style.display="flex";editing=true;editInp.focus();};
  saveBtn.onclick=()=>{onSave(editInp.value);display.style.display="flex";editWrap.style.display="none";editing=false;};
  cancelBtn.onclick=()=>{display.style.display="flex";editWrap.style.display="none";editing=false;};
  editInp.onkeydown=e=>{if(e.key==="Enter")saveBtn.onclick();if(e.key==="Escape")cancelBtn.onclick();};

  wrap.append(lbl,display,editWrap);
  return wrap;
}

      inlineField("Location",p.location,v=>saveField("location",v)),
      inlineField("Title",p.title,v=>saveField("title",v)),

      nc.append(h("div",{style:{fontSize:11,color:G600,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}},"Notes snapshot"),h("div",{style:{color:G700,fontSize:13,lineHeight:1.7}},p.notes.slice(0,300)+(p.notes.length>300?"…":"")));

      if(coP.length){
        const cl=h("div",{style:{background:W,borderRadius:8,padding:"16px 20px",border:"1px solid "+G200}});

      table.appendChild(row);

    const doImport=()=>{
