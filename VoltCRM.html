<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltCRM | VoltConsulting</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00C2C7;--navy:#0D1B2A;--pale:#e6fafa;
  --david:#00C2C7;--lauren:#6f42c1;--brinda:#e8a020;
  --bg:#f5f7fa;--card:#fff;--border:#e2e8f0;
  --text:#0D1B2A;--muted:#64748b;--red:#e53e3e;--green:#38a169;
  --font:'Segoe UI',Calibri,system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
#root{display:flex;flex-direction:column;min-height:100vh}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--navy);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px}

/* Sidebar */
.sidebar-logo{padding:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-logo img{height:28px;filter:brightness(0) invert(1)}
.sidebar-nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:rgba(255,255,255,0.7);cursor:pointer;font-size:14px;transition:all 0.15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.nav-item.active{background:rgba(0,194,199,0.2);color:var(--teal);border-right:3px solid var(--teal)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.1)}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px}
.user-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:var(--font)}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:#00a8ac}
.btn-secondary{background:var(--pale);color:var(--teal);border:1px solid var(--teal)}
.btn-secondary:hover{background:#d0f5f6}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:#fff0f0;color:var(--red);border:1px solid #fecaca}
.btn-sm{padding:4px 10px;font-size:12px}

/* Form */
input,select,textarea{font-family:var(--font);font-size:13px;border:1px solid var(--border);border-radius:6px;padding:7px 10px;width:100%;color:var(--text);background:#fff;transition:border 0.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.04em}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.tag-active{background:var(--teal);color:#fff;border-color:var(--teal)}
.tag-inactive{background:#f1f5f9;color:var(--muted);border-color:var(--border)}
.tag-inactive:hover{border-color:var(--teal);color:var(--teal)}

/* Person list */
.person-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border)}
.person-row:hover{background:var(--pale)}
.person-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.person-info{flex:1;min-width:0}
.person-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.follow-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px;color:var(--muted)}
.follow-btn:hover{background:var(--pale);color:var(--teal)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;font-weight:500;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);transition:all 0.15s}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab:hover{color:var(--text)}

/* Badge */
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.badge-teal{background:var(--pale);color:var(--teal)}
.badge-red{background:#fff0f0;color:var(--red)}
.badge-amber{background:#fffbeb;color:#b45309}
.badge-purple{background:#f5f3ff;color:#7c3aed}
.badge-gray{background:#f1f5f9;color:var(--muted)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(13,27,42,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:10px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:700;font-size:16px}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:0 4px;line-height:1}
.close-btn:hover{color:var(--text)}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Split layout */
.split{display:flex;gap:0;height:100%;overflow:hidden}
.split-list{width:300px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:#fff}
.split-detail{flex:1;overflow-y:auto;padding:20px}

/* Stat */
.stat{text-align:center;padding:12px}
.stat-num{font-size:24px;font-weight:800;color:var(--navy)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}

/* Setup screen */
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.setup-card{background:#fff;border-radius:12px;padding:40px;max-width:440px;width:100%;text-align:center}
.setup-logo{height:36px;margin-bottom:24px}
.setup-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:6px}
.setup-sub{font-size:14px;color:var(--muted);margin-bottom:28px}

/* Login screen */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.login-card{background:#fff;border-radius:12px;padding:40px;max-width:360px;width:100%;text-align:center}
.user-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;border:2px solid var(--border);cursor:pointer;background:#fff;width:100%;margin-bottom:10px;font-family:var(--font);font-size:14px;font-weight:600;transition:all 0.15s}
.user-btn:hover{border-color:var(--teal);background:var(--pale)}

/* Inline quick-add */
.quick-add{display:flex;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--pale)}
.quick-add input{padding:5px 8px;font-size:12px}

/* BD Tracker */
.tracker-row{display:grid;grid-template-columns:2fr 2fr 1.5fr 1fr auto;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
.tracker-header{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;padding:8px 12px;border-bottom:2px solid var(--border);background:#f8fafc}
.overdue{background:#fff5f5}

/* Market map */
.mm-grid{display:flex;flex-wrap:wrap;gap:10px;padding:16px}
.mm-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all 0.15s;min-width:160px}
.mm-card:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(0,194,199,0.15)}
.sector-bubble{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}

/* Misc */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.search-bar input{flex:1}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.kv{display:flex;gap:8px;margin-bottom:8px;font-size:13px}
.kv-k{color:var(--muted);min-width:90px;flex-shrink:0}
.kv-v{font-weight:500}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.campaign-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}

textarea.notes-area{min-height:100px;font-size:13px}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ── Non-JSX utilities ───────────────────────────────────────────────
var AIRTABLE_BASE = 'appD0JD8AUdtR6thY';
var AIRTABLE_TABLE = 'tblUL48Km1j2m8sRU';

function getToken(){return localStorage.getItem('volt_at_token')||'';}
function getUser(){return localStorage.getItem('volt_user')||'';}

function airtableHeaders(){
  return {'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'};
}

function airtableUrl(extra){
  return 'https://api.airtable.com/v0/'+AIRTABLE_BASE+'/'+AIRTABLE_TABLE+(extra||'');
}

async function atGet(rowName){
  var url = airtableUrl('?filterByFormula=({Name}="'+rowName+'")&maxRecords=1');
  var res = await fetch(url,{headers:airtableHeaders()});
  var d = await res.json();
  if(d.records && d.records.length>0){
    var notes = d.records[0].fields.Notes||'[]';
    try{return {id:d.records[0].id, data:JSON.parse(notes)};}catch(e){return {id:d.records[0].id,data:[]};}
  }
  return null;
}

async function atUpsert(rowName, data){
  var existing = await atGet(rowName);
  var body = {fields:{Name:rowName,Notes:JSON.stringify(data)}};
  if(existing && existing.id){
    await fetch(airtableUrl('/'+existing.id),{method:'PATCH',headers:airtableHeaders(),body:JSON.stringify(body)});
  } else {
    await fetch(airtableUrl(),{method:'POST',headers:airtableHeaders(),body:JSON.stringify(body)});
  }
}

function uid(){return 'v'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function initials(name){
  if(!name) return '?';
  var parts = name.trim().split(' ');
  if(parts.length>=2) return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

function avatarColor(name){
  var colors=['#00a8ac','#6f42c1','#e8a020','#0284c7','#059669','#dc2626','#7c3aed','#0891b2'];
  var h=0;
  for(var i=0;i<(name||'').length;i++) h=(h+(name||'').charCodeAt(i))%colors.length;
  return colors[h];
}

var SECTORS=['Strategy','Market Access','HEOR','Reg Affairs','Med Affairs','Comms','Commercial','Data/Analytics','Portfolio','Other'];
var SECTOR_COLORS={
  'Strategy':'#dbeafe','Market Access':'#d1fae5','HEOR':'#fef3c7','Reg Affairs':'#ede9fe',
  'Med Affairs':'#fce7f3','Comms':'#ffedd5','Commercial':'#e0f2fe','Data/Analytics':'#f0fdf4',
  'Portfolio':'#fdf4ff','Other':'#f1f5f9'
};
var SECTOR_TEXT={
  'Strategy':'#1d4ed8','Market Access':'#065f46','HEOR':'#92400e','Reg Affairs':'#5b21b6',
  'Med Affairs':'#9d174d','Comms':'#c2410c','Commercial':'#0369a1','Data/Analytics':'#14532d',
  'Portfolio':'#7e22ce','Other':'#475569'
};

function today(){
  var d=new Date();
  return d.toISOString().slice(0,10);
}

function isOverdue(dateStr){
  if(!dateStr) return false;
  return dateStr < today();
}

function fmtDate(dateStr){
  if(!dateStr) return '';
  try{
    var d=new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }catch(e){return dateStr;}
}

function exportInstantlyCSV(people, campName){
  var rows=[['First Name','Last Name','Email','Company','Job Title']];
  people.forEach(function(p){
    var parts=(p.name||'').trim().split(' ');
    var fn=parts[0]||'';
    var ln=parts.slice(1).join(' ')||'';
    rows.push([fn,ln,p.email||'',p.company||'',p.title||'']);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(campName||'campaign')+'_instantly.csv';
  a.click();
}

var USER_COLORS={David:'#00C2C7',Lauren:'#6f42c1',Brinda:'#e8a020'};

function hexToRgb(hex){
  hex=(hex||'#000').replace('#','');
  var r=parseInt(hex.slice(0,2),16);
  var g=parseInt(hex.slice(2,4),16);
  var b=parseInt(hex.slice(4,6),16);
  return r+','+g+','+b;
}

// localStorage cache
function cacheGet(key){
  try{var v=localStorage.getItem('voltcrm_'+key);return v?JSON.parse(v):null;}catch(e){return null;}
}
function cacheSet(key,val){
  try{localStorage.setItem('voltcrm_'+key,JSON.stringify(val));}catch(e){}
}
</script>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ── Setup & Login ──────────────────────────────────────────────────────
function SetupScreen({onDone}){
  const [tok,setTok]=useState('');
  const [err,setErr]=useState('');
  const [testing,setTesting]=useState(false);

  async function handleTest(){
    if(!tok.trim()){setErr('Please enter your Airtable token');return;}
    setTesting(true);setErr('');
    try{
      localStorage.setItem('volt_at_token',tok.trim());
      const url='https://api.airtable.com/v0/'+AIRTABLE_BASE+'/'+AIRTABLE_TABLE+'?maxRecords=1';
      const res=await fetch(url,{headers:{'Authorization':'Bearer '+tok.trim()}});
      if(res.ok){onDone();}
      else{setErr('Token invalid or no access. Check the token and base ID.');localStorage.removeItem('volt_at_token');}
    }catch(e){setErr('Connection failed.');}
    setTesting(false);
  }

  return (
    <div className="setup">
      <div className="setup-card">
        <img className="setup-logo" src="https://voltconsulting.solutions/images/VC_Logo_NEW_Blue_Black.png" alt="VoltConsulting"/>
        <div className="setup-title">VoltCRM Setup</div>
        <div className="setup-sub">Enter your Airtable Personal Access Token to connect the shared data store.</div>
        <div className="form-group" style={{textAlign:'left'}}>
          <label className="form-label">Airtable Token</label>
          <input type="password" placeholder="pat..." value={tok} onChange={e=>setTok(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleTest()}/>
        </div>
        {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary" style={{width:'100%'}} onClick={handleTest} disabled={testing}>
          {testing?'Testing...':'Connect & Save'}
        </button>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:12}}>Token is stored in your browser only — never in any file.</div>
      </div>
    </div>
  );
}

function LoginScreen({onLogin}){
  return (
    <div className="login">
      <div className="login-card">
        <img style={{height:32,marginBottom:24}} src="https://voltconsulting.solutions/images/VC_Logo_NEW_Blue_Black.png" alt="VoltConsulting"/>
        <div style={{fontWeight:800,fontSize:20,color:'var(--navy)',marginBottom:6}}>VoltCRM</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:28}}>Who's logged in today?</div>
        {['David','Lauren','Brinda'].map(u=>(
          <button key={u} className="user-btn" onClick={()=>onLogin(u)}>
            <span style={{width:32,height:32,borderRadius:'50%',background:USER_COLORS[u],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:14}}>{u[0]}</span>
            <span>{u}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Data Layer ─────────────────────────────────────────────────────────
function useVoltData(){
  const [people,setPeople]=useState([]);
  const [companies,setCompanies]=useState([]);
  const [campaigns,setCampaigns]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [syncErr,setSyncErr]=useState('');

  async function loadData(){
    setSyncErr('');
    const cached_p=cacheGet('people');
    const cached_c=cacheGet('companies');
    const cached_camp=cacheGet('campaigns');
    if(cached_p) setPeople(cached_p);
    if(cached_c) setCompanies(cached_c);
    if(cached_camp) setCampaigns(cached_camp);
    setLoading(false);
    try{
      const [pr,cr,campr]=await Promise.all([atGet('PEOPLE'),atGet('COMPANIES'),atGet('CAMPAIGNS')]);
      const pp=(pr&&pr.data)||[];
      const cc=(cr&&cr.data)||[];
      const camps=(campr&&campr.data)||[];
      setPeople(pp);setCompanies(cc);setCampaigns(camps);
      cacheSet('people',pp);cacheSet('companies',cc);cacheSet('campaigns',camps);
    }catch(e){setSyncErr('Airtable sync failed — working from cache.');}
  }

  useEffect(()=>{loadData();},[]);

  async function savePeople(updated){
    setSaving(true);
    setPeople(updated);cacheSet('people',updated);
    try{await atUpsert('PEOPLE',updated);}catch(e){setSyncErr('Save failed — data cached locally.');}
    setSaving(false);
  }
  async function saveCompanies(updated){
    setSaving(true);
    setCompanies(updated);cacheSet('companies',updated);
    try{await atUpsert('COMPANIES',updated);}catch(e){setSyncErr('Save failed.');}
    setSaving(false);
  }
  async function saveCampaigns(updated){
    setSaving(true);
    setCampaigns(updated);cacheSet('campaigns',updated);
    try{await atUpsert('CAMPAIGNS',updated);}catch(e){setSyncErr('Save failed.');}
    setSaving(false);
  }

  return {people,companies,campaigns,loading,saving,syncErr,savePeople,saveCompanies,saveCampaigns,reload:loadData};
}

// ── Person Form Modal ─────────────────────────────────────────────────
function PersonModal({person,companies,onSave,onClose}){
  const blank={id:'',name:'',title:'',company:'',email:'',linkedin:'',phone:'',sectors:[],notes:'',nextAction:'',nextActionDate:'',campaigns:[],owner:getUser()};
  const [f,setF]=useState(person?Object.assign({},blank,person):blank);

  function set(k,v){setF(function(prev){var n=Object.assign({},prev);n[k]=v;return n;});}
  function toggleSector(s){
    setF(function(prev){
      var n=Object.assign({},prev);
      var secs=n.sectors?n.sectors.slice():[];
      var idx=secs.indexOf(s);
      if(idx>=0) secs.splice(idx,1); else secs.push(s);
      n.sectors=secs;
      return n;
    });
  }
  function handleSave(){
    if(!f.name.trim()){alert('Name required');return;}
    var p=Object.assign({},f,{id:f.id||uid()});
    onSave(p);
  }

  return (
    <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{person?'Edit Person':'Add Person'}</span>
          <button className="close-btn" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Full Name *</label><input value={f.name} onChange={e=>set('name',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Job Title</label><input value={f.title||''} onChange={e=>set('title',e.target.value)}/></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Company</label>
              <input value={f.company||''} onChange={e=>set('company',e.target.value)} list="co-list"/>
              <datalist id="co-list">{companies.map(c=><option key={c.id} value={c.name}/>)}</datalist>
            </div>
            <div className="form-group"><label className="form-label">Email</label><input type="email" value={f.email||''} onChange={e=>set('email',e.target.value)}/></div>
          </div>
          <div className="form-row">

// ── CSV Import ─────────────────────────────────────────────────────────
function parseCSV(text){
  var lines=text.split('\n').filter(function(l){return l.trim();});
  if(lines.length<2) return [];
  var headers=lines[0].split(',').map(function(h){return h.replace(/^"|"$/g,'').trim().toLowerCase();});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var cols=[];
    var cur='';var inQ=false;
    for(var j=0;j<lines[i].length;j++){
      var ch=lines[i][j];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    var row={};
    headers.forEach(function(h,idx){row[h]=cols[idx]||'';});
    rows.push(row);
  }
  return rows;
}

function normalName(s){return (s||'').toLowerCase().replace(/\s+/g,' ').trim();}
function normalEmail(s){return (s||'').toLowerCase().trim();}

function findDupes(incoming, existing){
  var results=[];
  incoming.forEach(function(p){
    var dupes=existing.filter(function(e){
      var nameMatch=normalName(e.name)===normalName(p.name)&&normalName(p.name)!=='';
      var emailMatch=normalEmail(e.email)===normalEmail(p.email)&&normalEmail(p.email)!=='';
      return nameMatch||emailMatch;
    });
    results.push({person:p,dupes:dupes});
  });
  return results;
}

function mapRow(row, ownerUser){
  var name='';
  if(row['full name']) name=row['full name'];
  else if(row['name']) name=row['name'];
  else if(row['first name']||row['firstname']){
    var fn=row['first name']||row['firstname']||'';
    var ln=row['last name']||row['lastname']||row['surname']||'';
    name=(fn+' '+ln).trim();
  }
  return {
    id:uid(),
    name:name,
    title:row['job title']||row['title']||row['position']||'',
    company:row['company']||row['company name']||row['organization']||'',
    email:row['email']||row['email address']||'',
    linkedin:row['linkedin']||row['linkedin url']||row['linkedin profile']||'',
    phone:row['phone']||row['phone number']||'',
    sectors:[],campaigns:[],notes:'',nextAction:'',nextActionDate:'',
    owner:ownerUser||''
  };
}

function CSVImportModal({people,onImport,onClose}){
  const [step,setStep]=useState('upload'); // upload | review
  const [rawText,setRawText]=useState('');
  const [parsed,setParsed]=useState([]);
  const [analysis,setAnalysis]=useState([]);
  const [selections,setSelections]=useState({});
  const fileRef=useRef(null);

  function handleFile(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){setRawText(ev.target.result);};
    reader.readAsText(file);
  }

  function handleParse(){
    if(!rawText.trim()){alert('Please upload a CSV file or paste CSV text.');return;}
    var rows=parseCSV(rawText);
    if(!rows.length){alert('Could not parse CSV — check the format.');return;}
    var owner=getUser();
    var mapped=rows.map(function(r){return mapRow(r,owner);}).filter(function(p){return p.name.trim();});
    if(!mapped.length){alert('No rows with names found. Check your CSV has a Name, "First Name"/"Last Name", or "Full Name" column.');return;}
    var dupeAnalysis=findDupes(mapped,people);
    var sels={};
    dupeAnalysis.forEach(function(item,i){sels[i]=item.dupes.length>0?'skip':'import';});
    setParsed(mapped);
    setAnalysis(dupeAnalysis);
    setSelections(sels);
    setStep('review');
  }

  function handleImport(){
    var toImport=analysis.filter(function(item,i){return selections[i]==='import';}).map(function(item){return item.person;});
    if(!toImport.length){alert('Nothing selected to import.');return;}
    onImport(toImport);
  }

  var importCount=Object.keys(selections).filter(function(k){return selections[k]==='import';}).length;
  var skipCount=Object.keys(selections).filter(function(k){return selections[k]==='skip';}).length;
  var dupeCount=analysis.filter(function(a){return a.dupes.length>0;}).length;

  return (
    <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:680}}>
        <div className="modal-header">
          <span className="modal-title">Import CSV</span>
          <button className="close-btn" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          {step==='upload'&&(
            <div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>
                Accepts Apollo, LinkedIn, or any CSV. Columns auto-detected: Name / First Name / Last Name / Job Title / Company / Email / LinkedIn / Phone.
              </div>
              <div style={{border:'2px dashed var(--border)',borderRadius:8,padding:'20px',textAlign:'center',marginBottom:12,cursor:'pointer',background:'var(--pale)'}} onClick={()=>fileRef.current&&fileRef.current.click()}>
                <div style={{fontSize:24,marginBottom:6}}>📂</div>
                <div style={{fontSize:13,fontWeight:600}}>Click to upload CSV</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>or paste below</div>
                <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={handleFile}/>
              </div>
              {rawText&&<div style={{fontSize:12,color:'var(--green)',marginBottom:8}}>✓ File loaded ({rawText.split('\n').length} lines)</div>}
              <div className="form-group">
                <label className="form-label">Or paste CSV text</label>
                <textarea style={{minHeight:80,fontSize:11,fontFamily:'monospace'}} value={rawText} onChange={e=>setRawText(e.target.value)} placeholder="Paste CSV content here..."/>
              </div>
            </div>
          )}

          {step==='review'&&(
            <div>
              <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
                <span className="badge badge-teal">{parsed.length} rows parsed</span>
                {dupeCount>0&&<span className="badge badge-amber">⚠ {dupeCount} possible duplicates</span>}
                <span className="badge badge-teal" style={{background:'#f0fdf4',color:'#166534'}}>{importCount} will import</span>
                {skipCount>0&&<span className="badge badge-gray">{skipCount} skipped</span>}
              </div>
              <div style={{maxHeight:380,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6}}>
                <div style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 1.5fr 1fr',gap:0,padding:'6px 10px',background:'#f8fafc',borderBottom:'1px solid var(--border)',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                  <span>Name</span><span>Company</span><span>Email</span><span>Action</span>
                </div>
                {analysis.map(function(item,i){
                  var p=item.person;
                  var hasDupe=item.dupes.length>0;
                  return (
                    <div key={i} style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 1.5fr 1fr',gap:0,padding:'7px 10px',borderBottom:'1px solid var(--border)',fontSize:12,background:hasDupe?'#fffbeb':'#fff',alignItems:'center'}}>
                      <div>
                        <div style={{fontWeight:600}}>{p.name||'—'}</div>
                        {p.title&&<div style={{fontSize:11,color:'var(--muted)'}}>{p.title}</div>}
                        {hasDupe&&<div style={{fontSize:10,color:'#b45309'}}>⚠ matches: {item.dupes.map(function(d){return d.name;}).join(', ')}</div>}
                      </div>
                      <span style={{color:'var(--muted)'}}>{p.company||'—'}</span>
                      <span style={{color:'var(--muted)',fontSize:11}}>{p.email||'—'}</span>
                      <select value={selections[i]||'import'} onChange={function(e){var s=Object.assign({},selections);s[i]=e.target.value;setSelections(s);}} style={{fontSize:11,padding:'3px 5px'}}>
                        <option value="import">Import</option>
                        <option value="skip">Skip</option>
                      </select>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:10,fontSize:12,color:'var(--muted)'}}>Duplicates are pre-set to Skip — change to Import if you want to add them anyway.</div>
            </div>

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function PeopleView({data,ownerFilter,setOwnerFilter}){
  const {people,companies,campaigns,savePeople}=data;
  const [search,setSearch]=useState('');
  const [filterCamp,setFilterCamp]=useState('');
  const [filterSector,setFilterSector]=useState('');
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [followUp,setFollowUp]=useState(null);

  // Quick add state
  const [qa,setQa]=useState({name:'',title:'',company:'',email:''});
  const [qaActive,setQaActive]=useState(false);

  function filtered(){
    return people.filter(function(p){
      var q=search.toLowerCase();
      var matchQ=!q||(p.name&&p.name.toLowerCase().indexOf(q)>=0)||(p.company&&p.company.toLowerCase().indexOf(q)>=0)||(p.title&&p.title.toLowerCase().indexOf(q)>=0);
      var matchCamp=!filterCamp||(p.campaigns&&p.campaigns.indexOf(filterCamp)>=0);
      var matchSec=!filterSector||(p.sectors&&p.sectors.indexOf(filterSector)>=0);
      var matchOwner=!ownerFilter||p.owner===ownerFilter;
      return matchQ&&matchCamp&&matchSec&&matchOwner;
    });
  }

  function handleSave(p){
    var updated=people.slice();
    var idx=updated.findIndex(function(x){return x.id===p.id;});
    if(idx>=0){
      updated[idx]=p;
    } else {
      var dd=findDupes([p],people).filter(function(d){return d.dupes.length>0;});
      if(dd.length>0){
        var dnames=dd[0].dupes.map(function(d){return d.name;}).join(', ');
        if(!window.confirm('Possible duplicate — '+dnames+' already exists. Add anyway?')) return;
      }
      updated.unshift(p);
    }
    savePeople(updated);
    setSelected(p);
    setShowAdd(false);
  }

  function handleDelete(id){
    savePeople(people.filter(function(p){return p.id!==id;}));
    setSelected(null);
  }

  function handleImportCSV(newPeople){
    savePeople(newPeople.concat(people));
    setShowImport(false);
  }

  function handleUpdate(p){
    var updated=people.slice();
    var idx=updated.findIndex(function(x){return x.id===p.id;});
    if(idx>=0) updated[idx]=p;
    savePeople(updated);
    setSelected(p);
  }

  function quickAdd(){
    if(!qa.name.trim()) return;
    var p=Object.assign({id:uid(),sectors:[],campaigns:[],notes:'',nextAction:'',nextActionDate:'',owner:getUser()},qa);
    var dd2=findDupes([p],people).filter(function(d){return d.dupes.length>0;});
    if(dd2.length>0){
      var dnames2=dd2[0].dupes.map(function(d){return d.name;}).join(', ');
      if(!window.confirm('Possible duplicate — '+dnames2+' already exists. Add anyway?')) return;
    }
    savePeople([p].concat(people));
    setQa({name:'',title:'',company:'',email:''});
  }

  var list=filtered();
  var selPerson=selected?people.find(function(p){return p.id===selected.id;})||selected:null;

  return (
    <div className="split" style={{height:'100%'}}>
      {showAdd&&<PersonModal companies={companies} onSave={handleSave} onClose={()=>setShowAdd(false)}/>}

      {followUp&&<FollowUpModal person={followUp} onSave={function(p){handleUpdate(p);setFollowUp(null);}} onClose={()=>setFollowUp(null)}/>}

      <div className="split-list">

          <div className="flex-between" style={{marginBottom:8}}>
            <span style={{fontWeight:700,fontSize:14}}>People <span style={{color:'var(--muted)',fontWeight:400,fontSize:12}}>({people.length})</span></span>
            <div className="flex" style={{gap:5}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowImport(true)}>⬆ Import CSV</button>
              <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Add</button>
            </div>
          </div>
          <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:6}}/>
        </div>

        {/* Campaign filter */}
        {campaigns.length>0&&(
          <div style={{padding:'6px 12px',background:'#f8fafc',borderBottom:'1px solid var(--border)',display:'flex',gap:4,flexWrap:'wrap'}}>
            {campaigns.map(c=>(
              <span key={c.id} className={'tag btn-sm '+(filterCamp===c.id?'tag-active':'tag-inactive')} style={{fontSize:10}} onClick={()=>setFilterCamp(filterCamp===c.id?'':c.id)}>{c.name}</span>
            ))}
          </div>
        )}

        {/* Quick add inline */}
        {qaActive?(
          <div style={{padding:'8px 12px',background:'var(--pale)',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:4}}>
              <input placeholder="Name *" value={qa.name} onChange={e=>setQa(Object.assign({},qa,{name:e.target.value}))} style={{padding:'4px 6px',fontSize:12}}/>
              <input placeholder="Title" value={qa.title} onChange={e=>setQa(Object.assign({},qa,{title:e.target.value}))} style={{padding:'4px 6px',fontSize:12}}/>
              <input placeholder="Company" value={qa.company} onChange={e=>setQa(Object.assign({},qa,{company:e.target.value}))} style={{padding:'4px 6px',fontSize:12}}/>
              <input placeholder="Email" value={qa.email} onChange={e=>setQa(Object.assign({},qa,{email:e.target.value}))} style={{padding:'4px 6px',fontSize:12}}/>

        <div>

// ── BD Tracker ────────────────────────────────────────────────────────
function BDTrackerView({data,ownerFilter,setOwnerFilter}){
  const {people,savePeople}=data;
  const [followUp,setFollowUp]=useState(null);

  var tracked=people.filter(function(p){return p.nextAction&&p.nextAction.trim();});
  if(ownerFilter) tracked=tracked.filter(function(p){return p.owner===ownerFilter;});
  tracked=tracked.slice().sort(function(a,b){
    if(!a.nextActionDate) return 1;
    if(!b.nextActionDate) return -1;
    return a.nextActionDate<b.nextActionDate?-1:1;
  });

  function handleUpdate(p){
    var updated=people.slice();
    var idx=updated.findIndex(function(x){return x.id===p.id;});
    if(idx>=0) updated[idx]=p;
    savePeople(updated);
    setFollowUp(null);
  }

  var todayStr=today();
  var overdueCnt=tracked.filter(function(p){return p.nextActionDate&&p.nextActionDate<todayStr;}).length;
  var dueTodayCnt=tracked.filter(function(p){return p.nextActionDate===todayStr;}).length;

  return (
    <div style={{padding:20}}>
      {followUp&&<FollowUpModal person={followUp} onSave={handleUpdate} onClose={()=>setFollowUp(null)}/>}
      <div className="flex-between" style={{marginBottom:16}}>
        <div>
          <div style={{fontWeight:800,fontSize:18}}>BD Tracker</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>Everyone with a Next Action and Due Date set.</div>
        </div>
        <div className="flex" style={{gap:6}}>
          {overdueCnt>0&&<span className="badge badge-red">⚠ {overdueCnt} overdue</span>}
          {dueTodayCnt>0&&<span className="badge badge-amber">{dueTodayCnt} due today</span>}
        </div>
      </div>

      {tracked.length===0&&(
        <div className="card" style={{textAlign:'center',padding:'30px 20px'}}>
          <div style={{fontSize:28,marginBottom:8}}>📋</div>
          <div style={{fontWeight:600,marginBottom:4}}>No follow-ups tracked yet</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>To populate this view, open any person profile and set a <strong>Next Action</strong> and <strong>Due Date</strong> on the BD Follow-up tab, or use the ✎ button on any person in the list.</div>
        </div>
      )}

      {tracked.length>0&&(
        <div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div className="tracker-row tracker-header" style={{gridTemplateColumns:'2fr 2fr 1.5fr 1fr auto'}}>
              <span>Person</span><span>Next Action</span><span>Company</span><span>Due</span><span></span>
            </div>
            {tracked.map(function(p){
              var od=isOverdue(p.nextActionDate);
              return (
                <div key={p.id} className={'tracker-row'+(od?' overdue':'')} style={{gridTemplateColumns:'2fr 2fr 1.5fr 1fr auto',borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div className="avatar" style={{background:avatarColor(p.name),width:26,height:26,fontSize:11}}>{initials(p.name)}</div>
                    <div>
                      <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
                      {p.owner&&<div style={{fontSize:10,color:USER_COLORS[p.owner]||'var(--muted)'}}>{p.owner}</div>}
                    </div>
                  </div>
                  <span style={{fontSize:13}}>{p.nextAction}</span>
                  <span style={{fontSize:13,color:'var(--muted)'}}>{p.company}</span>
                  <span style={{fontSize:13,color:od?'var(--red)':p.nextActionDate===todayStr?'var(--teal)':'var(--text)',fontWeight:od?600:400}}>{fmtDate(p.nextActionDate)||'—'}</span>
                  <button className="follow-btn" title="Update" onClick={()=>setFollowUp(p)}>✎</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Campaigns View ────────────────────────────────────────────────────
var CAMP_STATUSES=['Draft','Live','Paused','Done'];
var CAMP_STATUS_COLORS={
  'Draft':{bg:'#f1f5f9',color:'#64748b'},
  'Live':{bg:'#d1fae5',color:'#065f46'},
  'Paused':{bg:'#fef3c7',color:'#92400e'},
  'Done':{bg:'#e0f2fe',color:'#0369a1'}
};
var OUTCOMES=['','Replied','Interested','Converted','No reply','Bounced'];
var OUTCOME_COLORS={
  'Replied':{bg:'#d1fae5',color:'#065f46'},
  'Interested':{bg:'#fef3c7',color:'#92400e'},
  'Converted':{bg:'#e0f2fe',color:'#0369a1'},
  'No reply':{bg:'#f1f5f9',color:'#64748b'},
  'Bounced':{bg:'#fff0f0',color:'#e53e3e'},
  '':{bg:'#f1f5f9',color:'#94a3b8'}
};

function campOutcomeKey(campId,personId){return 'co_'+campId+'_'+personId;}

function CampaignsView({data}){
  const {people,campaigns,saveCampaigns,savePeople}=data;
  const [showNew,setShowNew]=useState(false);
  const [newName,setNewName]=useState('');
  const [selected,setSelected]=useState(null);
  const [filterStatus,setFilterStatus]=useState('');

  function createCampaign(){
    if(!newName.trim()) return;
    var c={id:uid(),name:newName.trim(),createdAt:today(),status:'Draft',sequenceName:'',launchedAt:''};
    saveCampaigns([c].concat(campaigns));
    setNewName('');setShowNew(false);
    setSelected(c);
  }

  function updateCampaign(updated){
    var camps=campaigns.map(function(c){return c.id===updated.id?updated:c;});
    saveCampaigns(camps);
    setSelected(updated);
  }

  function deleteCampaign(id){
    if(!window.confirm('Delete campaign and remove all outcome data?')) return;
    saveCampaigns(campaigns.filter(function(c){return c.id!==id;}));
    var updated=people.map(function(p){
      var camps=p.campaigns?p.campaigns.filter(function(cid){return cid!==id;}):[];
      var outcomes=Object.assign({},p.campOutcomes||{});
      Object.keys(outcomes).forEach(function(k){if(k.indexOf('co_'+id+'_')===0) delete outcomes[k];});
      return Object.assign({},p,{campaigns:camps,campOutcomes:outcomes});
    });
    savePeople(updated);
    if(selected&&selected.id===id) setSelected(null);
  }

  var selCamp=selected?campaigns.find(function(c){return c.id===selected.id;})||null:null;
  var campPeople=selCamp?people.filter(function(p){return p.campaigns&&p.campaigns.indexOf(selCamp.id)>=0;}):[];
  var notInCamp=selCamp?people.filter(function(p){return !p.campaigns||p.campaigns.indexOf(selCamp.id)<0;}):[];

  var visibleCamps=filterStatus?campaigns.filter(function(c){return c.status===filterStatus;}):campaigns;

  function addPersonToCamp(pid){
    var person=people.find(function(p){return p.id===pid;});
    if(!person||!selCamp) return;
    var camps=person.campaigns?person.campaigns.slice():[];
    if(camps.indexOf(selCamp.id)<0) camps.push(selCamp.id);
    var updated=people.map(function(p){return p.id===pid?Object.assign({},p,{campaigns:camps}):p;});
    savePeople(updated);
  }

  function removePersonFromCamp(pid){
    var updated=people.map(function(p){
      if(p.id!==pid) return p;
      var camps=p.campaigns?p.campaigns.filter(function(cid){return cid!==selCamp.id;}):[];
      var outcomes=Object.assign({},p.campOutcomes||{});
      delete outcomes[campOutcomeKey(selCamp.id,pid)];
      return Object.assign({},p,{campaigns:camps,campOutcomes:outcomes});
    });
    savePeople(updated);
  }

  function setOutcome(pid,outcome){
    var updated=people.map(function(p){
      if(p.id!==pid) return p;
      var outcomes=Object.assign({},p.campOutcomes||{});
      outcomes[campOutcomeKey(selCamp.id,pid)]=outcome;
      var extra={};
      if(outcome==='Replied'||outcome==='Interested'){
        extra={nextAction:'Follow up — replied to '+selCamp.name,nextActionDate:today()};
      }
      if(outcome==='Converted'){
        extra={nextAction:'Convert — '+selCamp.name,nextActionDate:today()};
      }
      return Object.assign({},p,{campOutcomes:outcomes},extra);
    });
    savePeople(updated);
  }

  function getOutcome(p){
    if(!selCamp) return '';
    return (p.campOutcomes&&p.campOutcomes[campOutcomeKey(selCamp.id,p.id)])||'';
  }

  // Stats for selected campaign
  var replied=campPeople.filter(function(p){var o=getOutcome(p);return o==='Replied'||o==='Interested'||o==='Converted';}).length;
  var interested=campPeople.filter(function(p){return getOutcome(p)==='Interested';}).length;
  var converted=campPeople.filter(function(p){return getOutcome(p)==='Converted';}).length;
  var bounced=campPeople.filter(function(p){return getOutcome(p)==='Bounced';}).length;

  return (
    <div className="split" style={{height:'100%'}}>
      <div className="split-list">
        <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)'}}>
          <div className="flex-between" style={{marginBottom:8}}>
            <span style={{fontWeight:700,fontSize:14}}>Campaigns</span>
            <button className="btn btn-primary btn-sm" onClick={()=>setShowNew(!showNew)}>+ New</button>
          </div>
          {showNew&&(
            <div className="flex" style={{gap:6,marginBottom:6}}>
              <input placeholder="Match Instantly sequence name exactly" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createCampaign()} style={{fontSize:12,padding:'5px 8px'}}/>
              <button className="btn btn-primary btn-sm" onClick={createCampaign}>Add</button>
            </div>
          )}
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            <span className={'tag '+(filterStatus===''?'tag-active':'tag-inactive')} style={{fontSize:10}} onClick={()=>setFilterStatus('')}>All</span>
            {CAMP_STATUSES.map(function(s){
              return <span key={s} className={'tag '+(filterStatus===s?'tag-active':'tag-inactive')} style={{fontSize:10}} onClick={()=>setFilterStatus(filterStatus===s?'':s)}>{s}</span>;
            })}
          </div>
        </div>
        <div>
          {visibleCamps.length===0&&<div className="empty">No campaigns</div>}
          {visibleCamps.map(function(c){
            var cnt=people.filter(function(p){return p.campaigns&&p.campaigns.indexOf(c.id)>=0;}).length;
            var sc=CAMP_STATUS_COLORS[c.status||'Draft'];
            var repCnt=people.filter(function(p){
              if(!p.campaigns||p.campaigns.indexOf(c.id)<0) return false;
              var o=(p.campOutcomes&&p.campOutcomes[campOutcomeKey(c.id,p.id)])||'';
              return o==='Replied'||o==='Interested'||o==='Converted';
            }).length;
            return (
              <div key={c.id} className="campaign-row" style={{flexDirection:'column',alignItems:'stretch',background:selCamp&&selCamp.id===c.id?'var(--pale)':'',borderLeft:selCamp&&selCamp.id===c.id?'3px solid var(--teal)':'3px solid transparent',cursor:'pointer',gap:4}} onClick={()=>setSelected(c)}>
                <div className="flex-between">
                  <div style={{fontWeight:600,fontSize:13,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div>
                  <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:sc.bg,color:sc.color,fontWeight:700,flexShrink:0,marginLeft:6}}>{c.status||'Draft'}</span>
                </div>
                <div className="flex" style={{gap:8}}>
                  <span style={{fontSize:11,color:'var(--muted)'}}>{cnt} contacts</span>
                  {repCnt>0&&<span style={{fontSize:11,color:'#065f46',fontWeight:600}}>{repCnt} replied</span>}
                  {c.launchedAt&&<span style={{fontSize:11,color:'var(--muted)'}}>· {fmtDate(c.launchedAt)}</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="split-detail">
        {selCamp?(
          <div>
            <div className="flex-between" style={{marginBottom:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>{selCamp.name}</div>
                <div className="flex" style={{gap:8,flexWrap:'wrap'}}>
                  <select value={selCamp.status||'Draft'} onChange={function(e){updateCampaign(Object.assign({},selCamp,{status:e.target.value,launchedAt:e.target.value==='Live'&&!selCamp.launchedAt?today():selCamp.launchedAt}));}} style={{fontSize:12,padding:'3px 8px',borderRadius:6,fontWeight:600,background:CAMP_STATUS_COLORS[selCamp.status||'Draft'].bg,color:CAMP_STATUS_COLORS[selCamp.status||'Draft'].color,border:'none'}}>
                    {CAMP_STATUSES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
                  </select>
                  <span style={{fontSize:12,color:'var(--muted)'}}>{campPeople.length} contacts</span>
                  {selCamp.launchedAt&&<span style={{fontSize:12,color:'var(--muted)'}}>Launched {fmtDate(selCamp.launchedAt)}</span>}
                </div>
              </div>
              <div className="flex" style={{gap:6,flexShrink:0}}>
                <button className="btn btn-primary btn-sm" onClick={()=>exportInstantlyCSV(campPeople,selCamp.name)}>Export CSV</button>
                <button className="btn btn-danger btn-sm" onClick={()=>deleteCampaign(selCamp.id)}>Delete</button>
              </div>
            </div>

            <div className="form-group" style={{marginBottom:12}}>
              <label className="form-label">Instantly sequence name</label>
              <input value={selCamp.sequenceName||''} placeholder="Must match exactly in Instantly" onChange={function(e){updateCampaign(Object.assign({},selCamp,{sequenceName:e.target.value}));}} style={{fontSize:13}}/>
            </div>

            {campPeople.length>0&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
                {[
                  {label:'Contacts',val:campPeople.length,color:'var(--navy)'},
                  {label:'Replied',val:replied,color:'#065f46'},
                  {label:'Interested',val:interested,color:'#92400e'},
                  {label:'Converted',val:converted,color:'#0369a1'}
                ].map(function(s){
                  return (
                    <div key={s.label} style={{background:'#f8fafc',border:'1px solid var(--border)',borderRadius:8,padding:'10px',textAlign:'center'}}>
                      <div style={{fontSize:22,fontWeight:800,color:s.color}}>{s.val}</div>
                      <div style={{fontSize:11,color:'var(--muted)'}}>{s.label}</div>
                    </div>
                  );
                })}
              </div>
            )}

            <div className="flex-between" style={{marginBottom:8}}>
              <div className="section-title" style={{marginBottom:0}}>Contacts</div>
              <select style={{fontSize:11,padding:'2px 6px',border:'1px solid var(--border)',borderRadius:6}} onChange={function(e){if(e.target.value){addPersonToCamp(e.target.value);e.target.value='';}}} defaultValue="">
                <option value="">+ Add contact</option>
                {notInCamp.map(p=><option key={p.id} value={p.id}>{p.name}{p.company?' — '+p.company:''}</option>)}
              </select>
            </div>

            {campPeople.length===0?(
              <div style={{fontSize:13,color:'var(--muted)',padding:'20px 0'}}>No contacts yet. Add people then export CSV to Instantly.</div>
            ):(
              <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto auto',gap:0,padding:'6px 12px',background:'#f8fafc',borderBottom:'1px solid var(--border)',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                  <span>Name</span><span>Company</span><span style={{minWidth:110}}>Outcome</span><span></span>
                </div>
                {campPeople.map(function(p){
                  var outcome=getOutcome(p);
                  var oc=OUTCOME_COLORS[outcome]||OUTCOME_COLORS[''];
                  var isHot=outcome==='Replied'||outcome==='Interested'||outcome==='Converted';
                  return (
                    <div key={p.id} style={{display:'grid',gridTemplateColumns:'1fr 1fr auto auto',gap:0,padding:'8px 12px',borderBottom:'1px solid var(--border)',alignItems:'center',background:isHot?'#f0fdf4':'#fff'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{p.title}</div>
                      </div>
                      <div style={{fontSize:12,color:'var(--muted)'}}>{p.company}</div>
                      <select value={outcome} onChange={function(e){setOutcome(p.id,e.target.value);}} style={{fontSize:11,padding:'3px 6px',borderRadius:6,background:oc.bg,color:oc.color,border:'none',fontWeight:600,minWidth:110}}>
                        {OUTCOMES.map(function(o){return <option key={o} value={o}>{o||'No status'}</option>;})}
                      </select>
                      <button className="btn btn-danger btn-sm" style={{marginLeft:6}} onClick={()=>removePersonFromCamp(p.id)}>×</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ):(
          <div className="empty" style={{paddingTop:80}}>
            <div style={{fontSize:32,marginBottom:10}}>📧</div>
            <div style={{fontWeight:600,marginBottom:6}}>Select a campaign</div>
            <div style={{fontSize:13,color:'var(--muted)'}}>Name your campaign to match the Instantly sequence exactly. Export CSV, upload to Instantly, then log outcomes here as replies come in.</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Market Map ─────────────────────────────────────────────────────────
function MarketMapView({data,ownerFilter,setOwnerFilter}){
  const {people}=data;
  const [filterSector,setFilterSector]=useState('');
  const [search,setSearch]=useState('');

  var filtered=people.filter(function(p){
    var matchS=!filterSector||(p.sectors&&p.sectors.indexOf(filterSector)>=0);
    var matchO=!ownerFilter||p.owner===ownerFilter;
    var q=search.toLowerCase();
    var matchQ=!q||(p.name&&p.name.toLowerCase().indexOf(q)>=0)||(p.company&&p.company.toLowerCase().indexOf(q)>=0);
    return matchS&&matchO&&matchQ;
  });

  return (
    <div style={{padding:20}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>Market Map</div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Your network visualised by sector.</div>
      <div className="flex" style={{flexWrap:'wrap',gap:6,marginBottom:14}}>
        <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:160}}/>
        {SECTORS.map(s=>(
          <span key={s} className={'tag '+(filterSector===s?'tag-active':'tag-inactive')} style={{fontSize:11}} onClick={()=>setFilterSector(filterSector===s?'':s)}>{s}</span>
        ))}
      </div>
      {filtered.length===0&&<div className="empty">No people match filters</div>}
      <div className="mm-grid">
        {filtered.map(function(p){
          var primarySector=p.sectors&&p.sectors.length>0?p.sectors[0]:'Other';
          var bgColor=SECTOR_COLORS[primarySector]||SECTOR_COLORS['Other'];
          var txColor=SECTOR_TEXT[primarySector]||SECTOR_TEXT['Other'];
          return (
            <div key={p.id} className="mm-card">
              <div className="sector-bubble" style={{background:bgColor,color:txColor}}>{primarySector}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                <div className="avatar" style={{background:avatarColor(p.name),width:24,height:24,fontSize:10}}>{initials(p.name)}</div>
                <div style={{fontWeight:700,fontSize:13,lineHeight:1.2}}>{p.name}</div>
              </div>
              <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.3}}>{p.title}</div>
              <div style={{fontSize:11,color:'var(--navy)',fontWeight:500}}>{p.company}</div>
              {p.owner&&<div style={{marginTop:4,width:6,height:6,borderRadius:'50%',background:USER_COLORS[p.owner]||'var(--muted)'}}></div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Topbar stats ───────────────────────────────────────────────────────
function TopBar({saving,syncErr,user,ownerFilter,setOwnerFilter,onLogout,people,onReload}){
  var overdue=people.filter(function(p){return p.nextAction&&isOverdue(p.nextActionDate)&&(!ownerFilter||p.owner===ownerFilter);}).length;
  return (
    <div className="topbar">
      <div className="flex" style={{gap:12}}>
        {ownerFilter?(
          <span style={{fontSize:13,fontWeight:600,color:USER_COLORS[ownerFilter],background:'rgba('+hexToRgb(USER_COLORS[ownerFilter])+',0.12)',padding:'3px 10px',borderRadius:20}}>
            {ownerFilter}'s view
            <button onClick={()=>setOwnerFilter('')} style={{marginLeft:6,background:'none',border:'none',cursor:'pointer',color:USER_COLORS[ownerFilter],fontWeight:700,fontSize:13}}>×</button>
          </span>
        ):(
          <span style={{fontSize:12,color:'var(--muted)'}}>All contacts</span>
        )}
        {overdue>0&&<span className="badge badge-red">⚠ {overdue} overdue</span>}
        {saving?<span style={{fontSize:12,color:'var(--teal)'}}>Saving...</span>:syncErr?<span style={{color:'var(--red)',fontSize:11}}>{syncErr}</span>:<span style={{fontSize:12,color:'var(--green)'}}>✓ Synced</span>}
      </div>
      <div className="flex" style={{gap:10}}>
        <button className="btn btn-ghost btn-sm" onClick={onReload}>↻ Refresh</button>
        <span style={{fontSize:13,fontWeight:600,color:USER_COLORS[user]||'var(--muted)'}}>{user}</span>
        <button className="btn btn-ghost btn-sm" onClick={onLogout}>Logout</button>
      </div>
    </div>
  );
}

// ── App Shell ──────────────────────────────────────────────────────────
function App(){
  const [hasToken,setHasToken]=useState(!!getToken());
  const [user,setUser]=useState(getUser());
  const [view,setView]=useState('people');
  const [ownerFilter,setOwnerFilter]=useState(getUser()||'');
  const data=useVoltData();

  function handleLogin(u){
    localStorage.setItem('volt_user',u);
    setUser(u);
    setOwnerFilter(u);
  }
  function handleLogout(){localStorage.removeItem('volt_user');setUser('');setOwnerFilter('');}

  if(!hasToken) return <SetupScreen onDone={()=>setHasToken(true)}/>;
  if(!user) return <LoginScreen onLogin={handleLogin}/>;

  var navItems=[
    {id:'people',label:'People',icon:'👥'},
    {id:'companies',label:'Companies',icon:'🏢'},
    {id:'tracker',label:'BD Tracker',icon:'📋'},
    {id:'campaigns',label:'Campaigns',icon:'📧'},
    {id:'map',label:'Market Map',icon:'🗺'},
  ];

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <img src="https://voltconsulting.solutions/images/VC_Logo_NEW_Blue_Black.png" alt="VoltConsulting"/>
        </div>
        <div className="sidebar-nav">
          {navItems.map(function(n){
            return (
              <button key={n.id} className={'nav-item'+(view===n.id?' active':'')} onClick={()=>setView(n.id)}>
                <span className="nav-icon">{n.icon}</span>
                <span>{n.label}</span>
              </button>
            );
          })}
          <div style={{margin:'12px 0',borderTop:'1px solid rgba(255,255,255,0.08)'}}></div>
          <div style={{padding:'4px 16px 6px',fontSize:10,color:'rgba(255,255,255,0.35)',textTransform:'uppercase',letterSpacing:'0.06em'}}>View as</div>
          <button className={'nav-item'+(ownerFilter===''?' active':'')} onClick={()=>setOwnerFilter('')}>
            <span className="nav-icon">🌐</span><span>Everyone</span>
          </button>
          {['David','Lauren','Brinda'].map(function(u){
            return (
              <button key={u} className={'nav-item'+(ownerFilter===u?' active':'')} style={ownerFilter===u?{background:'rgba('+hexToRgb(USER_COLORS[u])+',0.18)',color:USER_COLORS[u],borderRight:'3px solid '+USER_COLORS[u]}:{}} onClick={()=>setOwnerFilter(u)}>
                <span style={{width:8,height:8,borderRadius:'50%',background:USER_COLORS[u],display:'inline-block',marginLeft:6}}></span>
                <span style={{marginLeft:6}}>{u}{u===user?' (me)':''}</span>
              </button>
            );
          })}
        </div>
        <div className="sidebar-footer">
          <div className="user-chip" onClick={()=>setOwnerFilter(ownerFilter===user?'':user)} title={ownerFilter===user?'Show everyone':'Show only my contacts'} style={{cursor:'pointer',padding:'6px 8px',borderRadius:6,background:ownerFilter===user?'rgba(255,255,255,0.1)':'transparent',transition:'background 0.15s'}}>
            <span className="user-dot" style={{background:USER_COLORS[user]||'var(--teal)'}}></span>
            <span style={{fontSize:12,opacity:0.9,flex:1}}>{user}</span>
            <span style={{fontSize:10,opacity:0.5}}>{ownerFilter===user?'● my view':'○ all'}</span>
          </div>
          <div style={{fontSize:10,opacity:0.4,marginTop:4}}>VoltCRM v1.0</div>
        </div>
      </div>
      <div className="main">
        <TopBar saving={data.saving} syncErr={data.syncErr} user={user} ownerFilter={ownerFilter} setOwnerFilter={setOwnerFilter} onLogout={handleLogout} people={data.people} onReload={data.reload}/>
        <div className="content" style={{padding:0,overflow:'hidden',height:'100%'}}>
          {data.loading?(
            <div className="empty" style={{paddingTop:80}}>Loading VoltCRM...</div>
          ):(
            <div style={{height:'100%'}}>
              {view==='people'&&<PeopleView data={data} ownerFilter={ownerFilter} setOwnerFilter={setOwnerFilter}/>}
              {view==='companies'&&<CompaniesView data={data}/>}
              {view==='tracker'&&<BDTrackerView data={data} ownerFilter={ownerFilter} setOwnerFilter={setOwnerFilter}/>}
              {view==='campaigns'&&<CampaignsView data={data}/>}
              {view==='map'&&<MarketMapView data={data} ownerFilter={ownerFilter} setOwnerFilter={setOwnerFilter}/>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
